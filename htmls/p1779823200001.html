<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鳥羽伏見の戦い ─ 戊辰戦争の幕開け</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#0a0e1a;
  --bg-elev:#11162a;
  --bg-panel:#161c33;
  --line:#252b48;
  --text:#e8e4d8;
  --text-dim:#9a9684;
  --vermillion:#c8403c;
  --vermillion-soft:#a83a36;
  --gold:#c8a14a;
  --indigo:#5b6ba8;
  --green-army:#5e8a5a;
  --shogun:#a86b3c;
  --imperial:#c8a14a;
  --neutral:#5d6076;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Shippori Mincho',serif;overflow:hidden}
body{display:grid;grid-template-rows:auto 1fr auto;grid-template-columns:340px 1fr;grid-template-areas:"header header" "panel map" "timeline timeline"}

/* HEADER */
header{grid-area:header;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:linear-gradient(180deg,#11162a 0%,#0d1222 100%);border-bottom:1px solid var(--line);z-index:500}
.title-block{display:flex;align-items:baseline;gap:18px}
.title{font-size:22px;font-weight:700;letter-spacing:.04em}
.title .accent{color:var(--vermillion)}
.subtitle{font-size:12px;color:var(--text-dim);letter-spacing:.1em}
.era-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid var(--line);border-radius:2px;color:var(--gold);background:rgba(200,161,74,.05)}
.header-controls{display:flex;gap:8px}
.btn{font-family:'Shippori Mincho',serif;font-size:12px;padding:6px 12px;background:transparent;color:var(--text-dim);border:1px solid var(--line);border-radius:2px;cursor:pointer;transition:all .15s}
.btn:hover{color:var(--text);border-color:var(--vermillion);background:rgba(200,64,60,.08)}
.btn.active{color:var(--vermillion);border-color:var(--vermillion);background:rgba(200,64,60,.12)}

/* PANEL */
aside{grid-area:panel;background:var(--bg-panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--line)}
.tab{flex:1;padding:10px 4px;font-size:12px;color:var(--text-dim);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--vermillion);border-bottom-color:var(--vermillion)}
.tab-content{flex:1;overflow-y:auto;padding:18px}
.tab-content::-webkit-scrollbar{width:6px}
.tab-content::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* Phase narrative */
.phase-header{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.phase-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.15em}
.phase-title{font-size:17px;font-weight:600;margin-top:4px;letter-spacing:.03em}
.phase-date{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:4px}
.phase-body{font-size:13px;line-height:1.85;color:var(--text);margin-bottom:14px}
.phase-body .key{color:var(--vermillion);font-weight:600}

.section-label{font-size:10px;letter-spacing:.2em;color:var(--text-dim);margin:18px 0 8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.event-list{list-style:none;font-size:12px;line-height:1.7}
.event-list li{padding:6px 0;border-bottom:1px solid rgba(37,43,72,.5);display:flex;gap:10px}
.event-list li:last-child{border-bottom:0}
.event-time{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:10px;min-width:48px;flex-shrink:0}
.event-text{flex:1}

.commander-card{padding:10px 12px;margin-bottom:8px;background:var(--bg-elev);border-left:3px solid var(--neutral);border-radius:2px;font-size:12px}
.commander-card.imperial{border-left-color:var(--gold)}
.commander-card.shogun{border-left-color:var(--shogun)}
.commander-name{font-weight:600;font-size:13px;margin-bottom:2px}
.commander-meta{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.commander-note{font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:6px}

.source-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;margin-left:6px;border-radius:2px;letter-spacing:.05em;text-transform:uppercase;vertical-align:middle}
.src-primary{background:rgba(94,138,90,.2);color:#8ab586}
.src-research{background:rgba(91,107,168,.2);color:#8a9bd6}
.src-tradition{background:rgba(168,107,60,.2);color:#d69a6a}

.ai-debate{display:flex;flex-direction:column;height:100%}
.ai-config{padding:12px;background:var(--bg-elev);border-radius:2px;margin-bottom:12px;font-size:11px}
.ai-config input{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--line);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:4px;border-radius:2px}
.ai-roster{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ai-char{padding:8px;background:var(--bg-elev);border:1px solid var(--line);border-radius:2px;cursor:pointer;font-size:11px;text-align:center;transition:all .15s}
.ai-char:hover{border-color:var(--vermillion)}
.ai-char.active{border-color:var(--vermillion);background:rgba(200,64,60,.1);color:var(--vermillion)}
.ai-messages{flex:1;overflow-y:auto;padding:10px;background:var(--bg);border:1px solid var(--line);border-radius:2px;font-size:12px;line-height:1.7;min-height:160px;margin-bottom:8px}
.ai-msg{margin-bottom:10px;padding:8px 10px;border-radius:2px}
.ai-msg-user{background:rgba(91,107,168,.1);border-left:2px solid var(--indigo)}
.ai-msg-bot{background:rgba(200,64,60,.05);border-left:2px solid var(--vermillion)}
.ai-msg-meta{font-size:9px;color:var(--text-dim);letter-spacing:.1em;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.ai-input{display:flex;gap:6px}
.ai-input input{flex:1;padding:8px;background:var(--bg-elev);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:12px;border-radius:2px}
.ai-input button{padding:8px 12px;background:var(--vermillion);color:#fff;border:0;border-radius:2px;cursor:pointer;font-family:inherit;font-size:12px}
.ai-input button:disabled{opacity:.4;cursor:not-allowed}

/* MAP */
#map{grid-area:map;background:#000;position:relative}
.leaflet-container{background:#0a0e1a;font-family:'Shippori Mincho',serif}
.leaflet-tile{filter:contrast(.92) brightness(.85) saturate(.5) hue-rotate(-10deg)}
.troop-marker{display:flex;flex-direction:column;align-items:center}
.troop-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:50%;border:2px solid;background:rgba(10,14,26,.95);box-shadow:0 0 0 1px rgba(0,0,0,.6),0 2px 6px rgba(0,0,0,.5)}
.troop-icon.imperial{color:var(--gold);border-color:var(--gold)}
.troop-icon.shogun{color:var(--shogun);border-color:var(--shogun)}
.troop-icon.neutral{color:var(--text-dim);border-color:var(--neutral)}
.troop-label{font-size:10px;background:rgba(10,14,26,.85);color:var(--text);padding:1px 6px;border-radius:2px;margin-top:2px;white-space:nowrap;font-weight:600;letter-spacing:.05em}
.place-marker{font-size:11px;color:var(--text);background:rgba(10,14,26,.85);padding:2px 7px;border:1px solid var(--line);border-radius:2px;white-space:nowrap;letter-spacing:.03em}
.place-marker.key{color:var(--vermillion);border-color:var(--vermillion);font-weight:600}

.legend{position:absolute;bottom:20px;left:20px;background:rgba(17,22,42,.92);border:1px solid var(--line);border-radius:2px;padding:12px 14px;font-size:11px;z-index:600;backdrop-filter:blur(6px);max-width:240px}
.legend h4{font-size:10px;letter-spacing:.15em;color:var(--text-dim);margin-bottom:8px;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.legend-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.legend-swatch{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.legend-line{width:14px;height:2px;flex-shrink:0}

.layer-toggle{position:absolute;top:20px;right:20px;background:rgba(17,22,42,.92);border:1px solid var(--line);border-radius:2px;padding:10px;font-size:11px;z-index:600;backdrop-filter:blur(6px)}
.layer-toggle label{display:block;margin:3px 0;cursor:pointer;user-select:none}
.layer-toggle input{margin-right:6px;vertical-align:middle}

/* TIMELINE */
.timeline{grid-area:timeline;background:var(--bg-elev);border-top:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:18px;position:relative}
.timeline-rail{flex:1;height:36px;position:relative;display:flex;align-items:center}
.timeline-rail::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line);transform:translateY(-50%)}
.tick{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transform:translateX(-50%);transition:all .15s}
.tick-dot{width:11px;height:11px;background:var(--bg-elev);border:2px solid var(--neutral);border-radius:50%;transition:all .2s}
.tick.active .tick-dot{border-color:var(--vermillion);background:var(--vermillion);box-shadow:0 0 0 4px rgba(200,64,60,.2)}
.tick:hover .tick-dot{border-color:var(--text)}
.tick-label{position:absolute;top:18px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;white-space:nowrap}
.tick.active .tick-label{color:var(--text)}
.phase-controls{display:flex;gap:6px}
.phase-controls .btn{padding:4px 12px;font-size:11px}

/* RESPONSIVE */
@media (max-width:900px){
  body{grid-template-columns:1fr;grid-template-rows:auto 280px 1fr auto;grid-template-areas:"header" "panel" "map" "timeline"}
  aside{border-right:0;border-bottom:1px solid var(--line)}
}
</style>
</head>
<body>

<header>
  <div class="title-block">
    <div>
      <div class="title">鳥羽<span class="accent">・</span>伏見の戦い</div>
      <div class="subtitle">BOSHIN WAR ─ OPENING BATTLE</div>
    </div>
    <span class="era-badge">慶応4年1月3日 ─ 1月6日</span>
  </div>
  <div class="header-controls">
    <button class="btn" id="btnAutoplay">自動再生</button>
    <button class="btn" id="btnReset">初期位置</button>
  </div>
</header>

<aside>
  <div class="tabs">
    <div class="tab active" data-tab="phase">戦況</div>
    <div class="tab" data-tab="commanders">将</div>
    <div class="tab" data-tab="aftermath">その後</div>
    <div class="tab" data-tab="sources">史料</div>
    <div class="tab" data-tab="ai">AI討論</div>
  </div>
  <div class="tab-content" id="tabContent"></div>
</aside>

<div id="map">
  <div class="legend">
    <h4>陣営</h4>
    <div class="legend-row"><div class="legend-swatch" style="background:var(--gold)"></div>新政府軍（薩長土）</div>
    <div class="legend-row"><div class="legend-swatch" style="background:var(--shogun)"></div>旧幕府軍（会・桑・幕）</div>
    <div class="legend-row"><div class="legend-swatch" style="background:var(--neutral)"></div>中立・離反</div>
    <h4 style="margin-top:10px">領分（慶応4年1月時点）</h4>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(200,64,60,.25);border:1px solid var(--vermillion)"></div>山城淀藩</div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(200,161,74,.18);border:1px solid var(--gold)"></div>皇室領</div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(91,107,168,.18);border:1px solid var(--indigo)"></div>公家領</div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(138,150,118,.18);border:1px solid #8a9676"></div>社寺領</div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(139,90,60,.16);border:1px solid #8b5a3c"></div>伊勢桑名藩</div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(155,60,212,.16);border:1px solid #9b3cd4"></div>陸奥会津藩</div>
    <h4 style="margin-top:10px">街道</h4>
    <div class="legend-row"><div class="legend-line" style="background:var(--vermillion)"></div>戦闘発生街道</div>
    <div class="legend-row"><div class="legend-line" style="background:var(--gold)"></div>進軍路</div>
  </div>
  <div class="layer-toggle">
    <label><input type="checkbox" id="lyrHan" checked>領分（藩境界）</label>
    <label><input type="checkbox" id="lyrRoads" checked>街道</label>
    <label><input type="checkbox" id="lyrPlaces" checked>地名</label>
    <hr style="border:0;border-top:1px solid var(--line);margin:6px 0">
    <label style="font-size:10px;color:var(--text-dim)">背景</label>
    <select id="baseLayer" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--line);padding:3px;font-size:11px;font-family:inherit">
      <option value="pale">淡色地図</option>
      <option value="std">標準地図</option>
      <option value="ortho">空中写真</option>
      <option value="meiji">明治迅速図 1892-1910（推奨）</option>
      <option value="historic">色別標高図（地形）</option>
    </select>
  </div>
</div>

<div class="timeline">
  <div class="phase-controls">
    <button class="btn" id="btnPrev">◀</button>
    <button class="btn" id="btnNext">▶</button>
  </div>
  <div class="timeline-rail" id="timelineRail"></div>
</div>

  {title:'『開国起原』中根雪江', kind:'primary', note:'越前藩士による幕末記録、当事者証言豊富。'},
  {title:'『鳥羽伏見の戦い』野口武彦', kind:'research', note:'近年の代表的研究書。兵力・武器・戦術を実証的に検証。'},
  {title:'『戊辰戦争』佐々木克', kind:'research', note:'戊辰戦争の通史的研究、政治的背景を重視。'},
  {title:'『近世日本国民史』徳富蘇峰', kind:'tradition', note:'明治大正期の通俗史観。物語的だが偏向あり。'},
  {title:'CODH 幕末期近世村領域データセット', kind:'research', note:'国立情報学研究所・人文学オープンデータ共同利用センター作成。慶応4年1月1日時点の藩領分を反映。'}
];

const AI_CHARS = [
  {id:'saigo',   name:'西郷隆盛',   role:'新政府軍を率いた薩摩藩士。冷静沈着、薩摩弁を時に交える。'},
  {id:'yoshinobu',name:'徳川慶喜',  role:'旧幕府将軍。聡明だが、ここでは決定的瞬間に逃げたと批判される。江戸城無血開城で再評価も。'},
  {id:'katamori',name:'松平容保',   role:'会津藩主、忠義を貫いた人物。戊辰戦争で会津若松落城まで戦う。'},
  {id:'kondo',   name:'近藤勇',     role:'新撰組局長。鳥羽伏見では負傷で不在。武士的価値観の体現。'}
];

/* ========== STATE ========== */
let currentPhase = 0;
let map, baseLayers={}, currentBase, layerHan, layerRoads, layerPlaces, layerCommanders;
let activeTab='phase', autoplayTimer=null, selectedAIChar='saigo';

/* ========== MAP INIT ========== */
function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:true}).setView([34.93,135.74],13);
  L.control.zoom({position:'topleft'}).addTo(map);

  baseLayers.pale = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',
    {attribution:'地理院淡色地図', maxZoom:18});
  baseLayers.std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
    {attribution:'地理院標準地図', maxZoom:18});
  baseLayers.ortho = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg',
    {attribution:'地理院オルソ画像', maxZoom:18});
  baseLayers.historic = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/relief/{z}/{x}/{y}.png',
    {attribution:'地理院色別標高図', maxZoom:15});
  // 明治迅速図 1892-1910 (1/20000) — 戊辰戦争(1868)から24年後の京阪神地形図。
  // 出典: 今昔マップ on the web (谷謙二, 埼玉大) / 国土地理院承認 平27情複第1088号
  baseLayers.meiji = L.tileLayer(
    'https://ktgis.net/kjmapw/kjtilemap/keihansin/2man/{z}/{x}/{y}.png',
    {attribution:'<a href="https://ktgis.net/kjmapw/" target="_blank">今昔マップ on the web</a> 谷謙二・埼玉大 / 国土地理院承認 平27情複1088',
     tms:true, minZoom:8, maxNativeZoom:16, maxZoom:18});

  currentBase = baseLayers.pale;
  currentBase.addTo(map);

  document.getElementById('baseLayer').addEventListener('change',(e)=>{
    map.removeLayer(currentBase);
    currentBase = baseLayers[e.target.value];
    currentBase.addTo(map);
  });

  /* Han polygons */
  layerHan = L.layerGroup();
  const hanStyles = {
    '山城淀藩':   {color:'#c8403c', fillColor:'#c8403c', fillOpacity:.18, weight:1.5, dashArray:'4,4'},
    '皇室領':     {color:'#c8a14a', fillColor:'#c8a14a', fillOpacity:.14, weight:1, dashArray:'2,3'},
    '公家領':     {color:'#5b6ba8', fillColor:'#5b6ba8', fillOpacity:.14, weight:1, dashArray:'2,3'},
    '社寺領':     {color:'#8a9676', fillColor:'#8a9676', fillOpacity:.12, weight:1, dashArray:'2,3'},
    '伊勢桑名藩': {color:'#8b5a3c', fillColor:'#8b5a3c', fillOpacity:.16, weight:1.2, dashArray:'3,3'},
    '陸奥会津藩': {color:'#9b3cd4', fillColor:'#9b3cd4', fillOpacity:.16, weight:1.2, dashArray:'3,3'}
  };
  const defaultHanStyle = {color:'#666', fillColor:'#666', fillOpacity:.10, weight:1, dashArray:'2,3'};
  L.geoJSON(HAN_GEOJSON, {
    style: (f)=> hanStyles[f.properties.han] || defaultHanStyle,
    onEachFeature: (f, lyr)=> {
      const v = f.properties.villages || 0;
      lyr.bindTooltip(`<b>${f.properties.han}</b><br>${v} 村`, {sticky:true, direction:'top', className:'han-tooltip'});
    }
  }).addTo(layerHan);
  layerHan.addTo(map);

  /* Roads */
  layerRoads = L.layerGroup();
  ROADS.forEach(road=>{
    const color = road.kind==='battle' ? '#c8403c' : '#c8a14a';
    const weight = road.kind==='battle' ? 3 : 2;
    const dash = road.kind==='battle' ? null : '6,4';
    const line = L.polyline(road.path,{color, weight, dashArray:dash, opacity:.8});
    line.bindTooltip(road.n, {sticky:true});
    layerRoads.addLayer(line);
  });
  layerRoads.addTo(map);

  /* Places */
  layerPlaces = L.layerGroup();
  KEY_PLACES.forEach(p=>{
    const icon = L.divIcon({
      className:'',
      html:`<div class="place-marker ${p.key?'key':''}">${p.n}</div>`,
      iconSize:null, iconAnchor:[40,8]
    });
    const m = L.marker([p.lat,p.lng],{icon});
    m.bindTooltip(p.note, {direction:'bottom'});
    layerPlaces.addLayer(m);
  });
  layerPlaces.addTo(map);

  /* Commanders (drawn per phase) */
  layerCommanders = L.layerGroup().addTo(map);

  /* Layer toggle wiring */
  document.getElementById('lyrHan').addEventListener('change',(e)=>{
    e.target.checked ? layerHan.addTo(map) : map.removeLayer(layerHan);
  });
  document.getElementById('lyrRoads').addEventListener('change',(e)=>{
    e.target.checked ? layerRoads.addTo(map) : map.removeLayer(layerRoads);
  });
  document.getElementById('lyrPlaces').addEventListener('change',(e)=>{
    e.target.checked ? layerPlaces.addTo(map) : map.removeLayer(layerPlaces);
  });
}

/* ========== RENDER COMMANDERS ========== */
function renderCommanders(phaseIdx){
  layerCommanders.clearLayers();
  COMMANDERS.forEach(c=>{
    const pos = c.positions[phaseIdx];
    if(!pos) return;
    const initial = c.name.charAt(0);
    const icon = L.divIcon({
      className:'',
      html:`<div class="troop-marker">
              <div class="troop-icon ${c.side}">${initial}</div>
              <div class="troop-label">${c.name}</div>
            </div>`,
      iconSize:null, iconAnchor:[20,18]
    });
    const m = L.marker(pos,{icon, zIndexOffset:1000});
    m.bindPopup(`<div style="font-family:Shippori Mincho,serif;color:#161c33;min-width:200px">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">${c.name}</div>
      <div style="font-size:11px;color:#666;margin-bottom:6px">${c.han}・${c.role}</div>
      <div style="font-size:12px;line-height:1.6">${c.note}</div>
    </div>`);
    layerCommanders.addLayer(m);
  });
}

/* ========== RENDER PHASE ========== */
function renderPhase(idx){
  currentPhase = idx;
  const p = PHASES[idx];

  /* Bound view */
  if(p.bbox) map.fitBounds(p.bbox,{padding:[40,40], duration:.8});

  /* Commanders */
  renderCommanders(idx);

  /* Timeline ticks */
  document.querySelectorAll('.tick').forEach((t,i)=>{
    t.classList.toggle('active', i===idx);
  });

  /* Tab content (if on phase tab) */
  if(activeTab==='phase') renderPhaseTab();
}

function renderPhaseTab(){
  const p = PHASES[currentPhase];
  const html = `
    <div class="phase-header">
      <div class="phase-num">PHASE ${p.id} / ${PHASES.length}</div>
      <div class="phase-title">${p.title}</div>
      <div class="phase-date">${p.date}</div>
    </div>
    <div class="phase-body">${p.narrative}</div>
    <div class="section-label">主要動向</div>
    <ul class="event-list">
      ${p.events.map(e=>`<li><span class="event-time">${e.t}</span><span class="event-text">${e.e}</span></li>`).join('')}
    </ul>
  `;
  document.getElementById('tabContent').innerHTML = html;
}

  document.getElementById('tabContent').innerHTML = `

      <p style="margin-bottom:12px"><span class="key">徳川慶喜の戦線離脱</span>は今も論争。臆病か、内戦の早期終結を狙った決断か。江戸城無血開城に繋がる流れの起点。<span class="source-tag src-tradition">通説</span><span class="source-tag src-research">修正</span></p>

function renderSourcesTab(){
  const html = `

    ${SOURCES.map(s=>{
      const cls = s.kind==='primary' ? 'src-primary' : s.kind==='research' ? 'src-research' : 'src-tradition';

    <div class="section-label">地理データ</div>
    <div class="commander-card">
      <div class="commander-name">幕末期近世村領域データセット <span class="source-tag src-research">CC BY-SA 4.0</span></div>
      <div class="commander-note">人文学オープンデータ共同利用センター（CODH）作成。本マップの領分（藩境界）は本データから算出した凸包近似。慶応4年1月1日時点。</div>
    </div>

function renderAITab(){
  const charButtons = AI_CHARS.map(c=>`
    <div class="ai-char ${c.id===selectedAIChar?'active':''}" data-char="${c.id}">${c.name}</div>
  `).join('');
  document.getElementById('tabContent').innerHTML = `
    <div class="ai-debate">
      <div class="ai-config">
        <div style="color:var(--text-dim);margin-bottom:6px">OpenRouter API Key（保存はブラウザのlocalStorageのみ）</div>
        <input type="password" id="apiKey" placeholder="sk-or-..." value="${localStorage.getItem('orkey')||''}">
      </div>
      <div class="section-label" style="margin-top:0">対話する人物</div>
      <div class="ai-roster">${charButtons}</div>
      <div class="ai-messages" id="aiMessages">
        <div style="color:var(--text-dim);font-size:11px;text-align:center;padding:20px 0">人物を選び、質問を入力してください。<br>例：「なぜ大坂城を出たのですか」「淀藩を恨んでいますか」</div>
      </div>
      <div class="ai-input">
        <input type="text" id="aiInput" placeholder="質問を入力...">
        <button id="aiSend">送信</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.ai-char').forEach(el=>{
    el.addEventListener('click',()=>{
      selectedAIChar = el.dataset.char;
      document.querySelectorAll('.ai-char').forEach(e=>e.classList.toggle('active', e===el));
    });
  });
  document.getElementById('aiSend').addEventListener('click', sendAIMessage);
  document.getElementById('aiInput').addEventListener('keydown',(e)=>{
    if(e.key==='Enter') sendAIMessage();
  });
}

async function sendAIMessage(){
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if(!msg) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if(!apiKey){ alert('OpenRouter API Keyを入力してください'); return; }
  localStorage.setItem('orkey', apiKey);

  const char = AI_CHARS.find(c=>c.id===selectedAIChar);
  const messages = document.getElementById('aiMessages');

  /* User bubble */
  messages.innerHTML += `<div class="ai-msg ai-msg-user">
    <div class="ai-msg-meta">質問者 → ${char.name}</div>${escapeHtml(msg)}
  </div>`;
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  /* Placeholder while waiting */
  messages.innerHTML += `<div class="ai-msg ai-msg-bot" id="pending">
    <div class="ai-msg-meta">${char.name}</div><span style="color:var(--text-dim)">…</span>
  </div>`;

  const systemPrompt = `あなたは「鳥羽伏見の戦い」（慶応4年1月3日〜6日、1868年）の最中もしくは直後の${char.name}本人として答えてください。${char.role} 文体は当時の士族としての品格を保ち、現代語訳調で構いません。歴史的事実に反することは答えず、心情と判断の理由を率直に語ってください。回答は2〜4文程度に簡潔に。`;

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${apiKey}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        model:'anthropic/claude-3.5-sonnet',
        messages:[
          {role:'system', content:systemPrompt},
          {role:'user', content:msg}
        ],
        max_tokens:400
      })
    });
    const data = await res.json();
    const reply = data?.choices?.[0]?.message?.content || '（応答取得失敗）';
    document.getElementById('pending').innerHTML = `<div class="ai-msg-meta">${char.name}</div>${escapeHtml(reply)}`;
    document.getElementById('pending').id = '';
  } catch (e) {
    document.getElementById('pending').innerHTML = `<div class="ai-msg-meta">エラー</div>${escapeHtml(String(e))}`;
    document.getElementById('pending').id = '';
  }
  messages.scrollTop = messages.scrollHeight;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ========== UI WIRING ========== */
function initTimeline(){
  const rail = document.getElementById('timelineRail');
  PHASES.forEach((p,i)=>{
    const tick = document.createElement('div');
    tick.className = 'tick' + (i===0?' active':'');
    tick.style.left = ((i/(PHASES.length-1))*100) + '%';
    tick.innerHTML = `<div class="tick-dot"></div><div class="tick-label">${p.date}</div>`;
    tick.addEventListener('click',()=>renderPhase(i));
    rail.appendChild(tick);
  });
}

function initTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x===t));
      activeTab = t.dataset.tab;
      switch(activeTab){
        case 'phase':      renderPhaseTab(); break;
        case 'commanders': renderCommandersTab(); break;
        case 'aftermath':  renderAftermathTab(); break;
        case 'sources':    renderSourcesTab(); break;
        case 'ai':         renderAITab(); break;
      }
    });
  });
}

function initControls(){
  document.getElementById('btnPrev').addEventListener('click',()=>{
    if(currentPhase>0) renderPhase(currentPhase-1);
  });
  document.getElementById('btnNext').addEventListener('click',()=>{
    if(currentPhase<PHASES.length-1) renderPhase(currentPhase+1);
  });
  document.getElementById('btnReset').addEventListener('click',()=>{
    renderPhase(0);
  });
  document.getElementById('btnAutoplay').addEventListener('click',(e)=>{
    if(autoplayTimer){
      clearInterval(autoplayTimer);
      autoplayTimer = null;
      e.target.classList.remove('active');
      e.target.textContent = '自動再生';
    } else {
      e.target.classList.add('active');
      e.target.textContent = '停止';
      autoplayTimer = setInterval(()=>{
        if(currentPhase < PHASES.length-1) renderPhase(currentPhase+1);
        else { renderPhase(0); }
      }, 6000);
    }
  });
}

/* ========== BOOT ========== */
window.addEventListener('DOMContentLoaded',()=>{
  initMap();
  initTimeline();
  initTabs();
  initControls();
  renderPhase(0);
});
</script>
