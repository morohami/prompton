<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>スイッチ・アナライザー — A→B 乗換</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f5f3ee; --surface: #fffdfa; --surface-2: #ebe8e0;
  --ink: #202124; --muted: #6a665d; --line: #d7d2c7;
  --teal: #178c87; --teal-dark: #0f625f; --coral: #c95f4f;
  --gold: #c58b16; --plum: #6f5a8c;
  --positive: #177245; --negative: #b34035;
  --shadow: 0 18px 50px rgba(40, 35, 25, 0.08);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); }
.shell { width: min(1280px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 40px; }
.topbar { display: flex; align-items: end; justify-content: space-between; gap: 18px; margin-bottom: 20px; flex-wrap: wrap; }
.eyebrow { margin: 0 0 6px; color: var(--teal-dark); font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
h1 { margin: 0; font-size: clamp(22px, 3.2vw, 34px); line-height: 1.05; }
h2 { margin: 0 0 12px; font-size: 15px; }
nav.tools { display: flex; gap: 6px; flex-wrap: wrap; }
nav.tools a { display: inline-flex; align-items: center; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--ink); text-decoration: none; font-size: 12px; font-weight: 700; }
nav.tools a.active { background: var(--ink); color: white; border-color: var(--ink); }
.columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.panel { padding: 16px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); box-shadow: var(--shadow); }
.panel.sell { border-top: 4px solid var(--coral); }
.panel.buy { border-top: 4px solid var(--teal); }
.panel h2 .tag { display: inline-block; margin-left: 6px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
.panel.sell h2 .tag { background: #fbe8e3; color: #9c3528; }
.panel.buy h2 .tag { background: #def0ec; color: var(--teal-dark); }
.field { display: grid; gap: 5px; margin-bottom: 10px; }
.field span { color: var(--muted); font-size: 11px; font-weight: 800; }
.field input, .field select { height: 38px; padding: 0 11px; border: 1px solid var(--line); border-radius: 8px; background: white; font: inherit; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.params { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 14px; margin-bottom: 14px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255, 253, 250, 0.7); }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
.metric { padding: 14px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); }
.metric span { color: var(--muted); font-size: 11px; font-weight: 800; }
.metric strong { display: block; margin-top: 6px; font-size: 22px; line-height: 1.1; }
.metric.hl { background: #eef9f6; border-color: rgba(23, 140, 135, 0.4); }
.metric small { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
.chart-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; margin-bottom: 14px; }
.canvas-card { padding: 16px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); box-shadow: var(--shadow); }
canvas { width: 100%; height: 320px; display: block; }
.waterfall { display: grid; gap: 6px; }
.wf-row { display: grid; grid-template-columns: 130px 1fr 120px; align-items: center; gap: 10px; font-size: 12px; }
.wf-row span { color: var(--muted); font-weight: 700; }
.wf-row .bar { height: 14px; border-radius: 4px; background: var(--surface-2); }
.wf-row .bar > div { height: 100%; border-radius: 4px; }
.wf-row strong { text-align: right; font-variant-numeric: tabular-nums; }
.wf-row.minus .bar > div { background: var(--coral); }
.wf-row.plus .bar > div { background: var(--teal); }
.wf-row.total { font-weight: 900; padding-top: 6px; border-top: 1px solid var(--line); }
.wf-row.total .bar > div { background: var(--ink); }
.sensitivity { padding: 16px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); box-shadow: var(--shadow); }
.heatmap { display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; }
.heatmap .cell { text-align: center; padding: 10px 4px; border-radius: 6px; font-size: 12px; font-variant-numeric: tabular-nums; }
.heatmap .header { color: var(--muted); font-weight: 800; background: transparent; }
.heatmap .cell .sub { display: block; margin-top: 2px; font-size: 10px; font-weight: 500; opacity: 0.7; }
@media (max-width: 960px) { .columns, .chart-row { grid-template-columns: 1fr; } .params { grid-template-columns: repeat(2, 1fr); } .metrics { grid-template-columns: repeat(2, 1fr); } }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">機会費用ツール / Switch</p>
          <h1>スイッチ・アナライザー</h1>
        </div>
        <nav class="tools">
          <a href="index.html">本体</a>
          <a href="swap.html" class="active">スイッチ</a>
          <a href="tax-lots.html">税ロット</a>
          <a href="forecast.html">予測</a>
          <a href="friction.html">摩擦・比較</a>
        </nav>
      </header>

      <div class="columns">
        <div class="panel sell">
          <h2>売る銘柄 <span class="tag">SELL</span></h2>
          <div class="field-row">
            <label class="field"><span>銘柄</span><input id="sellSymbol" value="7203.T" /></label>
            <label class="field"><span>保有数</span><input id="sellShares" type="text" inputmode="decimal" value="100" /></label>
          </div>
          <div class="field-row">
            <label class="field"><span>現在価格</span><input id="sellPrice" type="text" inputmode="decimal" value="2800" /></label>
            <label class="field"><span>取得単価</span><input id="sellCost" type="text" inputmode="decimal" value="1800" /></label>
          </div>
          <div class="field-row">
            <label class="field"><span>株価成長率 年率 (%)</span><input id="sellGrowth" type="text" inputmode="decimal" value="4" /></label>
            <label class="field"><span>配当利回り (%)</span><input id="sellYield" type="text" inputmode="decimal" value="3" /></label>
          </div>
          <label class="field"><span>配当成長率 DGR (%)</span><input id="sellDGR" type="text" inputmode="decimal" value="2" /></label>
        </div>

        <div class="panel buy">
          <h2>買う銘柄 <span class="tag">BUY</span></h2>
          <div class="field-row">
            <label class="field"><span>銘柄</span><input id="buySymbol" value="VOO" /></label>
            <label class="field"><span>現在価格 (基準通貨)</span><input id="buyPrice" type="text" inputmode="decimal" value="80000" /></label>
          </div>
          <div class="field-row">
            <label class="field"><span>株価成長率 年率 (%)</span><input id="buyGrowth" type="text" inputmode="decimal" value="7" /></label>
            <label class="field"><span>配当利回り (%)</span><input id="buyYield" type="text" inputmode="decimal" value="1.4" /></label>
          </div>
          <label class="field"><span>配当成長率 DGR (%)</span><input id="buyDGR" type="text" inputmode="decimal" value="6" /></label>
        </div>
      </div>

      <section class="params">
        <label class="field"><span>期間 (年)</span><input id="years" type="text" inputmode="decimal" value="10" /></label>
        <label class="field"><span>配当税率 (%)</span><input id="divTax" type="text" inputmode="decimal" value="20.315" /></label>
        <label class="field"><span>譲渡益税率 (%)</span><input id="gainsTax" type="text" inputmode="decimal" value="20.315" /></label>
        <label class="field"><span>仲介手数料 片道 (%)</span><input id="brokerage" type="text" inputmode="decimal" value="0.1" /></label>
        <label class="field"><span>FXスプレッド 片道 (%)</span><input id="fxSpread" type="text" inputmode="decimal" value="0.3" /></label>
        <label class="field"><span>配当再投資</span>
          <select id="reinvest"><option value="1">あり</option><option value="0">なし</option></select>
        </label>
      </section>

      <section class="metrics">
        <div class="metric hl"><span>必要CAGR (BUY側)</span><strong id="reqCagr">-</strong><small id="reqCagrNote">BUYに必要な年率（配当含む税引後）</small></div>
        <div class="metric"><span>必要利回りのみ (成長同等)</span><strong id="reqYield">-</strong><small>SELLと同じ成長前提で配当だけで追いつく</small></div>
        <div class="metric"><span>損益分岐年</span><strong id="breakEven">-</strong><small id="beNote">スイッチ後の評価額が保持を上回る年</small></div>
        <div class="metric"><span>スイッチ総コスト</span><strong id="totalCost">-</strong><small>税+手数料+FXの合計</small></div>
      </section>

      <section class="chart-row">
        <div class="canvas-card">
          <h2>クロスオーバー: 保持 vs スイッチ</h2>
          <canvas id="crossChart"></canvas>
        </div>
        <div class="canvas-card">
          <h2>スイッチ・ウォーターフォール</h2>
          <div class="waterfall" id="waterfall"></div>
        </div>
      </section>

      <section class="sensitivity">
        <h2>感度グリッド: BUY側 (株価成長 × 配当利回り) → 損益分岐年</h2>
        <div class="heatmap" id="heatmap"></div>
      </section>
    </main>

    <script>
const $ = (id) => document.getElementById(id);
const num = (id, fb = 0) => {
  const v = parseFloat(String($(id).value).replaceAll(",", ""));
  return Number.isFinite(v) ? v : fb;
};
const fmt = (v, c = false) => {
  if (!Number.isFinite(v)) return "-";
  return new Intl.NumberFormat("ja-JP", {
    style: "currency", currency: "JPY",
    notation: c && Math.abs(v) >= 1e6 ? "compact" : "standard",
    maximumFractionDigits: 0,
  }).format(v);
};
const fmtPct = (v, d = 2) => Number.isFinite(v) ? `${(v * 100).toFixed(d)}%` : "-";

function project(start, growth, yieldRate, dgr, years, divTax, reinvest) {
  const history = [start];
  let value = start;
  let cumDiv = 0;
  let curYield = yieldRate;
  for (let y = 1; y <= years; y++) {
    const grown = value * (1 + growth);
    const div = grown * curYield * (1 - divTax);
    if (reinvest) value = grown + div;
    else { value = grown; cumDiv += div; }
    curYield *= (1 + dgr);
    history.push(reinvest ? value : value + cumDiv);
  }
  return { value: history[years], history };
}

function solveCagr(start, target, years, yieldRate, dgr, divTax, reinvest) {
  let lo = -0.5, hi = 1.5;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const v = project(start, mid, yieldRate, dgr, years, divTax, reinvest).value;
    if (v < target) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}
function solveYield(start, target, years, growth, dgr, divTax, reinvest) {
  let lo = 0, hi = 1.0;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const v = project(start, growth, mid, dgr, years, divTax, reinvest).value;
    if (v < target) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

function compute() {
  const sP = num("sellPrice"), sS = num("sellShares"), sC = num("sellCost");
  const sG = num("sellGrowth") / 100, sY = num("sellYield") / 100, sD = num("sellDGR") / 100;
  const bG = num("buyGrowth") / 100, bY = num("buyYield") / 100, bD = num("buyDGR") / 100;
  const years = Math.max(1, Math.round(num("years", 10)));
  const divTax = num("divTax") / 100, gainsTax = num("gainsTax") / 100;
  const broker = num("brokerage") / 100, fx = num("fxSpread") / 100;
  const reinvest = $("reinvest").value === "1";

  const sellValue = sP * sS;
  const cost = sC * sS;
  const realizedGain = Math.max(0, sellValue - cost);
  const capTax = realizedGain * gainsTax;
  const sellFee = sellValue * broker;
  const sellFx = sellValue * fx;
  const net = sellValue - capTax - sellFee - sellFx;
  const buyFee = net * broker;
  const buyFx = net * fx;
  const deployed = net - buyFee - buyFx;

  const keep = project(sellValue, sG, sY, sD, years, divTax, reinvest);
  const sw = project(deployed, bG, bY, bD, years, divTax, reinvest);

  let be = null;
  for (let y = 1; y <= years; y++) {
    if (sw.history[y] >= keep.history[y]) { be = y; break; }
  }

  const reqCagr = solveCagr(deployed, keep.value, years, bY, bD, divTax, reinvest);
  const reqYield = solveYield(deployed, keep.value, years, sG, bD, divTax, reinvest);

  $("reqCagr").textContent = fmtPct(reqCagr);
  $("reqYield").textContent = fmtPct(reqYield);
  $("breakEven").textContent = be === null ? `>${years}年` : `${be}年目`;
  $("totalCost").textContent = fmt(sellValue - deployed, true);
  $("beNote").textContent = be === null
    ? `${years}年以内に追いつかない`
    : `投入額 ${fmt(deployed, true)} スタート`;

  drawCross(keep.history, sw.history, be);
  renderWaterfall(sellValue, capTax, sellFee, sellFx, buyFee, buyFx, deployed);
  renderHeatmap(deployed, keep, years, bD, divTax, reinvest, bG, bY);
}

function drawCross(keep, sw, be) {
  const c = $("crossChart"), ctx = c.getContext("2d");
  const r = c.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  const W = Math.max(320, r.width), H = Math.max(240, r.height);
  c.width = W * dpr; c.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const pad = { t: 28, r: 16, b: 30, l: 70 };
  const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
  const all = [...keep, ...sw];
  const yMin = Math.min(0, ...all), yMax = Math.max(...all);
  const yRange = (yMax - yMin) * 1.1 || 1;
  const years = keep.length - 1;
  const xFor = (y) => pad.l + (pw * y) / years;
  const yFor = (v) => pad.t + ph - ((v - yMin) / yRange) * ph;

  ctx.strokeStyle = "#e3ded3"; ctx.lineWidth = 1;
  ctx.fillStyle = "#6a665d"; ctx.font = "11px Inter, system-ui";
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yRange * i) / 4;
    const y = yFor(v);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillText(fmt(v, true), pad.l - 8, y);
  }
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  const step = years > 20 ? 5 : years > 10 ? 2 : 1;
  for (let y = 0; y <= years; y += step) ctx.fillText(String(y), xFor(y), H - pad.b + 8);

  const line = (data, color) => {
    ctx.beginPath();
    data.forEach((v, i) => { const x = xFor(i), y = yFor(v); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = "round"; ctx.stroke();
  };
  line(keep, "#c95f4f");
  line(sw, "#178c87");

  if (be !== null) {
    const x = xFor(be);
    ctx.strokeStyle = "rgba(197, 139, 22, 0.7)"; ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#c58b16"; ctx.font = "bold 12px Inter, system-ui";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText(`分岐 ${be}年`, x + 6, pad.t + 4);
  }

  ctx.font = "bold 11px Inter, system-ui";
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#c95f4f"; ctx.fillText("● 保持", pad.l + 6, pad.t - 14);
  ctx.fillStyle = "#178c87"; ctx.fillText("● スイッチ", pad.l + 60, pad.t - 14);
}

function renderWaterfall(sv, ct, sf, sx, bf, bx, dp) {
  const max = sv;
  const rows = [
    ["売却額", sv, "plus"],
    ["−譲渡益税", ct, "minus"],
    ["−売却手数料", sf, "minus"],
    ["−売却FX", sx, "minus"],
    ["−購入手数料", bf, "minus"],
    ["−購入FX", bx, "minus"],
    ["= 投入可能額", dp, "total"],
  ];
  $("waterfall").innerHTML = rows.map(([label, val, cls]) => {
    const w = max > 0 ? Math.max(0.5, (val / max) * 100) : 0;
    return `<div class="wf-row ${cls}"><span>${label}</span><div class="bar"><div style="width:${w}%"></div></div><strong>${fmt(val)}</strong></div>`;
  }).join("");
}

function renderHeatmap(deployed, keep, years, bD, divTax, reinvest, bG, bY) {
  const gs = [-0.04, -0.02, 0, 0.02, 0.04].map((d) => bG + d);
  const ys = [-0.01, -0.005, 0, 0.005, 0.01].map((d) => Math.max(0, bY + d));
  const header = `<div class="cell header">成長↓ / 利回り→</div>` +
    ys.map((y) => `<div class="cell header">${(y * 100).toFixed(2)}%</div>`).join("");
  const rows = gs.map((g) => {
    const cells = ys.map((y) => {
      const p = project(deployed, g, y, bD, years, divTax, reinvest);
      let be = null;
      for (let t = 1; t <= years; t++) {
        if (p.history[t] >= keep.history[t]) { be = t; break; }
      }
      const label = be === null ? `>${years}` : `${be}年`;
      let bg = "#fbe8e3", color = "#9c3528";
      if (be !== null) {
        const ratio = 1 - be / years;
        bg = `hsl(165, ${30 + ratio * 30}%, ${88 - ratio * 18}%)`;
        color = "#0f625f";
      }
      return `<div class="cell" style="background:${bg};color:${color};font-weight:800">${label}<span class="sub">${(g * 100).toFixed(1)}/${(y * 100).toFixed(2)}</span></div>`;
    }).join("");
    return `<div class="cell header">${(g * 100).toFixed(1)}%</div>${cells}`;
  }).join("");
  $("heatmap").innerHTML = header + rows;
}

document.querySelectorAll("input, select").forEach((el) => el.addEventListener("input", compute));
window.addEventListener("resize", compute);
compute();
    </script>
  </body>
</html>
