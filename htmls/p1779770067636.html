<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International 調整さん</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ============ THEME SYSTEM ============ */
.theme-cream{
  --bg:#f5ede0;--bgPattern:none;
  --card:#faf3e7;--card2:#ede0c8;
  --acc:#a8754a;--acc2:#8b5a3c;--accL:#ede0c8;
  --txt:#3d2817;--txt2:#8b6f4e;--txt3:#b8a589;
  --border:#d4c4a8;--border2:#c4b08c;
  --ok:#7a8e4e;--okBg:#ebebd0;
  --maybe:#c9a04a;--maybeBg:#f5ecd0;
  --ng:#b56b5a;--ngBg:#f0dcd6;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}
.theme-forest{
  --bg:#2d3e2b;--bgPattern:radial-gradient(circle at 20% 30%,rgba(184,212,160,.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(184,212,160,.04) 0%,transparent 50%);
  --card:#3a4e36;--card2:#465f42;
  --acc:#d4b878;--acc2:#b89a5c;--accL:#3a4e36;
  --txt:#f0ead8;--txt2:#c4bea8;--txt3:#8a9080;
  --border:#4d6647;--border2:#5d7657;
  --ok:#a8c878;--okBg:#3a4e36;
  --maybe:#e5c270;--maybeBg:#3a4536;
  --ng:#d49080;--ngBg:#4a3a36;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}
.theme-midnight{
  --bg:#161928;--bgPattern:radial-gradient(circle at 15% 25%,rgba(212,184,120,.05) 0%,transparent 40%),radial-gradient(circle at 85% 75%,rgba(120,140,200,.05) 0%,transparent 40%);
  --card:#1f2438;--card2:#2a3048;
  --acc:#d4b878;--acc2:#b89a5c;--accL:#2a3048;
  --txt:#e8eaf0;--txt2:#a4a8b8;--txt3:#6a6e80;
  --border:#2e3554;--border2:#3e4664;
  --ok:#7ec896;--okBg:#1f3528;
  --maybe:#e5c270;--maybeBg:#352f1f;
  --ng:#d48088;--ngBg:#35201f;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}
.theme-sakura{
  --bg:#f5e6e8;--bgPattern:radial-gradient(circle at 30% 20%,rgba(212,140,160,.06) 0%,transparent 40%),radial-gradient(circle at 70% 80%,rgba(212,140,160,.06) 0%,transparent 40%);
  --card:#faf0f1;--card2:#f0dde0;
  --acc:#c47888;--acc2:#a85e6e;--accL:#f0dde0;
  --txt:#4a2832;--txt2:#8b5e6a;--txt3:#b896a0;
  --border:#e0c8cc;--border2:#d0b4ba;
  --ok:#8aa878;--okBg:#e8eddc;
  --maybe:#d4a060;--maybeBg:#f5e8d0;
  --ng:#c06868;--ngBg:#f0d8d8;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}
.theme-ocean{
  --bg:#dde8ed;--bgPattern:radial-gradient(circle at 25% 30%,rgba(100,140,180,.08) 0%,transparent 45%),radial-gradient(circle at 75% 70%,rgba(140,180,200,.06) 0%,transparent 45%);
  --card:#eef4f7;--card2:#cfdde4;
  --acc:#3a6e8c;--acc2:#2a5878;--accL:#cfdde4;
  --txt:#1a2e3c;--txt2:#4d6878;--txt3:#8aa0ac;
  --border:#bcd0d8;--border2:#a8c0cc;
  --ok:#5a8c78;--okBg:#d8e8e0;
  --maybe:#c89a4a;--maybeBg:#f0e4cc;
  --ng:#b06868;--ngBg:#ecd8d8;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}
.theme-paper{
  --bg:#f8f6f0;--bgPattern:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.15 0 0 0 0 0.1 0 0 0 .04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  --card:#fdfcf7;--card2:#efe9d8;
  --acc:#2a2a2a;--acc2:#000000;--accL:#efe9d8;
  --txt:#1a1a1a;--txt2:#5a5a5a;--txt3:#9a9a9a;
  --border:#d8d2c0;--border2:#c0b8a4;
  --ok:#4a6e3a;--okBg:#e8ead0;
  --maybe:#b0883a;--maybeBg:#f0e8d0;
  --ng:#a04a3a;--ngBg:#f0dcd8;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Inter','Noto Sans JP',sans-serif;
}

body{
  background:var(--bg);background-image:var(--bgPattern);
  color:var(--txt);font-family:var(--sans);
  min-height:100vh;padding-bottom:3rem;
  transition:background .4s ease;
  font-weight:400;
}

/* ============ HEADER ============ */
header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
}
.logo{font-family:var(--serif);font-size:1.4rem;font-weight:600;letter-spacing:.02em;color:var(--txt)}
.logo .accent{color:var(--acc);font-style:italic}
.logo-sub{font-family:var(--sans);font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--txt3);margin-top:.1rem;font-weight:500}

/* Theme switcher */
.theme-switch{display:flex;align-items:center;gap:.4rem}
.theme-switch-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);font-weight:600;margin-right:.3rem}
.theme-dot{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid var(--border);transition:all .2s;
  position:relative;
}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--txt);transform:scale(1.1)}
.theme-dot.active::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px solid var(--txt2);
}

/* ============ CONTAINER ============ */
.container{max-width:820px;margin:0 auto;padding:1.5rem 1rem}

/* Converter strip */
.conv-strip{
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:.8rem 1.1rem;
  display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;
  margin-bottom:1.5rem;font-size:.85rem;
}
.conv-label{
  font-family:var(--serif);font-size:1rem;font-style:italic;color:var(--acc);
  letter-spacing:.02em;
}
.conv-strip select,.conv-strip input[type=time]{
  padding:.35rem .55rem;border:1px solid var(--border);
  border-radius:4px;font-size:.82rem;font-family:var(--sans);
  outline:none;background:var(--bg);color:var(--txt);
}
.conv-strip select:focus,.conv-strip input[type=time]:focus{border-color:var(--acc)}
.conv-arrow{color:var(--txt3);font-size:.85rem}
.conv-result{
  font-family:var(--serif);font-weight:600;font-size:1rem;color:var(--acc);
  min-width:90px;
}

/* ============ TABS (elegant serif style) ============ */
.tabs{
  display:flex;gap:0;margin-bottom:2rem;
  border-bottom:1px solid var(--border);
  position:relative;
}
.tab{
  padding:.7rem 1.4rem;font-size:.78rem;font-weight:500;
  color:var(--txt2);cursor:pointer;
  letter-spacing:.18em;text-transform:uppercase;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;user-select:none;
  font-family:var(--sans);
}
.tab .num{
  font-family:var(--serif);font-style:italic;font-size:.95rem;
  margin-right:.4rem;color:var(--txt3);text-transform:none;letter-spacing:0;
}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab.active .num{color:var(--acc)}
.tab:hover{color:var(--txt)}
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Section */
.section{margin-bottom:1.8rem}
.sec-label{
  font-family:var(--serif);font-style:italic;font-size:1.1rem;
  color:var(--txt);margin-bottom:.7rem;font-weight:500;
  display:flex;align-items:center;gap:.6rem;
}
.sec-label::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* Fields */
.field{
  width:100%;padding:.65rem .85rem;
  border:1px solid var(--border);border-radius:4px;
  font-size:.92rem;font-family:var(--sans);outline:none;
  background:var(--card);color:var(--txt);
  transition:border .15s;
}
.field:focus{border-color:var(--acc)}
.field::placeholder{color:var(--txt3);font-style:italic}
textarea.field{resize:vertical;min-height:75px;line-height:1.7}

/* Slot list */
.slot-list{display:flex;flex-direction:column;gap:.6rem}
.slot-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:.8rem 1rem;
  display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;
}
.slot-card input[type=date]{
  padding:.4rem .55rem;border:1px solid var(--border);
  border-radius:4px;font-size:.85rem;font-family:var(--sans);
  outline:none;background:var(--bg);color:var(--txt);
}
.slot-card input[type=date]:focus{border-color:var(--acc)}

/* Apple-style time picker */
.time-pick{
  display:inline-flex;align-items:center;
  background:var(--bg);border:1px solid var(--border);
  border-radius:4px;padding:.05rem .1rem;
  transition:border .15s;
}
.time-pick:hover{border-color:var(--border2)}
.time-pick:focus-within{border-color:var(--acc)}
.time-pick select{
  border:none;background:transparent;
  font-size:.92rem;font-family:var(--sans);
  outline:none;padding:.4rem .2rem;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  text-align:center;color:var(--txt);font-weight:500;
  font-variant-numeric:tabular-nums;
}
.time-pick select:focus{color:var(--acc)}
.time-pick .sep{
  color:var(--txt3);font-weight:600;font-size:.95rem;
  user-select:none;padding:0 .05rem;
}
.slot-dash{color:var(--txt3);font-size:.82rem;font-style:italic}

/* Buttons */
.btn-sm{
  padding:.4rem .85rem;border-radius:4px;
  font-size:.72rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--card);
  color:var(--txt);transition:all .15s;font-family:var(--sans);
  letter-spacing:.1em;text-transform:uppercase;
}
.btn-sm:hover{border-color:var(--acc);color:var(--acc)}
.btn-rm{
  color:var(--ng);border:1px solid transparent;background:none;
  font-size:1rem;padding:.25rem .55rem;line-height:1;
}
.btn-rm:hover{background:var(--ngBg);border-color:transparent}
.btn-primary{
  background:var(--acc);color:#fff;border-color:var(--acc);
  padding:.6rem 1.6rem;font-size:.74rem;
}
.btn-primary:hover{background:var(--acc2);border-color:var(--acc2);color:#fff}
.btn-row{display:flex;gap:.5rem;margin-top:.9rem;flex-wrap:wrap;align-items:center}
.slot-open-toggle{
  font-size:.7rem;color:var(--txt2);cursor:pointer;
  border:none;background:none;font-family:var(--sans);
  font-weight:500;padding:.25rem .5rem;letter-spacing:.06em;
  text-decoration:underline;text-underline-offset:3px;
  text-decoration-color:var(--border2);
}
.slot-open-toggle:hover{color:var(--acc);text-decoration-color:var(--acc)}

/* ============ ORGANIZER MESSAGE DISPLAY ============ */
.event-header{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:1.2rem 1.4rem;margin-bottom:1.5rem;
  position:relative;
}
.event-title-display{
  font-family:var(--serif);font-size:1.5rem;font-weight:600;
  color:var(--txt);letter-spacing:-.005em;line-height:1.3;
}
.event-divider{
  width:50px;height:1px;background:var(--acc);
  margin:.7rem 0 .8rem;
}
.event-msg{
  font-size:.9rem;line-height:1.75;color:var(--txt2);
  white-space:pre-line;
}

/* ============ VOTE FORM ============ */
.vote-form{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;
}
.vote-form-header{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:.9rem;
}
.vote-form-title{
  font-family:var(--serif);font-size:1.05rem;font-style:italic;
  color:var(--acc);font-weight:500;
}
.vote-form-cancel{
  font-size:.7rem;color:var(--txt2);cursor:pointer;
  background:none;border:none;font-family:var(--sans);
  letter-spacing:.1em;text-transform:uppercase;
}
.vote-form-cancel:hover{color:var(--ng)}

.vote-name-row{
  display:flex;gap:.6rem;margin-bottom:.9rem;flex-wrap:wrap;
}
.vote-name-row .field{flex:1;min-width:160px}

/* Slot selectors in form */
.vote-slot-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem}
.vote-slot-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.6rem .8rem;background:var(--bg);
  border:1px solid var(--border);border-radius:4px;
}
.vote-slot-info{flex:1;min-width:0}
.vote-slot-date{
  font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--txt);
}
.vote-slot-time{font-size:.78rem;color:var(--txt2);margin-top:.1rem;font-variant-numeric:tabular-nums}
.vote-btns{display:flex;gap:.3rem;flex-shrink:0}
.vb{
  width:36px;height:36px;border-radius:4px;
  border:1px solid var(--border);background:var(--card);
  cursor:pointer;font-size:1rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-family:var(--sans);color:var(--txt2);
}
.vb:hover{transform:scale(1.05);border-color:var(--border2)}
.vb[data-v="ok"].sel{background:var(--okBg);border-color:var(--ok);color:var(--ok)}
.vb[data-v="maybe"].sel{background:var(--maybeBg);border-color:var(--maybe);color:var(--maybe)}
.vb[data-v="ng"].sel{background:var(--ngBg);border-color:var(--ng);color:var(--ng)}

/* ============ RESPONSE TABLE ============ */
.resp-section-title{
  font-family:var(--serif);font-style:italic;font-size:1.1rem;
  color:var(--txt);margin-bottom:.8rem;
}
.resp-section-title .count{
  font-family:var(--sans);font-size:.7rem;font-style:normal;
  color:var(--txt3);margin-left:.5rem;letter-spacing:.1em;
  text-transform:uppercase;
}

.resp-list{display:flex;flex-direction:column;gap:.3rem}
.resp-row{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:.7rem .9rem;
  display:grid;gap:.5rem;
  transition:border .15s;
  cursor:pointer;
}
.resp-row:hover{border-color:var(--acc)}
.resp-row-head{
  display:flex;justify-content:space-between;align-items:center;
}
.resp-name{
  font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--txt);
}
.resp-edit-hint{
  font-size:.62rem;color:var(--txt3);
  letter-spacing:.12em;text-transform:uppercase;
}
.resp-row:hover .resp-edit-hint{color:var(--acc)}
.resp-answers{display:flex;gap:.4rem;flex-wrap:wrap}
.resp-ans{
  display:flex;align-items:center;gap:.3rem;
  font-size:.75rem;color:var(--txt2);
  padding:.2rem .5rem;border-radius:3px;
  background:var(--bg);font-variant-numeric:tabular-nums;
}
.resp-ans .mark{font-weight:700}
.resp-ans.ok .mark{color:var(--ok)}
.resp-ans.maybe .mark{color:var(--maybe)}
.resp-ans.ng .mark{color:var(--ng)}
.resp-comment{
  font-size:.82rem;color:var(--txt2);line-height:1.6;
  padding:.5rem .7rem;background:var(--bg);
  border-left:2px solid var(--acc);border-radius:0 3px 3px 0;
  font-style:italic;white-space:pre-line;
}

.empty-state{
  color:var(--txt3);font-size:.85rem;
  padding:2rem;text-align:center;font-style:italic;
  font-family:var(--serif);font-size:.95rem;
  border:1px dashed var(--border);border-radius:4px;
}

/* ============ FINALIZE ============ */
.fin-row{
  display:flex;align-items:center;gap:1rem;
  padding:.9rem 1.1rem;border:1px solid var(--border);
  border-radius:4px;margin-bottom:.5rem;cursor:pointer;
  transition:all .15s;background:var(--card);
}
.fin-row:hover{border-color:var(--acc)}
.fin-row.selected{border-color:var(--acc);background:var(--accL);border-width:2px;padding:calc(.9rem - 1px) calc(1.1rem - 1px)}
.fin-radio{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.fin-row.selected .fin-radio{border-color:var(--acc);background:var(--acc)}
.fin-row.selected .fin-radio::after{
  content:'';width:7px;height:7px;border-radius:50%;background:var(--card);
}
.fin-info{flex:1;min-width:0}
.fin-date{
  font-family:var(--serif);font-weight:600;font-size:1rem;color:var(--txt);
}
.fin-time{font-size:.78rem;color:var(--txt2);margin-top:.15rem;font-variant-numeric:tabular-nums}
.fin-tally{
  font-size:.72rem;color:var(--txt2);text-align:right;
  display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;
}
.fin-tally-counts{display:flex;gap:.5rem;font-variant-numeric:tabular-nums}
.fin-tally-counts .ok{color:var(--ok);font-weight:600}
.fin-tally-counts .maybe{color:var(--maybe);font-weight:600}
.fin-tally-names{font-size:.65rem;color:var(--txt3);max-width:200px;text-align:right;font-style:italic}

/* Share box */
.share-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:1.3rem 1.4rem;
  font-size:.88rem;line-height:1.85;color:var(--txt);
  white-space:pre-line;position:relative;margin-top:1rem;
  display:none;font-family:var(--sans);
}
.share-box.show{display:block}
.share-box .copy-btn{position:absolute;top:.7rem;right:.7rem}
.copy-btn{
  padding:.4rem .85rem;border-radius:3px;
  font-size:.66rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg);
  color:var(--txt2);transition:all .15s;font-family:var(--sans);
  text-transform:uppercase;letter-spacing:.12em;
}
.copy-btn:hover{border-color:var(--acc);color:var(--acc)}
.copy-btn.copied{background:var(--ok);color:#fff;border-color:var(--ok)}

@media(max-width:600px){
  .slot-card{flex-direction:column;align-items:stretch;gap:.5rem}
  .conv-strip{gap:.5rem}
  header{padding:.8rem 1rem}
  .logo{font-size:1.2rem}
  .container{padding:1rem .8rem}
  .tab{padding:.55rem .8rem;font-size:.7rem;letter-spacing:.1em}
  .theme-switch-label{display:none}
}
</style>
</head>
<body class="theme-cream">

<header>
  <div>
    <div class="logo">International <span class="accent">調整さん</span></div>
    <div class="logo-sub">Scheduling across time zones</div>
  </div>
  <div class="theme-switch" id="themeSwitch">
    <span class="theme-switch-label">Wallpaper</span>
  </div>
</header>

<div class="container">

  <!-- Time Converter -->
  <div class="conv-strip">
    <span class="conv-label">Time Converter</span>
    <select id="convFrom"></select>
    <input type="time" id="convTime" value="12:00">
    <span class="conv-arrow">&rarr;</span>
    <span class="conv-result" id="convOut">&mdash;</span>
    <select id="convTo"></select>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="setup"><span class="num">i.</span>Setup</div>
    <div class="tab" data-tab="vote"><span class="num">ii.</span>Respond</div>
    <div class="tab" data-tab="result"><span class="num">iii.</span>Finalize</div>
  </div>

  <!-- ===== SETUP ===== -->
  <div class="panel active" id="panel-setup">
    <div class="section">
      <div class="sec-label">Event Title</div>
      <input class="field" id="eventTitle" value="ネパールチームとの打ち合わせ" placeholder="Meeting title">
    </div>
    <div class="section">
      <div class="sec-label">Organizer Message</div>
      <textarea class="field" id="orgMessage" placeholder="Agenda, preparation, meeting link, dial-in details..."></textarea>
    </div>
    <div class="section">
      <div class="sec-label">Candidate Times</div>
      <div class="slot-list" id="slotList"></div>
      <div class="btn-row">
        <button class="btn-sm" onclick="addSlot()">+ Add candidate</button>
        <button class="btn-sm btn-primary" onclick="switchTab('vote')">Continue to Respond &rarr;</button>
      </div>
    </div>
  </div>

  <!-- ===== VOTE ===== -->
  <div class="panel" id="panel-vote">
    <div class="event-header" id="eventHeaderDisplay"></div>

    <!-- Vote form -->
    <div class="vote-form" id="voteForm">
      <div class="vote-form-header">
        <span class="vote-form-title" id="voteFormTitle">New response</span>
        <button class="vote-form-cancel" id="voteFormCancel" onclick="cancelEdit()" style="display:none">Cancel edit</button>
      </div>
      <div class="vote-name-row">
        <input class="field" id="voterName" placeholder="Your name">
      </div>
      <div class="vote-slot-list" id="voteSlotList"></div>
      <textarea class="field" id="voterComment" placeholder="Comment (optional) — preferred slot, conditions, notes..." style="margin-bottom:.9rem"></textarea>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn-sm btn-primary" onclick="submitVote()" id="submitBtn">Submit response</button>
      </div>
    </div>

    <!-- Responses list -->
    <div class="section">
      <div class="resp-section-title">Responses <span class="count" id="respCount">0 people</span></div>
      <div id="respList"></div>
    </div>
  </div>

  <!-- ===== RESULT ===== -->
  <div class="panel" id="panel-result">
    <div class="event-header" id="eventHeaderDisplay2"></div>
    <div class="section">
      <div class="sec-label">Select Final Date</div>
      <div id="finalizeList"></div>
    </div>
    <div class="section">
      <div class="sec-label">Confirmation Message</div>
      <div id="shareEmpty" class="empty-state">Select a candidate above to generate the confirmation message.</div>
      <div class="share-box" id="shareBox">
        <button class="copy-btn" onclick="copyShare(this)">Copy</button>
      </div>
    </div>
  </div>

</div>

<script>
// ============ TIMEZONE ENGINE ============
const ZONES=[
  {id:'JST',label:'JST (UTC+9)',offset:540},
  {id:'NPT',label:'NPT (UTC+5:45)',offset:345},
  {id:'IST',label:'IST (UTC+5:30)',offset:330},
  {id:'UTC',label:'UTC',offset:0},
  {id:'EST',label:'EST (UTC-5)',offset:-300},
  {id:'CST',label:'CST (UTC-6)',offset:-360},
  {id:'PST',label:'PST (UTC-8)',offset:-480},
  {id:'CET',label:'CET (UTC+1)',offset:60},
  {id:'SGT',label:'SGT (UTC+8)',offset:480},
  {id:'KST',label:'KST (UTC+9)',offset:540},
  {id:'AEST',label:'AEST (UTC+10)',offset:600},
  {id:'GST',label:'GST (UTC+4)',offset:240},
  {id:'GMT',label:'GMT (UTC+0)',offset:0},
];

function convertTime(hhmm,fromId,toId){
  const f=ZONES.find(z=>z.id===fromId),t=ZONES.find(z=>z.id===toId);
  if(!f||!t||!hhmm)return'';
  const[h,m]=hhmm.split(':').map(Number);
  let tot=h*60+m-f.offset+t.offset;
  while(tot<0)tot+=1440;while(tot>=1440)tot-=1440;
  return pad(Math.floor(tot/60))+':'+pad(tot%60);
}
function pad(n){return String(n).padStart(2,'0')}
function dayJP(d){return['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()]}
function dayEN(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(d+'T00:00:00').getDay()]}
const MONTHS_EN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ============ TIME PICKER (1-min granularity, Apple-style) ============
const HOURS=[...Array(24)].map((_,i)=>pad(i));
const MINUTES=[...Array(60)].map((_,i)=>pad(i));

function buildTimePicker(idBase,defH,defM){
  const wrap=document.createElement('div');
  wrap.className='time-pick';
  const hSel=document.createElement('select');hSel.id=idBase+'_h';
  HOURS.forEach(h=>{const o=document.createElement('option');o.value=h;o.textContent=h;if(h===defH)o.selected=true;hSel.appendChild(o)});
  const sep=document.createElement('span');sep.className='sep';sep.textContent=':';
  const mSel=document.createElement('select');mSel.id=idBase+'_m';
  MINUTES.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===defM)o.selected=true;mSel.appendChild(o)});
  wrap.append(hSel,sep,mSel);
  return wrap;
}

// ============ STATE ============
let slots=[
  {date:'2026-05-28',startH:'12',startM:'00',endH:'16',endM:'00',open:false},
  {date:'2026-05-29',startH:'11',startM:'00',endH:'19',endM:'00',open:false},
  {date:'2026-06-01',startH:'12',startM:'00',endH:'16',endM:'00',open:false},
  {date:'2026-06-01',startH:'18',startM:'00',endH:'',endM:'',open:true},
];
let votes=[]; // [{name, choices:[], comment:''}]
let currentVote=[];
let editingIdx=-1;
let finalizedIdx=-1;

function slotStart(s){return s.startH+':'+s.startM}
function slotEnd(s){return s.open?'':(s.endH+':'+s.endM)}
function slotTimeStr(s){return s.open?slotStart(s)+' onwards':slotStart(s)+' – '+slotEnd(s)}
function slotDateStr(s){const d=s.date.split('-');return parseInt(d[1])+'/'+parseInt(d[2])+' ('+dayJP(s.date)+')'}
function slotDateStrEN(s){const d=s.date.split('-');return dayEN(s.date)+', '+MONTHS_EN[parseInt(d[1])]+' '+parseInt(d[2])}

// ============ THEME SWITCHER ============
const THEMES=[
  {id:'cream',color:'#a8754a',label:'Cream'},
  {id:'forest',color:'#2d3e2b',label:'Forest'},
  {id:'midnight',color:'#161928',label:'Midnight'},
  {id:'sakura',color:'#c47888',label:'Sakura'},
  {id:'ocean',color:'#3a6e8c',label:'Ocean'},
  {id:'paper',color:'#1a1a1a',label:'Paper'},
];
let currentTheme='cream';
function renderThemeSwitch(){
  const el=document.getElementById('themeSwitch');
  THEMES.forEach(t=>{
    const d=document.createElement('span');
    d.className='theme-dot'+(t.id===currentTheme?' active':'');
    d.style.background=t.color;
    d.title=t.label;
    d.onclick=()=>{
      currentTheme=t.id;
      document.body.className='theme-'+t.id;
      el.querySelectorAll('.theme-dot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
    };
    el.appendChild(d);
  });
}

// ============ CONVERTER ============
function initConverter(){
  const fS=document.getElementById('convFrom'),tS=document.getElementById('convTo');
  fS.innerHTML=ZONES.map(z=>`<option value="${z.id}"${z.id==='JST'?' selected':''}>${z.label}</option>`).join('');
  tS.innerHTML=ZONES.map(z=>`<option value="${z.id}"${z.id==='NPT'?' selected':''}>${z.label}</option>`).join('');
  const calc=()=>{
    const r=convertTime(document.getElementById('convTime').value,fS.value,tS.value);
    document.getElementById('convOut').textContent=r?r+' '+tS.value:'\u2014';
  };
  fS.onchange=tS.onchange=document.getElementById('convTime').oninput=calc;
  calc();
}

// ============ SLOT SETUP ============
function renderSlots(){
  const list=document.getElementById('slotList');
  list.innerHTML='';
  slots.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='slot-card';

    const dateIn=document.createElement('input');
    dateIn.type='date';dateIn.value=s.date;
    dateIn.onchange=()=>{slots[i].date=dateIn.value};

    const startPick=buildTimePicker('s'+i+'s',s.startH,s.startM);
    startPick.querySelectorAll('select').forEach(sel=>{
      sel.onchange=()=>{
        slots[i].startH=document.getElementById('s'+i+'s_h').value;
        slots[i].startM=document.getElementById('s'+i+'s_m').value;
      };
    });

    const dash=document.createElement('span');
    dash.className='slot-dash';
    dash.textContent=s.open?'onwards':'until';

    let endPick;
    if(!s.open){
      endPick=buildTimePicker('s'+i+'e',s.endH||'17',s.endM||'00');
      endPick.querySelectorAll('select').forEach(sel=>{
        sel.onchange=()=>{
          slots[i].endH=document.getElementById('s'+i+'e_h').value;
          slots[i].endM=document.getElementById('s'+i+'e_m').value;
        };
      });
    }

    const toggleBtn=document.createElement('button');
    toggleBtn.className='slot-open-toggle';
    toggleBtn.textContent=s.open?'set end':'open-ended';
    toggleBtn.onclick=()=>{
      slots[i].open=!slots[i].open;
      if(!slots[i].open&&!slots[i].endH){slots[i].endH='17';slots[i].endM='00'}
      renderSlots();
    };

    const rmBtn=document.createElement('button');
    rmBtn.className='btn-sm btn-rm';rmBtn.innerHTML='&times;';
    rmBtn.title='Remove this slot';
    rmBtn.onclick=()=>{slots.splice(i,1);renderSlots()};

    card.append(dateIn,startPick,dash);
    if(endPick)card.append(endPick);
    card.append(toggleBtn,rmBtn);
    list.appendChild(card);
  });
}

function addSlot(){
  const last=slots[slots.length-1];
  const d=last?last.date:new Date().toISOString().split('T')[0];
  slots.push({date:d,startH:'10',startM:'00',endH:'17',endM:'00',open:false});
  renderSlots();
}

// ============ EVENT HEADER DISPLAY ============
function renderEventHeader(){
  const title=document.getElementById('eventTitle').value.trim();
  const msg=document.getElementById('orgMessage').value.trim();
  const html=(title?`<div class="event-title-display">${esc(title)}</div>`:'')+
    (title?`<div class="event-divider"></div>`:'')+
    (msg?`<div class="event-msg">${esc(msg)}</div>`:'<div class="event-msg" style="color:var(--txt3);font-style:italic">No additional details from the organizer.</div>');
  document.getElementById('eventHeaderDisplay').innerHTML=html;
  document.getElementById('eventHeaderDisplay2').innerHTML=html;
}

// ============ VOTE FORM ============
function renderVoteForm(){
  const list=document.getElementById('voteSlotList');
  list.innerHTML='';
  slots.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='vote-slot-row';
    row.innerHTML=`
      <div class="vote-slot-info">
        <div class="vote-slot-date">${slotDateStr(s)}</div>
        <div class="vote-slot-time">${slotTimeStr(s)}</div>
      </div>
      <div class="vote-btns">
        <button class="vb${currentVote[i]==='ok'?' sel':''}" data-v="ok" data-i="${i}" onclick="setVote(${i},'ok',this)">○</button>
        <button class="vb${currentVote[i]==='maybe'?' sel':''}" data-v="maybe" data-i="${i}" onclick="setVote(${i},'maybe',this)">△</button>
        <button class="vb${currentVote[i]==='ng'?' sel':''}" data-v="ng" data-i="${i}" onclick="setVote(${i},'ng',this)">×</button>
      </div>`;
    list.appendChild(row);
  });
}

function setVote(i,val,btn){
  currentVote[i]=val;
  document.querySelectorAll(`.vb[data-i="${i}"]`).forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function submitVote(){
  const name=document.getElementById('voterName').value.trim();
  const comment=document.getElementById('voterComment').value.trim();
  if(!name){alert('Please enter your name / 名前を入力してください');return}
  if(currentVote.some(v=>!v)){alert('Please answer every candidate / すべての候補に回答してください');return}
  if(editingIdx>=0){
    votes[editingIdx]={name,choices:[...currentVote],comment};
  }else{
    votes.push({name,choices:[...currentVote],comment});
  }
  resetVoteForm();
  renderRespList();
}

function editVote(i){
  editingIdx=i;
  const v=votes[i];
  document.getElementById('voterName').value=v.name;
  document.getElementById('voterComment').value=v.comment||'';
  currentVote=[...v.choices];
  document.getElementById('voteFormTitle').textContent='Editing: '+v.name;
  document.getElementById('voteFormCancel').style.display='inline';
  document.getElementById('submitBtn').textContent='Save changes';
  renderVoteForm();
  document.getElementById('voteForm').scrollIntoView({behavior:'smooth',block:'start'});
}

function cancelEdit(){
  editingIdx=-1;
  resetVoteForm();
}

function resetVoteForm(){
  editingIdx=-1;
  currentVote=slots.map(()=>'');
  document.getElementById('voterName').value='';
  document.getElementById('voterComment').value='';
  document.getElementById('voteFormTitle').textContent='New response';
  document.getElementById('voteFormCancel').style.display='none';
  document.getElementById('submitBtn').textContent='Submit response';
  renderVoteForm();
}

// ============ RESPONSES LIST ============
function renderRespList(){
  const el=document.getElementById('respList');
  document.getElementById('respCount').textContent=votes.length+' '+(votes.length===1?'person':'people');
  if(votes.length===0){
    el.innerHTML='<div class="empty-state">No responses yet. Be the first.</div>';
    return;
  }
  el.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='resp-list';
  votes.forEach((v,vi)=>{
    const row=document.createElement('div');
    row.className='resp-row';
    row.onclick=()=>editVote(vi);
    let answers='';
    v.choices.forEach((c,ci)=>{
      const sym=c==='ok'?'○':c==='maybe'?'△':'×';
      const cls=c;
      answers+=`<span class="resp-ans ${cls}"><span class="mark">${sym}</span>${slotDateStr(slots[ci])} ${slotStart(slots[ci])}</span>`;
    });
    row.innerHTML=`
      <div class="resp-row-head">
        <span class="resp-name">${esc(v.name)}</span>
        <span class="resp-edit-hint">Click to edit ›</span>
      </div>
      <div class="resp-answers">${answers}</div>
      ${v.comment?`<div class="resp-comment">${esc(v.comment)}</div>`:''}`;
    wrap.appendChild(row);
  });
  el.appendChild(wrap);
}

// ============ FINALIZE ============
function renderFinalizeList(){
  const el=document.getElementById('finalizeList');
  if(votes.length===0){
    el.innerHTML='<div class="empty-state">Awaiting responses. Once people respond, you can choose a final date here.</div>';
    return;
  }
  let html='';
  slots.forEach((s,i)=>{
    let ok=0,maybe=0,okNames=[],maybeNames=[];
    votes.forEach(v=>{
      if(v.choices[i]==='ok'){ok++;okNames.push(v.name)}
      else if(v.choices[i]==='maybe'){maybe++;maybeNames.push(v.name)}
    });
    const allNames=[...okNames,...maybeNames.map(n=>n+'(?)')];
    const sel=finalizedIdx===i?'selected':'';
    html+=`<div class="fin-row ${sel}" onclick="finalize(${i})">
      <div class="fin-radio"></div>
      <div class="fin-info">
        <div class="fin-date">${slotDateStr(s)}</div>
        <div class="fin-time">${slotTimeStr(s)}</div>
      </div>
      <div class="fin-tally">
        <div class="fin-tally-counts"><span class="ok">○ ${ok}</span><span class="maybe">△ ${maybe}</span></div>
        ${allNames.length?`<div class="fin-tally-names">${esc(allNames.join(', '))}</div>`:''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function finalize(i){
  finalizedIdx=i;
  renderFinalizeList();
  renderShareMessage();
}

function renderShareMessage(){
  const box=document.getElementById('shareBox');
  const emptyEl=document.getElementById('shareEmpty');
  if(finalizedIdx<0){box.classList.remove('show');emptyEl.style.display='block';return}
  emptyEl.style.display='none';
  box.classList.add('show');

  const s=slots[finalizedIdx];
  const title=document.getElementById('eventTitle').value.trim()||'Meeting';
  const orgMsg=document.getElementById('orgMessage').value.trim();

  let attendees=[];
  votes.forEach(v=>{
    const c=v.choices[finalizedIdx];
    if(c==='ok')attendees.push(v.name);
    else if(c==='maybe')attendees.push(v.name+' (tentative)');
  });

  // Conversion to selected TZ in converter
  const convFrom=document.getElementById('convFrom').value;
  const convTo=document.getElementById('convTo').value;
  const targetTZ=(convTo==='JST')?convFrom:convTo;

  let msg='';
  msg+=`Subject: [Confirmed] ${title}\n\n`;
  msg+=`Dear all,\n\n`;
  msg+=`Thank you for responding. The date for our meeting has been confirmed as follows:\n\n`;
  msg+=`  ${slotDateStrEN(s)}\n`;
  msg+=`  ${slotTimeStr(s)} JST (Japan Time)\n`;
  if(targetTZ!=='JST'){
    const cStart=convertTime(slotStart(s),'JST',targetTZ);
    const cEnd=slotEnd(s)?convertTime(slotEnd(s),'JST',targetTZ):'';
    const cStr=cEnd?cStart+' – '+cEnd:cStart+' onwards';
    msg+=`  ${cStr} ${targetTZ}\n`;
  }
  msg+='\n';
  if(orgMsg)msg+=orgMsg+'\n\n';
  if(attendees.length)msg+=`Confirmed attendees: ${attendees.join(', ')}\n\n`;
  msg+=`Please add this to your calendar and let me know if anything changes.\n\n`;
  msg+=`Best regards`;

  const btn=box.querySelector('.copy-btn');
  box.textContent=msg;
  box.prepend(btn);
}

function copyShare(btn){
  const box=document.getElementById('shareBox');
  const text=[...box.childNodes].filter(n=>n.nodeType===3).map(n=>n.textContent).join('');
  navigator.clipboard.writeText(text.trim()).then(()=>{
    btn.textContent='Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1500);
  });
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ============ TABS ============
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));
  if(name==='vote'){renderEventHeader();renderVoteForm();renderRespList()}
  if(name==='result'){renderEventHeader();renderFinalizeList();renderShareMessage()}
}
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>switchTab(t.dataset.tab)});

// ============ INIT ============
renderThemeSwitch();
initConverter();
renderSlots();
currentVote=slots.map(()=>'');
</script>
</body>
</html>
