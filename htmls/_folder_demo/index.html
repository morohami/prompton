<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folder layout demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="kicker">MULTI-FILE</div>
    <h1>3ファイル構成の<br>promptデモ。</h1>
    <ul class="files">
      <li><code>index.html</code><span class="check" data-file="html"></span></li>
      <li><code>style.css</code><span class="check" data-file="css"></span></li>
      <li><code>app.js</code><span class="check" data-file="js"></span></li>
    </ul>
    <p class="footnote">monolith ではなく <strong>htmls/&lt;id&gt;/</strong> フォルダから直接サーブされています。相対パスで <code>style.css</code> と <code>app.js</code> を解決。</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
