「Democratic」→ 競争的複数政党選挙＋政権交代の実績/可能性<br>
「People's」→ 国民の実効的政治参加の仕組み<br>
「Republic」→ 国家元首が世襲君主ではない（共和制の定義）

function proj(lat,lng,w,h){
const x=((lng+180)/360)*w;
const lr=lat*Math.PI/180;
const mn=Math.log(Math.tan(Math.PI/4+lr/2));
const y=h/2-w*mn/(2*Math.PI);
return[Math.max(6,Math.min(w-6,x)),Math.max(6,Math.min(h-6,y))];
}

function projRaw(lat,lng,w,h){
lat=Math.max(-85,Math.min(85,lat));
const x=((lng+180)/360)*w;
const lr=lat*Math.PI/180;
const mn=Math.log(Math.tan(Math.PI/4+lr/2));
const y=h/2-w*mn/(2*Math.PI);
return[x,y];
}

let af=null,sm=false;
const mc=document.getElementById('map'),tip=document.getElementById('tip'),dots=[];
const cvs=document.getElementById('wc');
let worldData=null;

function drawGeoFeatures(ctx,geojson,w,h,fill){
let features;
if(geojson.type==='FeatureCollection')features=geojson.features;
else if(geojson.type==='Feature')features=[geojson];
else return;
features.forEach(function(f){
const geom=f.geometry;
let polys;
if(geom.type==='Polygon')polys=[geom.coordinates];
else if(geom.type==='MultiPolygon')polys=geom.coordinates;
else return;
polys.forEach(function(polygon){
polygon.forEach(function(ring){
ctx.beginPath();
ring.forEach(function(c,i){
const p=projRaw(c[1],c[0],w,h);
if(i===0)ctx.moveTo(p[0],p[1]);
else ctx.lineTo(p[0],p[1]);
});
ctx.closePath();
if(fill)ctx.fill();
ctx.stroke();
});
});
});
}

function drawGeoLines(ctx,mesh,w,h){
if(!mesh||!mesh.coordinates)return;
ctx.beginPath();
mesh.coordinates.forEach(function(line){
line.forEach(function(c,i){
const p=projRaw(c[1],c[0],w,h);
if(i===0)ctx.moveTo(p[0],p[1]);
else ctx.lineTo(p[0],p[1]);
});
});
ctx.stroke();
}

function drawWorld(){
if(!worldData)return;
const rect=mc.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
const w=rect.width,h=rect.height;
cvs.width=w*dpr;cvs.height=h*dpr;
const ctx=cvs.getContext('2d');
ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);
const land=topojson.feature(worldData,worldData.objects.land);
ctx.fillStyle='rgba(139,122,94,0.07)';
ctx.strokeStyle='rgba(139,122,94,0.2)';
ctx.lineWidth=0.6;
drawGeoFeatures(ctx,land,w,h,true);
const borders=topojson.mesh(worldData,worldData.objects.countries,function(a,b){return a!==b});
ctx.strokeStyle='rgba(139,122,94,0.09)';
ctx.lineWidth=0.3;
drawGeoLines(ctx,borders,w,h);
}

async function loadWorld(){
try{
const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
worldData=await r.json();
drawWorld();
}catch(e){console.warn('Map data load failed:',e)}
}

function build(){
const r=mc.getBoundingClientRect(),w=r.width,h=r.height;
C.forEach((c,i)=>{
const[x,y]=proj(c[2],c[3],w,h);
const d=document.createElement('div');d.className='dot';
d.style.left=(x/w*100)+'%';d.style.top=(y/h*100)+'%';d.dataset.i=i;
d.addEventListener('mouseenter',e=>showTip(e,i));
d.addEventListener('mousemove',moveTip);
d.addEventListener('mouseleave',()=>tip.classList.remove('v'));
d.addEventListener('touchstart',e=>{e.preventDefault();showTip(e.touches[0],i)});
mc.appendChild(d);dots.push(d);
});
}
function showTip(e,i){
const[n,o,,,tags,sys,mo]=C[i];
document.getElementById('tn').textContent=n;
document.getElementById('to').textContent=o;
document.getElementById('ts2').textContent=sys;
const tm=document.getElementById('tm');
if(af&&sm){const m=getM(tags,mo,af);
const lb={match:'一致 / Match',partial:'部分一致 / Partial',mismatch:'矛盾 / Contradiction'};
tm.textContent=lb[m]||'';tm.className='tm '+(m==='match'?'ok':m==='partial'?'pa':'no');
tm.style.display=m?'inline-block':'none';}else{tm.style.display='none'}
const tt=document.getElementById('tt');tt.innerHTML='';
tags.forEach(t=>{const s=document.createElement('span');
s.className='tg '+(t==='d'?'td':t==='p'?'tp':'tr');
s.textContent=t==='d'?'DEMOCRATIC':t==='p'?"PEOPLE'S":'REPUBLIC';tt.appendChild(s);});
tip.classList.add('v');moveTip(e);
}
function moveTip(e){
const x=e.clientX||e.pageX,y=e.clientY||e.pageY;
let l=x+12,t=y+12;
if(l+340>window.innerWidth)l=x-340-12;
if(t+200>window.innerHeight)t=y-200-12;
tip.style.left=l+'px';tip.style.top=t+'px';
}
function filt(tags,f){
if(f==='d')return tags.includes('d');if(f==='p')return tags.includes('p');
if(f==='r')return tags.includes('r');if(f==='m')return tags.length>=2;return false;
}
function getM(tags,mo,f){
let w='match',h=false;
const ck=f==='m'?tags:(f==='d'?['d']:f==='p'?['p']:['r']);
ck.forEach(t=>{if(tags.includes(t)&&mo[t]){h=true;
if(mo[t]==='mismatch')w='mismatch';
else if(mo[t]==='partial'&&w!=='mismatch')w='partial';}});
return h?w:null;
}
function update(){
let tot=0,ok=0,no=0;
dots.forEach((d,i)=>{const tags=C[i][4],mo=C[i][6];d.className='dot';
if(!af)return;
if(filt(tags,af)){tot++;
if(sm){const m=getM(tags,mo,af);d.classList.add('hi',m==='match'?'ok':m==='mismatch'?'no':'pa');
if(m==='match')ok++;else if(m==='mismatch')no++;}
else{d.classList.add('hi','nu')}}else{d.classList.add('dim')}});
const s1=document.getElementById('s1'),s2=document.getElementById('s2'),s3=document.getElementById('s3');
if(af){document.getElementById('s1n').textContent=tot;s1.classList.add('v');
if(sm){document.getElementById('s2n').textContent=ok;document.getElementById('s3n').textContent=no;s2.classList.add('v');s3.classList.add('v')}
else{s2.classList.remove('v');s3.classList.remove('v')}}
else{s1.classList.remove('v');s2.classList.remove('v');s3.classList.remove('v')}
document.getElementById('leg').classList.toggle('v',!!(af&&sm));
updateList();
}
function updateList(){
const lh=document.getElementById('lh'),cl=document.getElementById('cl');cl.innerHTML='';
if(!af){lh.classList.remove('v');return}
const fl=C.map((c,i)=>({i,n:c[0],o:c[1],tags:c[4],sys:c[5],mo:c[6]})).filter(c=>filt(c.tags,af));
if(sm)fl.sort((a,b)=>{const ma=getM(a.tags,a.mo,af),mb=getM(b.tags,b.mo,af);
const o={mismatch:0,partial:1,match:2};return(o[ma]??1)-(o[mb]??1)});
const lb={d:'"Democratic"を含む国',p:'"People\'s"を含む国',r:'"Republic"を含む国',m:'複数の修飾語を含む国'};
lh.textContent=`${lb[af]} — ${fl.length}カ国`;lh.classList.add('v');
fl.forEach(c=>{const m=sm?getM(c.tags,c.mo,af):null;
const cd=document.createElement('div');cd.className='cc';
cd.innerHTML=`<div class="ci ${m==='match'?'ok':m==='mismatch'?'no':'pa'}"></div><div><div class="cn">${c.n}</div><div class="cs">${c.sys.split('\\n')[0]}</div></div>`;
cl.appendChild(cd)});
}
document.querySelectorAll('.cb').forEach(b=>b.addEventListener('click',()=>{
const f=b.dataset.f;if(af===f){af=null;b.classList.remove('on')}
else{document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));b.classList.add('on');af=f}
update()}));
document.getElementById('tog').addEventListener('click',function(){sm=!sm;this.classList.toggle('on',sm);update()});
build();
loadWorld();
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{dots.forEach(d=>d.remove());dots.length=0;build();drawWorld();update()},250)});
</script>
