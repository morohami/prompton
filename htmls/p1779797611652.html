<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京被災マップ — Step 12–14</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a0a0f;
    --bg-panel: #12121a;
    --bg-card: #1a1a28;
    --text-primary: #e8e6f0;
    --text-secondary: #8a88a0;
    --border: #2a2a3e;
    --accent: #6e6eff;
    --sidebar-w: 340px;

    --war-crimson: #cc2255;
    --fire-red: #ff4444;
    --quake-orange: #ff8c1a;
    --water-blue: #1a9fff;
    --hazard-yellow: #f0c030;
    --price-green: #30d98a;
  }

  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg-dark);
    font-family: 'Zen Kaku Gothic New', system-ui, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }

  /* === Layout === */
  #sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100vh;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    box-shadow: 4px 0 16px rgba(0,0,0,0.4);
    display: flex; flex-direction: column;
    z-index: 1000;
  }
  #map {
    position: fixed; top: 0; left: var(--sidebar-w);
    width: calc(100vw - var(--sidebar-w)); height: 100vh;
    background: var(--bg-dark);
  }

  /* === Sidebar === */
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    margin: 0 0 4px;
    font-size: 20px; font-weight: 900;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--fire-red), var(--quake-orange), var(--water-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sidebar-header .subtitle {
    font-size: 11px; color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .sidebar-body {
    flex: 1; overflow-y: auto;
    padding: 16px 16px 24px;
    position: relative;
  }
  .sidebar-body::-webkit-scrollbar { width: 8px; }
  .sidebar-body::-webkit-scrollbar-track { background: transparent; }
  .sidebar-body::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 4px;
  }
  .sidebar-body::-webkit-scrollbar-thumb:hover { background: #3a3a52; }

  .section-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; color: var(--text-secondary);
    text-transform: uppercase;
    margin: 8px 4px 10px;
  }

  /* カテゴリ行 / アコーディオン / トグル */
  .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .cat-group {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .cat-group:hover { border-color: #3a3a52; }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.2s;
  }
  .cat-row:hover { background: #20203a; }
  .cat-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
    flex-shrink: 0;
    transition: opacity 0.2s, box-shadow 0.2s;
  }
  .cat-label { flex: 1; font-size: 13px; font-weight: 700; }
  .cat-count {
    font-size: 11px; color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    min-width: 20px; text-align: right;
  }
  .cat-expand {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 22px; height: 22px;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.25s ease, background 0.15s, border-color 0.15s;
    padding: 0;
  }
  .cat-expand:hover { background: #2a2a3e; border-color: #4a4a62; color: var(--text-primary); }
  .cat-group.expanded .cat-expand { transform: rotate(180deg); }

  /* OFF 状態：カテゴリ全体／個別レイヤー */
  .cat-row.off .cat-dot,
  .layer-row.off .layer-dot {
    opacity: 0.25;
    box-shadow: none;
    background: transparent !important;
    border: 1px solid currentColor;
  }
  .cat-row.off .cat-label,
  .layer-row.off .layer-name {
    color: var(--text-secondary);
    text-decoration: line-through;
    text-decoration-color: rgba(138,136,160,0.4);
  }

  /* アコーディオン: 子レイヤー */
  .cat-children {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    border-top: 0 solid var(--border);
  }
  .cat-group.expanded .cat-children {
    max-height: 600px;
    border-top: 1px solid var(--border);
  }
  .layer-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px 8px 18px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.2s;
    border-top: 1px solid rgba(42,42,62,0.5);
  }
  .layer-row:first-child { border-top: none; }
  .layer-row:hover { background: #20203a; }
  .layer-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .layer-name { flex: 1; font-weight: 700; }
  .layer-year {
    font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  /* 「すべて表示/非表示」ヘッダ操作 */
  .cat-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin: -2px 4px 8px;
  }
  .cat-actions .bulk {
    background: transparent; border: none;
    color: var(--text-secondary);
    font: inherit; font-size: 10px;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .cat-actions .bulk:hover { color: var(--accent); }
  .cat-actions .sep { color: var(--border); }

  .sidebar-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.05em;
  }
  .sidebar-footer .step-badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-weight: 700;
    margin-right: 8px;
  }

  /* === Default sidebar content & history view: 切替 === */
  .sb-default { display: block; }
  .sb-history { display: none; }
  .sidebar-body.show-history .sb-default { display: none; }
  .sidebar-body.show-history .sb-history { display: block; }

  /* === History panel === */
  .hp-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .hp-back {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font: inherit; font-size: 12px; font-weight: 700;
    padding: 6px 12px; border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .hp-back:hover { background: #20203a; border-color: #3a3a52; }
  .hp-coords {
    flex: 1; font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }
  .hp-title {
    font-size: 13px; font-weight: 900;
    margin: 4px 0 14px;
    color: var(--text-primary);
  }
  .hp-title .accent { color: var(--accent); }

  .hp-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 12px;
    line-height: 1.5;
    position: relative;
  }
  .hp-card-year {
    font-size: 18px; font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .hp-card-cat {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px; border-radius: 3px;
    color: #0a0a0f;
    text-transform: uppercase;
    vertical-align: 2px;
    margin-left: 6px;
  }
  .hp-card-name {
    font-size: 13px; font-weight: 700;
    margin-top: 4px;
  }
  .hp-card-sublabel {
    font-size: 11px; color: var(--accent);
    margin-top: 2px;
  }
  .hp-card-desc {
    color: var(--text-secondary);
    margin-top: 6px;
    font-size: 11px;
    line-height: 1.55;
  }
  .hp-empty {
    text-align: center; padding: 32px 12px;
    color: var(--text-secondary);
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 12px;
  }
  .hp-empty .icon { font-size: 28px; margin-bottom: 6px; opacity: 0.6; }

  /* クリック位置マーカー（パルス） */
  .click-pulse {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(110, 110, 255, 0.6);
    animation: click-pulse 1.5s ease-out infinite;
    border: 2px solid #fff;
    transform: translate(-50%, -50%);
  }
  @keyframes click-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(110, 110, 255, 0.7); }
    70%  { box-shadow: 0 0 0 18px rgba(110, 110, 255, 0); }
    100% { box-shadow: 0 0 0 0   rgba(110, 110, 255, 0); }
  }

  /* === Leaflet ダーク === */
  .leaflet-tile-pane {
    filter: invert(0.92) hue-rotate(180deg) brightness(0.95) contrast(0.85) saturate(0.7);
  }
  .leaflet-control-attribution {
    background: rgba(18,18,26,0.8) !important;
    color: var(--text-secondary) !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important;
    color: var(--text-primary) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: #22223a !important; }

  /* === ロード画面 === */
  #loader {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a28 0%, #0a0a0f 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-logo {
    font-size: 44px; font-weight: 900;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg,
      var(--war-crimson) 0%, var(--fire-red) 25%,
      var(--quake-orange) 50%, var(--water-blue) 80%,
      var(--accent) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logo-shift 4s ease-in-out infinite;
    margin-bottom: 8px; text-align: center;
  }
  .loader-en {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.32em;
    color: var(--text-secondary);
    margin-bottom: 36px;
    text-transform: uppercase;
  }
  @keyframes logo-shift {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .loader-bar {
    width: 220px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden; position: relative;
  }
  .loader-bar::after {
    content: ''; position: absolute; top: 0; left: -40%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--fire-red), var(--water-blue), transparent);
    animation: loader-sweep 1.4s ease-in-out infinite;
  }
  @keyframes loader-sweep {
    0% { left: -40%; } 100% { left: 100%; }
  }
  .loader-tagline {
    margin-top: 24px; font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
  }
  .loader-tagline .dot {
    display: inline-block; width: 4px; height: 4px;
    background: var(--accent); border-radius: 50%;
    margin: 0 6px; vertical-align: middle;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }

  /* ヒント */
  .map-hint {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(18,18,26,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 11px; color: var(--text-secondary);
    letter-spacing: 0.05em;
    z-index: 500;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .map-hint .kbd {
    display: inline-block;
    padding: 1px 6px; margin: 0 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-primary); font-weight: 700;
    font-size: 10px;
  }
  .map-hint.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- ロード画面 -->
<div id="loader">
  <div class="loader-logo">東京被災マップ</div>
  <div class="loader-en">TOKYO &nbsp;·&nbsp; DISASTER &nbsp;·&nbsp; ATLAS</div>
  <div class="loader-bar"></div>
  <div class="loader-tagline">
    武蔵国 400年の記憶を読み込み中<span class="dot"></span>
  </div>
</div>

<aside id="sidebar">
  <div class="sidebar-header">
    <h1>東京被災マップ</h1>
    <div class="subtitle">武蔵国 400年の被災史 × 現代ハザード</div>
  </div>

  <div class="sidebar-body" id="sidebar-body">
    <!-- デフォルトビュー -->
    <div class="sb-default">
      <div class="section-title">カテゴリ</div>
      <div class="cat-actions">
        <span style="font-size:10px;color:var(--text-secondary);letter-spacing:0.05em;">行クリック: 表示/非表示 ・ ▾: 一覧</span>
        <span>
          <button class="bulk" id="bulk-on">全表示</button>
          <span class="sep">|</span>
          <button class="bulk" id="bulk-off">全非表示</button>
        </span>
      </div>
      <div class="cat-list" id="cat-list"><!-- JS が描画 --></div>
      <div class="section-title">タイムライン</div>
      <div style="padding: 16px 12px; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 12px; text-align: center;">
        Step 15 で実装予定
      </div>
    </div>

    <!-- 履歴ビュー（クリック後に表示） -->
    <div class="sb-history" id="history-view">
      <div class="hp-head">
        <button class="hp-back" id="hp-back">← 戻る</button>
        <div class="hp-coords" id="hp-coords"></div>
      </div>
      <div class="hp-title" id="hp-title"></div>
      <div id="hp-results"></div>
    </div>
  </div>

  <div class="sidebar-footer">
    <span class="step-badge">Step 12–14</span>トグル + アコーディオン + 履歴カード
  </div>
</aside>

<div id="map"></div>
<div class="map-hint" id="map-hint">
  地図を <span class="kbd">クリック</span> でその地点の被災履歴を表示
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// =====================================================================
//   CATEGORIES — カテゴリ定義
// =====================================================================
const CATEGORIES = {
  war:    { label: '戦争・内乱',  color: '#cc2255' },
  fire:   { label: '大火',        color: '#ff4444' },
  quake:  { label: '地震',        color: '#ff8c1a' },
  flood:  { label: '水害・台風',  color: '#1a9fff' },
  hazard: { label: '現代ハザード', color: '#f0c030' },
  price:  { label: '地価',        color: '#30d98a' }
};

// =====================================================================
//   LAYERS_DATA — 被災レイヤー
//
//   ★ スキーマ（後で破壊しないこと） ★
//   {
//     id:        'unique-string',
//     cat:       'war' | 'fire' | 'quake' | 'flood' | 'hazard' | 'price',
//     year:      数値（複数日にまたがる場合は代表年）,
//     name:      '表示名',
//     desc:      '説明文',
//     source:    '出典文字列（誰のどの資料か）',
//     precision: 'approx' | 'verified',
//     features:  GeoJSON Feature[]（標準形）
//   }
//
//   features は GeoJSON 標準なので、農研機構/国会図書館/内閣府の
//   GeoJSON を取得したら、その feature 配列で **丸ごと差し替え** 可能。
//   renderer / クリック判定はすべて features を参照するため、データ更新が
//   描画ロジックに影響しない設計。
//
//   座標順序は GeoJSON 仕様通り [longitude, latitude]（lat,lng ではない）。
// =====================================================================
const LAYERS_DATA = [
  // ───────── 戦争・内乱 ─────────
  {
    id: 'ueno-1868', cat: 'war', year: 1868,
    name: '上野戦争（彰義隊の戦い）',
    desc: '旧幕府軍・彰義隊と新政府軍が上野寛永寺で交戦。雨の中アームストロング砲が放たれ、わずか1日で彰義隊は壊滅。',
    source: '近似値（HANDOFF.md 同梱）',
    precision: 'approx',
    features: [
      { type:'Feature', properties:{label:'寛永寺（本営）'},      geometry:{type:'Point', coordinates:[139.7738, 35.7155]} },
      { type:'Feature', properties:{label:'黒門口（激戦地）'},    geometry:{type:'Point', coordinates:[139.7752, 35.7148]} },
      { type:'Feature', properties:{label:'不忍池畔（包囲戦）'},  geometry:{type:'Point', coordinates:[139.7706, 35.7128]} }
    ]
  },
  {
    id: 'airraid-1945-03-10', cat: 'war', year: 1945,
    name: '東京大空襲（3月10日）',
    desc: 'B-29 約300機が深川・本所・浅草など下町に焼夷弾を投下。約10万人が死亡、罹災者100万人超。',
    source: '近似値（HANDOFF.md 同梱）', precision: 'approx',
    features: [{ type:'Feature', properties:{}, geometry:{ type:'Polygon', coordinates:[[
      [139.785,35.745],[139.835,35.745],[139.860,35.730],[139.860,35.690],
      [139.830,35.670],[139.785,35.680],[139.785,35.745]
    ]] } }]
  },
  {
    id: 'airraid-1945-04-13', cat: 'war', year: 1945,
    name: '城北大空襲（4月13日）',
    desc: '王子・滝野川・荒川区を中心に焼夷弾。軍需工場と住宅密集地が標的に。',
    source: '近似値（HANDOFF.md 同梱）', precision: 'approx',
    features: [{ type:'Feature', properties:{}, geometry:{ type:'Polygon', coordinates:[[
      [139.715,35.770],[139.770,35.785],[139.815,35.770],[139.810,35.735],
      [139.760,35.730],[139.715,35.745],[139.715,35.770]
    ]] } }]
  },
  {
    id: 'airraid-1945-05-25', cat: 'war', year: 1945,
    name: '山の手大空襲（5月25日）',
    desc: '渋谷・新宿・港・世田谷東部の山の手地域を焼き払った最後の大空襲。皇居・赤坂離宮も延焼。',
    source: '近似値（HANDOFF.md 同梱）', precision: 'approx',
    features: [{ type:'Feature', properties:{}, geometry:{ type:'Polygon', coordinates:[[
      [139.685,35.690],[139.745,35.700],[139.770,35.680],[139.760,35.640],
      [139.700,35.635],[139.680,35.660],[139.685,35.690]
    ]] } }]
  },
  {
    id: 'airraid-1945-05-29', cat: 'war', year: 1945,
    name: '横浜大空襲（5月29日）',
    desc: 'B-29 約500機が横浜中心部を焼夷攻撃。市街地の42%が焼失、死者約8,000人。',
    source: '近似値（HANDOFF.md 同梱）', precision: 'approx',
    features: [{ type:'Feature', properties:{}, geometry:{ type:'Polygon', coordinates:[[
      [139.620,35.475],[139.660,35.495],[139.680,35.465],[139.665,35.430],
      [139.630,35.420],[139.620,35.475]
    ]] } }]
  },

  // ───────── 大火 ─────────
  {
    id: 'meireki-1657', cat: 'fire', year: 1657,
    name: '明暦の大火（振袖火事）',
    desc: '本郷丸山本妙寺から出火、3日間燃え続け江戸の60%以上が焼失。死者10万人超。江戸城天守も焼け落ち、再建されなかった。',

// =====================================================================
//   UTILITY
// =====================================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// =====================================================================
//   GEOMETRY HELPERS — クリック判定用（point-in-polygon, distance）
// =====================================================================

/** Ray casting algorithm. ring は [[lng,lat], ...] の閉じたリング */
function pointInRing(pt, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > pt[1]) !== (yj > pt[1])) &&
      (pt[0] < (xj - xi) * (pt[1] - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/**
 * Layer のいずれかの feature にクリック地点が含まれるか判定。
 * 含まれる場合、サブラベル（Point feature の場合）も返す。
 * Point: 500m 以内ならヒット
 * Polygon / MultiPolygon: 内包判定
 */
function hitsLayer(layer, latlng) {
  const pt = [latlng.lng, latlng.lat];  // [lng, lat]
  for (const f of layer.features) {
    const g = f.geometry;
    if (!g) continue;
    if (g.type === 'Point') {
      const [lng, lat] = g.coordinates;
      const d = latlng.distanceTo(L.latLng(lat, lng));
      if (d < 500) return { hit: true, sublabel: f.properties && f.properties.label };
    } else if (g.type === 'Polygon') {
      for (const ring of g.coordinates) {
        if (pointInRing(pt, ring)) return { hit: true };
      }
    } else if (g.type === 'MultiPolygon') {
      for (const poly of g.coordinates) {
        for (const ring of poly) {
          if (pointInRing(pt, ring)) return { hit: true };
        }
      }
    }
  }
  return { hit: false };
}

// =====================================================================
//   メイン
// =====================================================================
document.addEventListener('DOMContentLoaded', function() {
  const INITIAL_BOUNDS = L.latLngBounds([35.45, 139.00], [36.20, 140.10]);

  const map = L.map('map', {
    zoomControl: false,
    minZoom: 8, maxZoom: 18
  });
  map.fitBounds(INITIAL_BOUNDS, { padding: [20, 20] });

  const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18, attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // ===================================================================
  //   レイヤー描画（GeoJSON 標準 → L.geoJSON）
  // ===================================================================
  const layerGroups = {}; // id -> L.GeoJSON

  function renderLayer(layer) {
    const color = CATEGORIES[layer.cat].color;
    const group = L.geoJSON({
      type: 'FeatureCollection',
      features: layer.features
    }, {
      style: () => ({
        color, fillColor: color,
        fillOpacity: 0.22, weight: 1.5, opacity: 0.85
      }),
      pointToLayer: (feat, latlng) => L.circleMarker(latlng, {
        radius: 8, color, fillColor: color,
        fillOpacity: 0.55, weight: 2, opacity: 0.9
      }),
      onEachFeature: (feat, leafletLayer) => {
        leafletLayer.on('click', e => {
          showHistory(e.latlng);
          L.DomEvent.stopPropagation(e);
        });
      }
    });
    group.addTo(map);
    layerGroups[layer.id] = group;
  }

  LAYERS_DATA.forEach(renderLayer);

  // ===================================================================
  //   表示状態 (Step 12) — カテゴリトグル / 個別レイヤートグル
  // ===================================================================
  const state = {
    catVisible:   {},  // catKey -> bool (default true)
    layerVisible: {},  // layer.id -> bool (default true)
    catExpanded:  {}   // catKey -> bool (default false)
  };
  Object.keys(CATEGORIES).forEach(k => state.catVisible[k] = true);
  LAYERS_DATA.forEach(l => state.layerVisible[l.id] = true);

  /** カテゴリ＆個別レイヤー両方が ON のときだけ描画 */
  function isLayerActive(layer) {
    return state.catVisible[layer.cat] && state.layerVisible[layer.id];
  }

  /** state を反映してマップに add/remove */
  function syncMap() {
    LAYERS_DATA.forEach(layer => {
      const g = layerGroups[layer.id];
      if (!g) return;
      if (isLayerActive(layer)) {
        if (!map.hasLayer(g)) g.addTo(map);
      } else {
        if (map.hasLayer(g)) map.removeLayer(g);
      }
    });
  }

  // ===================================================================
  //   サイドバー: カテゴリ＋アコーディオンを動的生成 (Step 13)
  // ===================================================================
  function buildSidebar() {
    const list = document.getElementById('cat-list');
    list.innerHTML = '';

    Object.entries(CATEGORIES).forEach(([catKey, cat]) => {
      const layersInCat = LAYERS_DATA.filter(l => l.cat === catKey);
      const count = layersInCat.length;

      const group = document.createElement('div');
      group.className = 'cat-group';
      group.dataset.cat = catKey;

      const childrenHtml = layersInCat.map(l => `
        <div class="layer-row" data-layer-id="${l.id}">
          <span class="layer-dot" style="background:${cat.color};color:${cat.color};"></span>
          <span class="layer-name">${escapeHtml(l.name)}</span>
          <span class="layer-year">${l.year}</span>
        </div>
      `).join('');

      group.innerHTML = `
        <div class="cat-row" data-cat="${catKey}">
          <span class="cat-dot" style="color:${cat.color};background:${cat.color};"></span>
          <span class="cat-label">${escapeHtml(cat.label)}</span>
          <span class="cat-count">${count > 0 ? count : '—'}</span>
          ${count > 0 ? '<button class="cat-expand" title="一覧を開く" aria-label="一覧を開く">▾</button>' : ''}
        </div>
        <div class="cat-children">${childrenHtml}</div>
      `;
      list.appendChild(group);
    });

    // --- カテゴリ行クリック：行＝トグル, ▾ボタン＝アコーディオン
    list.querySelectorAll('.cat-row').forEach(row => {
      const catKey = row.dataset.cat;
      row.addEventListener('click', (e) => {
        // ▾ ボタンならアコーディオン開閉のみ
        if (e.target.closest('.cat-expand')) {
          const group = row.parentElement;
          group.classList.toggle('expanded');
          state.catExpanded[catKey] = group.classList.contains('expanded');
          return;
        }
        // それ以外は表示トグル
        state.catVisible[catKey] = !state.catVisible[catKey];
        applyVisualState();
        syncMap();
      });
    });

    // --- 個別レイヤークリック：そのレイヤーのみトグル
    list.querySelectorAll('.layer-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = row.dataset.layerId;
        state.layerVisible[id] = !state.layerVisible[id];
        applyVisualState();
        syncMap();
      });
    });
  }

  /** state.catVisible / state.layerVisible を DOM に反映 */
  function applyVisualState() {
    document.querySelectorAll('#cat-list .cat-row').forEach(row => {
      const catKey = row.dataset.cat;
      row.classList.toggle('off', !state.catVisible[catKey]);
    });
    document.querySelectorAll('#cat-list .layer-row').forEach(row => {
      const id = row.dataset.layerId;
      const layer = LAYERS_DATA.find(l => l.id === id);
      const catOff = layer ? !state.catVisible[layer.cat] : false;
      // 個別 OFF または カテゴリ OFF のどちらかで off
      row.classList.toggle('off', !state.layerVisible[id] || catOff);
    });
  }

  buildSidebar();
  applyVisualState();

  // 一括トグル
  document.getElementById('bulk-on').addEventListener('click', () => {
    Object.keys(state.catVisible).forEach(k => state.catVisible[k] = true);
    LAYERS_DATA.forEach(l => state.layerVisible[l.id] = true);
    applyVisualState(); syncMap();
  });
  document.getElementById('bulk-off').addEventListener('click', () => {
    Object.keys(state.catVisible).forEach(k => state.catVisible[k] = false);
    applyVisualState(); syncMap();
  });

  // ===================================================================
  //   クリック → 履歴カード（Step 14 最重要機能）
  // ===================================================================
  const sidebarBody = document.getElementById('sidebar-body');
  const hpResults   = document.getElementById('hp-results');
  const hpCoords    = document.getElementById('hp-coords');
  const hpTitle     = document.getElementById('hp-title');
  const mapHint     = document.getElementById('map-hint');
  let clickMarker = null;

  function renderHistoryCard(layer, sublabel) {
    const cat = CATEGORIES[layer.cat];
    return `
      <div class="hp-card" style="border-left-color: ${cat.color};">
        <div class="hp-card-year">${layer.year}<span class="hp-card-cat" style="background:${cat.color};">${escapeHtml(cat.label)}</span></div>
        <div class="hp-card-name">${escapeHtml(layer.name)}</div>
        ${sublabel ? `<div class="hp-card-sublabel">📍 ${escapeHtml(sublabel)}</div>` : ''}
        <div class="hp-card-desc">${escapeHtml(layer.desc)}</div>
      </div>
    `;
  }

  function showHistory(latlng) {
    // 表示中レイヤーのみスキャン → 年代順
    const matches = [];
    LAYERS_DATA.forEach(layer => {
      if (!isLayerActive(layer)) return;
      const r = hitsLayer(layer, latlng);
      if (r.hit) matches.push({ layer, sublabel: r.sublabel });
    });
    matches.sort((a, b) => a.layer.year - b.layer.year);

    // クリック位置にパルスマーカー
    if (clickMarker) map.removeLayer(clickMarker);
    clickMarker = L.marker(latlng, {
      icon: L.divIcon({
        className: '',
        html: '<div class="click-pulse"></div>',
        iconSize: [0, 0]
      }),
      interactive: false
    }).addTo(map);

    // 座標と件数
    hpCoords.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    if (matches.length === 0) {
      // 何かが非表示なら案内、全表示なら本当に該当なし
      const anyHidden = LAYERS_DATA.some(l => !isLayerActive(l));
      hpTitle.innerHTML = `この地点では <span class="accent">記録なし</span>`;
      hpResults.innerHTML = `
        <div class="hp-empty">
          <div class="icon">🌿</div>
          ここでは特に大きな被災記録は見つかりませんでした<br>
          <span style="font-size:10px;opacity:0.7;">${
            anyHidden ? '（非表示のカテゴリ／レイヤーに記録がある可能性）' : '（収録レイヤーの範囲外）'
          }</span>
        </div>`;
    } else {
      hpTitle.innerHTML = `この地点の被災履歴 <span class="accent">${matches.length}件</span>`;
      hpResults.innerHTML = matches.map(m => renderHistoryCard(m.layer, m.sublabel)).join('');
    }

    sidebarBody.classList.add('show-history');
    sidebarBody.scrollTop = 0;
    mapHint.classList.add('hidden');
  }

  function hideHistory() {
    sidebarBody.classList.remove('show-history');
    if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }
    mapHint.classList.remove('hidden');
  }

  map.on('click', e => showHistory(e.latlng));
  document.getElementById('hp-back').addEventListener('click', hideHistory);

  // ===================================================================
  //   ロード画面フェードアウト
  // ===================================================================
  const loader = document.getElementById('loader');
  const minDelay = new Promise(r => setTimeout(r, 800));
  const tilesReady = new Promise(r => tileLayer.once('load', r));
  const safetyTimeout = new Promise(r => setTimeout(r, 4000));
  Promise.all([minDelay, Promise.race([tilesReady, safetyTimeout])])
    .then(() => loader.classList.add('hidden'));
});
</script>
