<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京被災マップ — Step 9</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a0a0f;
    --bg-panel: #12121a;
    --bg-card: #1a1a28;
    --text-primary: #e8e6f0;
    --text-secondary: #8a88a0;
    --border: #2a2a3e;
    --accent: #6e6eff;
    --sidebar-w: 340px;

    --war-crimson: #cc2255;
    --fire-red: #ff4444;
    --quake-orange: #ff8c1a;
    --water-blue: #1a9fff;
    --hazard-yellow: #f0c030;
    --price-green: #30d98a;
  }

  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg-dark);
    font-family: 'Zen Kaku Gothic New', system-ui, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }

  /* === Layout: sidebar (left, fixed) + map (right) === */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    box-shadow: 4px 0 16px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    z-index: 1000;
  }
  #map {
    position: fixed;
    top: 0; left: var(--sidebar-w);
    width: calc(100vw - var(--sidebar-w));
    height: 100vh;
    background: var(--bg-dark);
  }

  /* === Sidebar内部 === */
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--fire-red), var(--quake-orange), var(--water-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 24px;
  }
  .sidebar-body::-webkit-scrollbar { width: 8px; }
  .sidebar-body::-webkit-scrollbar-track { background: transparent; }
  .sidebar-body::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  .sidebar-body::-webkit-scrollbar-thumb:hover { background: #3a3a52; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin: 8px 4px 10px;
  }

  /* カテゴリ行（Step 12で動作実装、ここでは枠だけ） */
  .cat-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .cat-row:hover { background: #20203a; border-color: #3a3a52; }
  .cat-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
    flex-shrink: 0;
  }
  .cat-label { flex: 1; font-size: 13px; font-weight: 700; }
  .cat-count { font-size: 11px; color: var(--text-secondary); }

  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }
  .sidebar-footer .step-badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-weight: 700;
    margin-right: 8px;
  }

  /* === Leaflet ダークモード タイル反転 === */
  .leaflet-tile-pane {
    filter: invert(0.92) hue-rotate(180deg) brightness(0.95) contrast(0.85) saturate(0.7);
  }
  .leaflet-control-attribution {
    background: rgba(18,18,26,0.8) !important;
    color: var(--text-secondary) !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important;
    color: var(--text-primary) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: #22223a !important; }

  /* === ロード画面 === */
  #loader {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a28 0%, #0a0a0f 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .loader-logo {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg,
      var(--war-crimson) 0%,
      var(--fire-red) 25%,
      var(--quake-orange) 50%,
      var(--water-blue) 80%,
      var(--accent) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logo-shift 4s ease-in-out infinite;
    margin-bottom: 8px;
    text-align: center;
  }
  .loader-en {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.32em;
    color: var(--text-secondary);
    margin-bottom: 36px;
    text-transform: uppercase;
  }
  @keyframes logo-shift {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* ローダーバー */
  .loader-bar {
    width: 220px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .loader-bar::after {
    content: '';
    position: absolute; top: 0; left: -40%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--fire-red), var(--water-blue), transparent);
    animation: loader-sweep 1.4s ease-in-out infinite;
  }
  @keyframes loader-sweep {
    0%   { left: -40%; }
    100% { left: 100%; }
  }

  .loader-tagline {
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
  }
  .loader-tagline .dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }

  /* === Leaflet popup ダーク化 === */
  .leaflet-popup-content-wrapper {
    background: var(--bg-card) !important;
    color: var(--text-primary) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip {
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
  }
  .leaflet-popup-content {
    margin: 12px 16px !important;
    font-size: 12px;
    line-height: 1.55;
  }
  .leaflet-popup-content .pop-title {
    font-weight: 900;
    font-size: 13px;
    margin-bottom: 4px;
    display: block;
  }
  .leaflet-popup-content .pop-year {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
  }
  .leaflet-popup-content .pop-desc {
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .leaflet-popup-content .pop-cat {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 3px;
    margin-right: 6px;
    text-transform: uppercase;
    color: #0a0a0f;
  }
  .leaflet-container a.leaflet-popup-close-button {
    color: var(--text-secondary) !important;
  }
</style>
</head>

document.addEventListener('DOMContentLoaded', function() {
  // 初期ビュー用：武蔵国らしい範囲。
  // ※ maxBounds は外した（パン制限が UX を壊していた）。
  //   初回表示だけ武蔵国に寄せ、以降は自由にスクロール・ズーム可。
  const INITIAL_BOUNDS = L.latLngBounds(
    [35.45, 139.00],  // 南西（多摩〜横浜境）
    [36.20, 140.10]   // 北東（埼玉北部〜千葉境）
  );

  const map = L.map('map', {
    zoomControl: false,
    minZoom: 8,
    maxZoom: 18
  });

  map.fitBounds(INITIAL_BOUNDS, { padding: [20, 20] });

  const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // ===================================================
  //   レイヤー描画
  // ===================================================
  const layerGroups = {}; // id -> L.LayerGroup

  function popupHtml(layer, sublabel) {
    const cat = CATEGORIES[layer.cat];
    return `
      <span class="pop-cat" style="background:${cat.color};">${cat.label}</span>
      <span class="pop-year">${layer.year}年</span>
      <span class="pop-title">${layer.name}</span>
      ${sublabel ? `<div style="font-size:11px;color:var(--accent);margin-bottom:4px;">${sublabel}</div>` : ''}
      <div class="pop-desc">${layer.desc}</div>
    `;
  }

  function renderLayer(layer) {
    const color = CATEGORIES[layer.cat].color;
    const group = L.layerGroup();

    if (layer.type === 'points') {
      layer.data.forEach(p => {
        L.circleMarker([p.lat, p.lng], {
          radius: 8,
          color: color,
          fillColor: color,
          fillOpacity: 0.55,
          weight: 2,
          opacity: 0.9
        })
        .bindPopup(popupHtml(layer, p.label))
        .addTo(group);
      });
    } else if (layer.type === 'polygon') {
      L.polygon(layer.data, {
        color: color,
        fillColor: color,
        fillOpacity: 0.22,
        weight: 1.5,
        opacity: 0.85
      })
      .bindPopup(popupHtml(layer))
      .addTo(group);
    } else if (layer.type === 'multipolygon') {
      layer.data.forEach(poly => {
        L.polygon(poly, {
          color: color,
          fillColor: color,
          fillOpacity: 0.22,
          weight: 1.5,
          opacity: 0.85
        })
        .bindPopup(popupHtml(layer))
        .addTo(group);
      });
    }

    group.addTo(map);
    layerGroups[layer.id] = group;
  }

  LAYERS_DATA.forEach(renderLayer);

  // ===================================================
  //   サイドバー: カテゴリごとのレイヤー数を反映
  // ===================================================
  const counts = {};
  Object.keys(CATEGORIES).forEach(k => counts[k] = 0);
  LAYERS_DATA.forEach(l => { counts[l.cat] = (counts[l.cat] || 0) + 1; });
  document.querySelectorAll('#cat-list .cat-row').forEach(row => {
    const label = row.querySelector('.cat-label').textContent.trim();
    const key = Object.keys(CATEGORIES).find(k => CATEGORIES[k].label === label);
    if (key) {
      row.querySelector('.cat-count').textContent = counts[key] > 0 ? counts[key] : '—';
    }
  });

  // ロード画面のフェードアウト：初回タイル読み込み完了 or 最低 800ms 表示
  const loader = document.getElementById('loader');
  const minDelay = new Promise(r => setTimeout(r, 800));
  const tilesReady = new Promise(r => tileLayer.once('load', r));
  // 安全弁：タイルが遅すぎても 4秒で閉じる
  const safetyTimeout = new Promise(r => setTimeout(r, 4000));

  Promise.all([minDelay, Promise.race([tilesReady, safetyTimeout])])
    .then(() => loader.classList.add('hidden'));
});
</script>
</body>
</html>
