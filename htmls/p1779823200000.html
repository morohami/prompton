  // Deterministic color from name
  let h = 0;
  for(let i=0;i<han.length;i++) h = (h*31 + han.charCodeAt(i)) & 0xfffff;
  const hue = h % 360;
  return `hsl(${hue},45%,55%)`;
}

const map = L.map('map',{zoomControl:true}).setView([36.0,138.0],5);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',
  {attribution:'地理院淡色地図', maxZoom:18}).addTo(map);

let GEO = null;       // Loaded GeoJSON
let activeSet = new Set();
let layer = null;
let currentPreset = 'boshin';

function loadData(){
  GEO = HAN_DATA;
  document.getElementById('loadStatus').textContent = 'compact 版 (inline) ロード完了';
}

function render(){
  if(!GEO) return;
  if(layer) map.removeLayer(layer);
  const filtered = GEO.features.filter(f=>activeSet.has(f.properties.han));
  layer = L.geoJSON({type:'FeatureCollection',features:filtered},{
    style:(f)=>({
      color: colorFor(f.properties.han),
      fillColor: colorFor(f.properties.han),
      fillOpacity: 0.35,
      weight: 1.2,
      opacity: 0.8
    }),
    onEachFeature:(f, lyr)=>{
      lyr.bindTooltip(`<b>${f.properties.han}</b><br>${f.properties.villages} 村`,{sticky:true});
      lyr.on('click', ()=>{
        map.fitBounds(lyr.getBounds(),{padding:[40,40]});
      });
    }
  }).addTo(map);
  // Stats
  const totalVillages = filtered.reduce((s,f)=>s+f.properties.villages,0);
  document.getElementById('stats').innerHTML =
    `<b>${filtered.length}</b> 藩  /  <b>${totalVillages.toLocaleString()}</b> 村<br>` +
    `全データ: ${GEO.features.length} 藩 / ${GEO.features.reduce((s,f)=>s+f.properties.villages,0).toLocaleString()} 村`;
}

function renderList(){
  if(!GEO) return;
  const filterText = document.getElementById('filter').value.toLowerCase();
  const list = document.getElementById('hanList');
  list.innerHTML = '';
  const sorted = [...GEO.features].sort((a,b)=>b.properties.villages - a.properties.villages);
  sorted.forEach(f=>{
    const han = f.properties.han;
    if(filterText && !han.toLowerCase().includes(filterText)) return;
    const div = document.createElement('div');
    div.className = 'han-item' + (activeSet.has(han)?' active':'');
    div.innerHTML = `<span>${han}</span><span class="count">${f.properties.villages}</span>`;
    div.addEventListener('click',()=>{
      if(activeSet.has(han)) activeSet.delete(han);
      else activeSet.add(han);
      render();
      renderList();
    });
    list.appendChild(div);
  });
}

function applyPreset(name){
  activeSet = new Set();
  if(name==='boshin') BOSHIN_HAN.forEach(h=>{
    GEO.features.forEach(f=>{ if(f.properties.han.includes(h.replace(/藩|領分$/,'')) || h.includes(f.properties.han.replace(/藩|領分$/,''))) activeSet.add(f.properties.han); });
  });
  else if(name==='tozama') TOZAMA.forEach(h=>{
    GEO.features.forEach(f=>{ if(f.properties.han===h) activeSet.add(f.properties.han); });
  });
  else if(name==='bakufu') BAKUFU.forEach(h=>{
    GEO.features.forEach(f=>{ if(f.properties.han===h) activeSet.add(f.properties.han); });
  });
  else if(name==='all') GEO.features.forEach(f=>activeSet.add(f.properties.han));
  currentPreset = name;
  render();
  renderList();
}

document.querySelectorAll('.preset').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.preset').forEach(x=>x.classList.toggle('active', x===b));
    applyPreset(b.dataset.preset);
  });
});
document.getElementById('filter').addEventListener('input', renderList);

(()=>{
  loadData();
  if(GEO){
    applyPreset('boshin');
  }
})();
</script>
</body>
