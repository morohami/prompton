<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompton — running inside itself</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1a1a;
    --muted: #6a6a6a;
    --accent: #8C1515;
    --rule: #d8d4cc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
  body { display: flex; flex-direction: column; font-family: 'DM Sans', system-ui, sans-serif; }
  .plaque {
    flex: 0 0 auto;
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--rule);
    background: #fff;
  }
  .plaque .name {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
  }
  .plaque .desc {
    font-size: 12px;
    color: var(--muted);
  }
  .plaque .desc code {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    background: #f1ede5;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .stage { flex: 1 1 auto; position: relative; }
  /* The work IS the live site — referenced, not copied, so this piece is
     always the latest deployed version of Prompton itself. */
  .stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>
  <div class="plaque">
    <span class="name">Prompton</span>
    <span class="desc">この額縁の中身は <code>../../</code> — 常に最新のPrompton本体が動いています。引き継ぎ文書はこの作品の「引き継ぎ」欄に内蔵。</span>
  </div>
  <div class="stage">
    <iframe src="../../" title="Prompton, live"></iframe>
  </div>
</body>
</html>
