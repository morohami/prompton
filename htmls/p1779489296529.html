<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PromptShare — v1 Prototype</title>
  <style>
    :root {
      --bg: #fbfaf7;
      --surface: #ffffff;
      --surface-soft: #fff5ec;
      --surface-green: #f0faf4;
      --text: #242321;
      --muted: #6f6a62;
      --line: #ece3d8;
      --accent: #ff6f2c;
      --accent-dark: #de5518;
      --green: #2c9f62;
      --blue: #3678f5;
      --shadow: 0 18px 45px rgba(35, 28, 21, 0.08);
      --radius: 22px;
      --radius-sm: 14px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 111, 44, 0.12), transparent 34rem),
        linear-gradient(180deg, #fffaf4 0%, var(--bg) 42%, #f9f8f5 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    iframe { border: 0; background: white; }

    .shell {
      width: min(var(--max), calc(100vw - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid rgba(236, 227, 216, 0.82);
      background: rgba(251, 250, 247, 0.88);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 76px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 24px rgba(255, 111, 44, 0.28);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }

    .brand-copy small {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 650;
      letter-spacing: -0.01em;
      margin-top: 4px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      padding: 10px 13px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.93rem;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      background: white;
      box-shadow: 0 8px 18px rgba(35, 28, 21, 0.06);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 11px 16px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.02em;
      box-shadow: 0 12px 24px rgba(255, 111, 44, 0.24);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
      box-shadow: 0 16px 30px rgba(255, 111, 44, 0.26);
    }

    .button.secondary {
      background: var(--text);
      box-shadow: 0 12px 24px rgba(35, 28, 21, 0.14);
    }

    .button.secondary:hover { background: #000; }
    .button.ghost {
      background: white;
      color: var(--text);
      border-color: var(--line);
      box-shadow: none;
    }

    .button.ghost:hover {
      background: #fff8f1;
      box-shadow: 0 12px 24px rgba(35, 28, 21, 0.08);
    }

    .button.soft {
      background: #fff1e7;
      color: var(--accent-dark);
      border-color: #ffe0ca;
      box-shadow: none;
    }

    .button.soft:hover { background: #ffe5d5; }
    .button.green {
      background: var(--green);
      box-shadow: 0 12px 24px rgba(44, 159, 98, 0.2);
    }

    .button.small {
      min-height: 36px;
      padding: 8px 12px;
      font-size: 0.88rem;
    }

    .button.block { width: 100%; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 28px;
      align-items: stretch;
      padding: 42px 0 26px;
    }

    .hero-card,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 34px;
      overflow: hidden;
      position: relative;
    }

    .hero-card:after {
      content: "";
      position: absolute;
      right: -90px;
      top: -120px;
      width: 260px;
      height: 260px;
      background: rgba(255, 111, 44, 0.13);
      border-radius: 999px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-dark);
      background: #fff0e5;
      border: 1px solid #ffe0ca;
      border-radius: 999px;
      padding: 7px 11px;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: -0.01em;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.06;
      letter-spacing: -0.045em;
    }

    h1 {
      max-width: 820px;
      margin-top: 18px;
      font-size: clamp(2.3rem, 5vw, 4.7rem);
    }

    h2 { font-size: clamp(1.7rem, 3vw, 2.55rem); }
    h3 { font-size: 1.25rem; }

    .lead {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .mini-proof {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 28px;
    }

    .proof-pill {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 14px;
    }

    .proof-pill strong {
      display: block;
      font-size: 1.25rem;
      line-height: 1;
    }

    .proof-pill span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      margin-top: 6px;
    }

    .hero-preview {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .window-dots {
      display: flex;
      gap: 6px;
    }

    .window-dots span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffc7a4;
    }

    .hero-preview iframe {
      width: 100%;
      min-height: 324px;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px #fff;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin: 18px 0 16px;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 680px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(240px, 1.4fr) repeat(4, minmax(135px, 0.7fr));
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 12px 28px rgba(35, 28, 21, 0.05);
      margin: 16px 0 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label,
    .field-label {
      color: #554e46;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      box-shadow: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    textarea {
      resize: vertical;
      min-height: 124px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(255, 111, 44, 0.78);
      box-shadow: 0 0 0 4px rgba(255, 111, 44, 0.12);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.94rem;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      padding-bottom: 42px;
    }

    .prompt-tile {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(35, 28, 21, 0.06);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .prompt-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 42px rgba(35, 28, 21, 0.1);
    }

    .tile-preview {
      position: relative;
      height: 202px;
      overflow: hidden;
      background: #f7f1ea;
      border-bottom: 1px solid var(--line);
    }

    .tile-preview iframe {
      width: 142%;
      height: 142%;
      transform: scale(0.704);
      transform-origin: top left;
      pointer-events: none;
    }

    .preview-pill {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: #5d554d;
      font-size: 0.76rem;
      font-weight: 850;
      box-shadow: 0 8px 18px rgba(35, 28, 21, 0.1);
    }

    .tile-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
    }

    .tile-kicker {
      color: var(--accent-dark);
      font-size: 0.79rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tile-body h3 a:hover { color: var(--accent-dark); }
    .tile-body p {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #efe2d5;
      background: #fff9f3;
      color: #685d52;
      padding: 5px 9px;
      font-size: 0.78rem;
      font-weight: 780;
    }

    .tile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
      margin-top: auto;
    }

    .tile-meta a { color: var(--accent-dark); }
    .tile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 4px;
    }

    .empty-state {
      grid-column: 1 / -1;
      border: 1px dashed #e2d2c2;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 332px;
      gap: 22px;
      padding: 30px 0 42px;
    }

    .detail-main {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .detail-preview-panel {
      padding: 16px;
    }

    .detail-preview-panel iframe {
      display: block;
      width: 100%;
      min-height: 590px;
      border-radius: 18px;
      border: 1px solid var(--line);
    }

    .detail-intro,
    .side-card,
    .anatomy-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 14px 30px rgba(35, 28, 21, 0.05);
    }

    .detail-intro,
    .side-card,
    .anatomy-card { padding: 22px; }

    .breadcrumb {
      display: inline-flex;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 760;
      margin-bottom: 16px;
    }

    .breadcrumb:hover { color: var(--accent-dark); }

    .detail-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }

    .detail-title-row h1 {
      margin-top: 0;
      font-size: clamp(2.1rem, 4vw, 3.8rem);
    }

    .detail-description {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
      max-width: 850px;
    }

    .parent-note {
      margin-top: 16px;
      border-radius: 16px;
      padding: 12px 14px;
      background: #f3f8ff;
      color: #345075;
      border: 1px solid #dbe9ff;
      font-weight: 750;
    }

    .parent-note a {
      color: #174ea6;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .side-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 96px;
      align-self: start;
    }

    .author-mini {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-weight: 760;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: #fff0e5;
      color: var(--accent-dark);
      font-weight: 900;
      letter-spacing: -0.04em;
      flex: 0 0 auto;
    }

    .avatar.large {
      width: 82px;
      height: 82px;
      border-radius: 26px;
      font-size: 1.7rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .stat {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fffaf5;
      padding: 13px;
    }

    .stat strong {
      display: block;
      font-size: 1.32rem;
      letter-spacing: -0.04em;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 780;
      margin-top: 3px;
    }

    .side-actions {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .license-line,
    .small-muted {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 650;
    }

    .anatomy-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .prompt-block {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffaf5;
      overflow: hidden;
    }

    .prompt-block h3 {
      padding: 14px 14px 0;
      font-size: 1rem;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      margin: 0;
      color: #4b463f;
      font-size: 0.9rem;
      padding: 14px;
    }

    .steps {
      display: grid;
      gap: 10px;
      counter-reset: step;
    }

    .step {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
      background: #fffaf5;
    }

    .step:before {
      counter-increment: step;
      content: counter(step);
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-weight: 900;
    }

    .step strong { display: block; }
    .step span { color: var(--muted); font-size: 0.94rem; }

    .fork-list {
      display: grid;
      gap: 10px;
    }

    .fork-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fffaf5;
      font-weight: 800;
    }

    .fork-item small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 700;
    }

    .form-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 22px;
      padding: 30px 0 44px;
    }

    .form-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-grid .full { grid-column: 1 / -1; }
    .form-card h2 { margin-bottom: 16px; }
    .form-note {
      border-radius: 18px;
      border: 1px solid #dfeadf;
      background: var(--surface-green);
      color: #2e6544;
      padding: 14px;
      font-weight: 720;
      margin-bottom: 16px;
    }

    .upload-preview-card {
      position: sticky;
      top: 96px;
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .upload-preview-card iframe {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      color: var(--accent-dark);
      font-weight: 780;
    }

    .author-hero {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      margin: 30px 0 22px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
    }

    .author-hero p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
    }

    .footer-strip {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin: 0 0 44px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 680;
    }

    #toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      transform: translateY(24px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      background: #211f1d;
      color: white;
      padding: 12px 16px;
      font-weight: 800;
      box-shadow: 0 18px 45px rgba(35, 28, 21, 0.22);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .hero,
      .detail-layout,
      .form-layout {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls .search-field { grid-column: 1 / -1; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .side-stack,
      .upload-preview-card { position: static; }
      .anatomy-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .shell { width: min(var(--max), calc(100vw - 20px)); }
      .header-inner {
        min-height: auto;
        padding: 12px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .brand-mark { width: 38px; height: 38px; }
      .header-nav { justify-content: flex-start; width: 100%; }
      .hero { padding-top: 20px; }
      .hero-card { padding: 24px; }
      .mini-proof,
      .controls,
      .grid,
      .form-grid,
      .author-hero {
        grid-template-columns: 1fr;
      }

      .author-hero { text-align: left; }
      .detail-title-row { flex-direction: column; }
      .tile-preview { height: 180px; }
      .footer-strip { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="toast" aria-live="polite"></div>
  <header id="siteHeader" class="site-header"></header>
  <main id="app" class="shell"></main>

  <script>
    (() => {
      const STORAGE_KEY = "promptshare.v1.prototype";
      const DEFAULT_AUTHORS = {
        "aiko": {
          id: "aiko",
          name: "Aiko Tanaka",
          avatar: "AT",
          bio: "Everyday automation tinkerer. Turns prompts into small tools for home, food, and family life.",
          joined: "2026-02-08"
        },
        "marco": {
          id: "marco",
          name: "Marco Reyes",
          avatar: "MR",
          bio: "Product marketer sharing lightweight HTML prototypes, launch pages, and remixable prompts.",
          joined: "2026-01-18"
        },

      }

      function renderPromptCard(promptId) {
        const prompt = findPrompt(promptId);
        if (!prompt) return renderNotFound("Prompt not found", "That prompt may have been deleted or the link is incorrect.");

        const author = getAuthor(prompt.authorId, prompt.authorName);
        const parent = prompt.parentId ? findPrompt(prompt.parentId) : null;
        const children = childrenOf(prompt.id);
        const tagHTML = (prompt.tags || []).map((tag) => `<span class="tag">${esc(tag)}</span>`).join("");

        $("app").innerHTML = `
          <section class="detail-layout">
            <div class="detail-main">
              <article class="detail-intro">
                <a class="breadcrumb" href="#gallery">← Back to gallery</a>
                <div class="detail-title-row">
                  <div>
                    <span class="eyebrow">${esc(prompt.outputType)} · ${esc(prompt.model)}</span>
                    <h1>${esc(prompt.title)}</h1>
                    <p class="detail-description">${esc(prompt.description)}</p>
                  </div>
                </div>
                ${parent ? `<div class="parent-note">Forked from <a href="#prompt/${esc(parent.id)}">${esc(parent.title)}</a></div>` : ""}
                <div class="tags" style="margin-top:18px">${tagHTML}</div>
              </article>

              <article class="detail-preview-panel panel">
                <div class="hero-preview-head" style="margin-bottom:12px">
                  <strong>Live HTML preview</strong>
                  <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
                </div>
                <iframe title="${esc(prompt.title)} full preview" sandbox="allow-scripts allow-forms" srcdoc="${esc(prompt.html)}"></iframe>
              </article>

              <article class="anatomy-card">
                <div class="section-head" style="margin-top:0">
                  <div>
                    <h2>Prompt Anatomy</h2>
                    <p>Like Cookpad ingredients: the system prompt, user instruction, and context data that made the HTML output.</p>
                  </div>
                </div>
                <div class="anatomy-grid">
                  <section class="prompt-block">
                    <h3>System prompt</h3>
                    <pre>${esc(prompt.systemPrompt)}</pre>
                  </section>
                  <section class="prompt-block">
                    <h3>User instruction</h3>
                    <pre>${esc(prompt.userPrompt)}</pre>
                  </section>
                  <section class="prompt-block">
                    <h3>Context data</h3>
                    <pre>${esc(prompt.contextData)}</pre>
                  </section>
                </div>
              </article>

              <article class="anatomy-card">
                <div class="section-head" style="margin-top:0">
                  <div>
                    <h2>Usage Instructions</h2>
                    <p>The HTML output is the product; the prompt is the repeatable recipe.</p>
                  </div>
                </div>
                <div class="steps">
                  <div class="step"><div><strong>Download the dish</strong><span>Grab the raw HTML file and open it locally, share it, or deploy it as a static page.</span></div></div>
                  <div class="step"><div><strong>Reuse the recipe</strong><span>Copy the prompt anatomy into your preferred model and swap in your own context data.</span></div></div>
                  <div class="step"><div><strong>Fork and improve</strong><span>Use the fork action to publish a remixed prompt and attach a new generated HTML output.</span></div></div>
                </div>
              </article>

              <article class="anatomy-card">
                <div class="section-head" style="margin-top:0">
                  <div>
                    <h2>Fork tree</h2>
                    <p>Remixes linked back to this original prompt.</p>
                  </div>
                </div>
                ${children.length ? `<div class="fork-list">${children.map(forkItemHTML).join("")}</div>` : `<p class="small-muted">No visible forks yet. Be the first to remix this card.</p>`}
              </article>
            </div>

            <aside class="side-stack">
              <section class="side-card">
                <a class="author-mini" href="#author/${esc(author.id)}">
                  <span class="avatar">${esc(author.avatar || initials(author.name))}</span>
                  <span><strong>${esc(author.name)}</strong><br><span>${esc(author.bio)}</span></span>
                </a>
                <div class="stats">
                  <div class="stat"><strong>${compactNumber(prompt.downloads)}</strong><span>downloads</span></div>
                  <div class="stat"><strong>${compactNumber(promptForkCount(prompt))}</strong><span>forks</span></div>
                  <div class="stat"><strong>${esc(prompt.date)}</strong><span>published</span></div>
                  <div class="stat"><strong>${esc(prompt.license)}</strong><span>license</span></div>
                </div>
                <div class="side-actions">
                  <button class="button block" data-action="download" data-id="${esc(prompt.id)}">Download raw HTML</button>
                  <a class="button block soft" href="#fork/${esc(prompt.id)}">Fork this prompt</a>
                  <button class="button block ghost" data-action="copyPrompt" data-id="${esc(prompt.id)}">Copy prompt text</button>
                </div>
              </section>
              <section class="side-card">
                <strong>Prototype note</strong>
                <p class="small-muted">Downloads and forks update locally in this browser. A production version would save these counts on the backend.</p>
              </section>
            </aside>
          </section>
        `;
      }

      function forkItemHTML(prompt) {
        const author = getAuthor(prompt.authorId, prompt.authorName);
        return `
          <a class="fork-item" href="#prompt/${esc(prompt.id)}">
            <span>${esc(prompt.title)}<small>${esc(author.name)} · ${esc(prompt.date)}</small></span>
            <span aria-hidden="true">→</span>
          </a>
        `;
      }

      function renderUpload(parentId = "") {
        const parent = parentId ? findPrompt(parentId) : null;
        if (parentId && !parent) return renderNotFound("Fork source not found", "The prompt you tried to fork is not available.");

        const isFork = Boolean(parent);
        const prefill = {
          title: isFork ? `Fork of ${parent.title}` : "",
          description: isFork ? `A remixed version of “${parent.title}”.` : "",
          authorName: "",
          authorBio: "",
          model: isFork ? parent.model : "GPT-4o",
          outputType: isFork ? parent.outputType : "",
          tags: isFork ? (parent.tags || []).join(", ") : "",
          license: isFork ? parent.license : "CC-BY",
          systemPrompt: isFork ? parent.systemPrompt : "",
          userPrompt: isFork ? parent.userPrompt : "",
          contextData: isFork ? parent.contextData : "",
          html: isFork ? parent.html : `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Your HTML output</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;background:#fff8f0;color:#241f1a}
  main{max-width:720px;margin:0 auto;padding:40px}
  .card{background:white;border:1px solid #eadccd;border-radius:24px;padding:28px;box-shadow:0 16px 40px #00000012}
</style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Your generated HTML goes here</h1>
      <p>Upload a file or paste the HTML source to preview it before publishing.</p>
    </section>
  </main>
</body>
</html>`
        };

        const authorOptions = Object.values(store.authors)
          .map((author) => `<option value="${esc(author.name)}"></option>`)
          .join("");

        $("app").innerHTML = `
          <section class="form-layout">
            <form id="promptForm" class="form-card" data-parent-id="${isFork ? esc(parent.id) : ""}">
              <a class="breadcrumb" href="${isFork ? `#prompt/${esc(parent.id)}` : "#gallery"}">← ${isFork ? "Back to source prompt" : "Back to gallery"}</a>
              <span class="eyebrow">${isFork ? "Fork prompt" : "Upload prompt"}</span>
              <h1 style="font-size:clamp(2rem,4vw,3.5rem);margin:14px 0 10px">${isFork ? "Remix this prompt recipe" : "Publish a prompt recipe"}</h1>
              <p class="lead" style="margin-bottom:18px">${isFork ? "The original prompt and HTML are prefilled. Edit them, attach a new output, and publish a linked fork." : "Paste the prompt anatomy, upload the generated HTML dish, and add searchable metadata."}</p>
              ${isFork ? `<div class="form-note">Forking from <strong>${esc(parent.title)}</strong>. The new card will link back to the parent prompt.</div>` : ""}

              <div class="form-grid">
                <div class="field full">
                  <label for="titleInput">Title</label>
                  <input id="titleInput" name="title" required maxlength="90" value="${esc(prefill.title)}" placeholder="e.g. Family Meal Planner">
                </div>

                <div class="field full">
                  <label for="descriptionInput">Short description</label>
                  <textarea id="descriptionInput" name="description" required maxlength="420" placeholder="What does this prompt help people create?">${esc(prefill.description)}</textarea>
                </div>

                <div class="field">
                  <label for="authorInput">Creator display name</label>
                  <input id="authorInput" name="authorName" list="authorList" required value="${esc(prefill.authorName)}" placeholder="Your name">
                  <datalist id="authorList">${authorOptions}</datalist>
                </div>

                <div class="field">
                  <label for="authorBioInput">Creator bio</label>
                  <input id="authorBioInput" name="authorBio" value="${esc(prefill.authorBio)}" placeholder="Short optional bio">
                </div>

                <div class="field">
                  <label for="modelInput">Model used</label>
                  <select id="modelInput" name="model">
                    ${fixedOptionMarkup(uniqueSorted(["GPT-4o", "Claude", "Gemini", "Other", ...allModels()]), prefill.model)}
                  </select>
                </div>

                <div class="field">
                  <label for="outputTypeInput">Output type</label>
                  <input id="outputTypeInput" name="outputType" required value="${esc(prefill.outputType)}" placeholder="dashboard, landing page, planner...">
                </div>

                <div class="field">
                  <label for="tagsInput">Tags</label>
                  <input id="tagsInput" name="tags" value="${esc(prefill.tags)}" placeholder="food, family, planning">
                </div>

                <div class="field">
                  <label for="licenseInput">License</label>
                  <select id="licenseInput" name="license">
                    ${fixedOptionMarkup(["CC0", "CC-BY", "All Rights Reserved"], prefill.license)}
                  </select>
                </div>

                <div class="field full">
                  <label for="systemPromptInput">System prompt</label>
                  <textarea id="systemPromptInput" name="systemPrompt" required placeholder="Role, constraints, tone, formatting rules...">${esc(prefill.systemPrompt)}</textarea>
                </div>

                <div class="field full">
                  <label for="userPromptInput">User instruction</label>
                  <textarea id="userPromptInput" name="userPrompt" required placeholder="The exact user request that produced the HTML...">${esc(prefill.userPrompt)}</textarea>
                </div>

                <div class="field full">
                  <label for="contextDataInput">Context data</label>
                  <textarea id="contextDataInput" name="contextData" placeholder="Inputs, examples, data, preferences, constraints...">${esc(prefill.contextData)}</textarea>
                </div>

                <div class="field full">
                  <label for="htmlFileInput">Upload HTML file</label>
                  <input id="htmlFileInput" type="file" accept=".html,.htm,text/html">
                </div>

                <div class="field full">
                  <label for="htmlInput">HTML source</label>
                  <textarea id="htmlInput" name="htmlSource" required style="min-height:220px" spellcheck="false">${esc(prefill.html)}</textarea>
                </div>
              </div>

              <div class="hero-actions">
                <button class="button" type="submit">${isFork ? "Publish fork" : "Publish prompt"}</button>
                <button class="button ghost" type="button" data-action="previewUpload">Refresh preview</button>
              </div>
              <div id="formMessage" class="message" aria-live="polite"></div>
            </form>

            <aside class="form-card upload-preview-card">
              <div>
                <span class="eyebrow">Live output preview</span>
                <h2 style="margin-top:12px">HTML dish</h2>
                <p class="small-muted">This iframe previews the uploaded or pasted HTML. The prototype keeps your published cards in browser storage.</p>
              </div>
              <iframe id="uploadPreview" title="Upload HTML preview" sandbox="allow-scripts allow-forms"></iframe>
              <div class="form-note" style="margin:0">Minimal friction: browsing and downloading do not require signup in this v1 prototype.</div>
            </aside>
          </section>
        `;

        requestAnimationFrame(updateUploadPreview);
      }

      function renderAuthor(authorId) {
        const author = store.authors[authorId];
        if (!author) return renderNotFound("Creator not found", "That creator profile is not available.");

        const prompts = authorPrompts(authorId);
        const totalDownloads = prompts.reduce((sum, prompt) => sum + Number(prompt.downloads || 0), 0);
        const totalForks = prompts.reduce((sum, prompt) => sum + promptForkCount(prompt), 0);

        $("app").innerHTML = `
          <section class="author-hero">
            <span class="avatar large">${esc(author.avatar || initials(author.name))}</span>
            <div>
              <a class="breadcrumb" href="#gallery">← Back to gallery</a>
              <h1 style="font-size:clamp(2rem,4vw,3.5rem);margin-top:8px">${esc(author.name)}</h1>
              <p>${esc(author.bio)}</p>
              <div class="stats" style="max-width:480px">
                <div class="stat"><strong>${prompts.length}</strong><span>published prompts</span></div>
                <div class="stat"><strong>${compactNumber(totalDownloads)}</strong><span>total downloads</span></div>
                <div class="stat"><strong>${compactNumber(totalForks)}</strong><span>total forks</span></div>
                <div class="stat"><strong>${esc(author.joined || "demo")}</strong><span>joined</span></div>
              </div>
            </div>
            <button class="button ghost" data-action="follow">Follow</button>
          </section>

          <section>
            <div class="section-head">
              <div>
                <h2>Published prompts</h2>
                <p>All prompt recipes by this creator.</p>
              </div>
            </div>
            <div class="grid">
              ${prompts.length ? prompts.map(promptTileHTML).join("") : `<div class="empty-state"><h3>No prompts yet.</h3><p>This creator has not published anything in the prototype.</p></div>`}
            </div>
          </section>
        `;
      }

      function renderNotFound(title, message) {
        $("app").innerHTML = `
          <section class="hero">
            <div class="hero-card">
              <span class="eyebrow">404</span>
              <h1>${esc(title)}</h1>
              <p class="lead">${esc(message)}</p>
              <div class="hero-actions"><a class="button" href="#gallery">Return to gallery</a></div>
            </div>
          </section>
        `;
      }

      function handleClick(event) {
        const actionEl = event.target.closest("[data-action]");
        if (!actionEl) return;
        const action = actionEl.dataset.action;

        if (action === "download") {
          const prompt = findPrompt(actionEl.dataset.id);
          if (!prompt) return;
          prompt.downloads = Number(prompt.downloads || 0) + 1;
          saveStore();
          downloadPrompt(prompt);
          showToast("HTML download started");
          const route = getRoute();
          if (route.name === "gallery") updateGalleryResults();
          if (route.name === "prompt" || route.name === "author") render();
        }

        if (action === "copyPrompt") {
          const prompt = findPrompt(actionEl.dataset.id);
          if (!prompt) return;
          const text = [
            "SYSTEM PROMPT:",
            prompt.systemPrompt,
            "",
            "USER INSTRUCTION:",
            prompt.userPrompt,
            "",
            "CONTEXT DATA:",
            prompt.contextData
          ].join("\n");
          copyText(text);
          showToast("Prompt text copied");
        }

        if (action === "previewUpload") {
          updateUploadPreview();
          showToast("Preview refreshed");
        }

        if (action === "follow") {
          actionEl.textContent = actionEl.textContent.includes("Following") ? "Follow" : "Following";
          actionEl.classList.toggle("green");
          showToast("Follow is a v1 placeholder");
        }

        if (action === "resetDemo") {
          if (confirm("Reset the demo prompts and remove local uploads?")) {
            store = freshSeed();
            saveStore();
            state.gallery = { query: "", tag: "all", model: "all", output: "all", sort: "newest" };
            render();
            showToast("Demo data reset");
          }
        }
      }

      function handleInput(event) {
        const target = event.target;
        if (target.id === "searchInput") {
          state.gallery.query = target.value;
          updateGalleryResults();
        }

        if (target.id === "htmlInput") {
          updateUploadPreview();
        }
      }

      function handleChange(event) {
        const target = event.target;

        if (target.dataset.galleryFilter) {
          const key = target.dataset.galleryFilter;
          state.gallery[key] = target.value;
          updateGalleryResults();
        }

        if (target.id === "htmlFileInput") {
          const file = target.files && target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            const htmlInput = $("htmlInput");
            htmlInput.value = String(reader.result || "");
            updateUploadPreview();
            showToast("HTML file loaded");
          };
          reader.onerror = () => showToast("Could not read that file");
          reader.readAsText(file);
        }
      }

      function handleSubmit(event) {
        if (event.target.id !== "promptForm") return;
        event.preventDefault();

        const form = event.target;
        const fd = new FormData(form);
        const message = $("formMessage");
        const title = String(fd.get("title") || "").trim();
        const description = String(fd.get("description") || "").trim();
        const authorName = String(fd.get("authorName") || "").trim();
        const authorBio = String(fd.get("authorBio") || "").trim();
        const model = String(fd.get("model") || "Other").trim();
        const outputType = String(fd.get("outputType") || "").trim();
        const license = String(fd.get("license") || "CC-BY").trim();
        const systemPrompt = String(fd.get("systemPrompt") || "").trim();
        const userPrompt = String(fd.get("userPrompt") || "").trim();
        const contextData = String(fd.get("contextData") || "").trim();
        const html = String(fd.get("htmlSource") || "").trim();
        const tags = String(fd.get("tags") || "")
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 12);

        if (!title || !description || !authorName || !outputType || !systemPrompt || !userPrompt || !html) {
          message.textContent = "Please fill in the title, description, creator, output type, prompt text, and HTML source.";
          return;
        }

        const author = getOrCreateAuthor(authorName, authorBio);
        const parentId = form.dataset.parentId || "";
        const newPrompt = {
          id: `prompt-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`,
          title,
          description,
          authorId: author.id,
          authorName: author.name,
          date: todayISO(),
          model,
          outputType,
          tags,
          license,
          downloads: 0,
          forks: 0,
          parentId,
          systemPrompt,
          userPrompt,
          contextData,
          html
        };

        store.prompts.unshift(newPrompt);
        if (parentId) {
          const parent = findPrompt(parentId);
          if (parent) parent.forks = Number(parent.forks || 0) + 1;
        }

        saveStore();
        showToast(parentId ? "Fork published" : "Prompt published");
        window.location.hash = `#prompt/${newPrompt.id}`;
      }

      function getOrCreateAuthor(name, bio) {
        const normalized = name.toLowerCase();
        const existing = Object.values(store.authors).find((author) => author.name.toLowerCase() === normalized);
        if (existing) {
          if (bio) existing.bio = bio;
          return existing;
        }

        const id = `author-${slugify(name)}-${Date.now().toString(36)}`;
        const author = {
          id,
          name,
          avatar: initials(name),
          bio: bio || "PromptShare creator",
          joined: todayISO()
        };
        store.authors[id] = author;
        return author;
      }

      function updateUploadPreview() {
        const frame = $("uploadPreview");
        const input = $("htmlInput");
        if (!frame || !input) return;
        frame.srcdoc = input.value || "";
      }

      function downloadPrompt(prompt) {
        const blob = new Blob([prompt.html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${slugify(prompt.title)}.html`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
          return;
        }
        fallbackCopy(text);
      }

      function fallbackCopy(text) {
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }

      function showToast(message) {
        const toast = $("toast");
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
      }

      window.addEventListener("hashchange", render);
      document.addEventListener("click", handleClick);
      document.addEventListener("input", handleInput);
      document.addEventListener("change", handleChange);
      document.addEventListener("submit", handleSubmit);

      render();
    })();
  </script>
</body>
</html>
