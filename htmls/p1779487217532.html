function go(view, data){
  if(S.view !== view) S.from.push(S.view);
  S.view = view;
  document.querySelectorAll('.v').forEach(el=>el.classList.remove('on'));
  const nav = document.getElementById('nav');
  const navTitle = document.getElementById('navTitle');
  nav.classList.toggle('canback', view !== 'home');
  window.scrollTo({top:0,behavior:'instant'});
  if(view==='home'){ S.from=[]; navTitle.textContent='カクテルブック'; document.getElementById('vHome').classList.add('on'); }
  else if(view==='spirit'){ navTitle.textContent='ボトル棚'; renderSpirit(); document.getElementById('vSpirit').classList.add('on'); }
  else if(view==='menu'){ navTitle.textContent='レシピ一覧'; renderMenu(); document.getElementById('vMenu').classList.add('on'); }
  else if(view==='family'){ navTitle.textContent='味の系譜'; renderFamily(); document.getElementById('vFamily').classList.add('on'); }
  else if(view==='detail'){ S.detail=data; navTitle.textContent='レシピ'; renderDetail(data); document.getElementById('vDetail').classList.add('on'); }
  else if(view==='similar'){ S.family=data; navTitle.textContent='ファミリー'; renderSimilar(data); document.getElementById('vSimilar').classList.add('on'); }
}

  const prev = S.from.pop() || 'home';

  S.view = prev;

function renderSpirit(){

    return `<button class="chip ${on?'on':''}" data-k="${s[0]}" style="--b:${(BOTTLES[s[0]]||[])[0]||'#d7c074'}"><span class="e">${bottleSvg(s[0],s[1])}</span><span class="ct">${s[2]}</span></button>`;
  }).join('');

    c.addEventListener('click', ()=>{
      const k = c.dataset.k;
      if(S.selected.has(k)) S.selected.delete(k); else S.selected.add(k);
      renderSpirit();
    });
  });
  document.getElementById('chipsCt').textContent = `${S.selected.size}本を選択中`;
  document.getElementById('chipsClear').onclick = ()=>{ S.selected.clear(); renderSpirit(); };

  const grid = document.getElementById('spiritGrid');
  if(S.selected.size === 0){
    grid.className = 'grid';
    grid.innerHTML = `<div class="empty">ボトルを選ぶと、今作れる一杯と、追加で必要なボトルを分けて表示します。</div>`;
    return;
  }
  const sel = [...S.selected];
  const ranked = parsed.map(c=>{
    const groups = c.bk;
    const has = groups.filter(k=>sel.includes(k));
    const missing = groups.filter(k=>!sel.includes(k));
    const overlap = has.length;
    return {c, overlap, missing:missing.length, missingKeys:missing};
  }).sort((a,b)=> a.missing - b.missing || b.overlap - a.overlap || a.c.n.localeCompare(b.c.n));

  const readyHTML = ready.length

  const needHTML = needMore.map(r=>{
    const missingLabel = r.missingKeys.map(k=>spByKey(k)?.[2]||k).join('・');

function similarity(a,b){
  if(a.id===b.id) return -1;
  const ak = [...new Set(flatNeed(a.need || a.bk))];
  const bk = [...new Set(flatNeed(b.need || b.bk))];
  const shared = ak.filter(k=>bk.includes(k)).length;
  const union = new Set([...ak,...bk]).size || 1;
  return Math.round(shared / union * 100);
}

    <div class="dt-hero" style="--c:${c.color};--c-glow:${c.color}44">
      <div class="glass-stage">${gSvg(c)}</div>
      <div class="lbl">${fam.nj}ファミリー</div>
      <h1>${c.n.split(' ').map((w,i,a)=> i===a.length-1 ? `<em>${w}</em>` : w).join(' ')}</h1>
      <div class="hero-year">${c.year}</div>
      <div class="nj">${c.nj} · ${c.origin.replace(/,?\s*\d{4}s?|,?\s*\d{4}|,?\s*19c\.|,?\s*16c\./,'')}</div>
    </div>
    <div class="specs">
      <div class="spec"><div class="k">ベース</div><div class="v">${c.bl}</div></div>
      <div class="spec"><div class="k">度数</div><div class="v">${c.abv}<small>%</small></div></div>
      <div class="spec"><div class="k">技法</div><div class="v"><em>${c.prep}</em></div></div>
      <div class="spec"><div class="k">グラス</div><div class="v">${c.glass}</div></div>
    </div>
    <div class="story" id="story">
      <div class="pull">"${c.story.split('。')[0]}。"</div>
      <div class="body">${c.story}</div>
      <button class="tg">背景を読む <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="block">
      <div class="bh"><h3>材料</h3><span class="n">${c.ings.length}点</span></div>
      <ul class="ings">
        ${c.ings.map((ing,i)=>`<li data-i="${i}"><span class="cb"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="lab">${ing[0]}${altFor(ing[0])?`<small>${altFor(ing[0])}</small>`:''}</span><span class="amt">${ing[1]}</span></li>`).join('')}
      </ul>
    </div>
    <div class="block">
      <div class="bh"><h3>作り方</h3><span class="n">${c.steps.length}手順</span></div>
      <ol class="steps">
        ${c.steps.map(s=>`<li>${s}</li>`).join('')}
      </ol>
    </div>
    <div class="tip">
      <div class="k">コツ</div>
      <div class="tiptext">${c.tip || 'このレシピは温度、氷、希釈で仕上がりが大きく変わる。まずは分量通りに作り、次回から甘味と酸味を微調整する。'}</div>
    </div>
    <div class="sim">
      <div class="sh">
        <div class="l">
          <div class="kicker">材料が近い順</div>
          <h3>次に作る<em>一杯</em></h3>
        </div>
      </div>
      <div class="row">
        ${similar.map(r=>`<button class="it" data-id="${r.c.id}" style="--c:${r.c.color}">
          <div class="g">${gSvg(r.c)}<span class="sc">${Math.round(r.s/maxS*100)}%</span></div>
          <div class="b"><div class="n">${r.c.n}</div><div class="nj">${r.c.nj}</div></div>
        </button>`).join('')}
      </div>
    </div>
    <button class="fam-link" data-fam="${fam.id}">
      <div class="l">
        <div class="k">ボトル系譜を見る</div>
        <div class="t">${fam.nj}ファミリー →</div>
      </div>
      <div class="arr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </button>
  `;

  el.querySelector('#story button.tg').addEventListener('click', ()=>{
    el.querySelector('#story').classList.toggle('open');
  });
  const checkKey = `cocktail:${c.id}:checked`;
  let checked = [];
  try { checked = JSON.parse(sessionStorage.getItem(checkKey) || '[]'); } catch(e) {}
  el.querySelectorAll('.ings li').forEach(li=>{
    const idx = Number(li.dataset.i);
    li.classList.toggle('chk', checked.includes(idx));
    li.addEventListener('click', ()=>{
      li.classList.toggle('chk');
      const now = [...el.querySelectorAll('.ings li.chk')].map(x=>Number(x.dataset.i));
      try { sessionStorage.setItem(checkKey, JSON.stringify(now)); } catch(e) {}
    });
  });
  el.querySelectorAll('[data-id]').forEach(b=>{
    b.addEventListener('click', ()=> go('detail', b.dataset.id));
  });
  el.querySelector('[data-fam]').addEventListener('click', ()=> go('similar', fam.id));
}
function renderSimilar(famId){
  const fam = famById(famId);
  const members = parsed.filter(c=>familyMatch(fam,c));
  const el = document.getElementById('vSimilar');
  el.innerHTML = `
    <div class="sec-head">
      <div class="kicker">ファミリーフォーカス · ${fam.nj}</div>
      <h2><em>${fam.n}</em>の系譜</h2>
      <p class="sub">${fam.d}</p>
      <div style="margin-top:18px;font-size:11px;color:var(--tx2);letter-spacing:.06em;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        ${fam.f.map((x,j)=>`<span>${x}</span>${j<fam.f.length-1?'<span style="color:var(--tx3)">＋</span>':''}`).join('')}
      </div>
    </div>
    <div class="grid">
      ${members.map(c=>cardHTML(c)).join('')}
    </div>
  `;
  bindCardClicks(el);
}
go('home');
</script>

</body>
</html>
