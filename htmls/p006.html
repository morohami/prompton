<!DOCTYPE html><html><head><style>
    body{font-family:Georgia,serif;background:#f5f2eb;margin:0;padding:30px;color:#2a2519}
    h1{font-size:32px;margin:0 0 4px;font-weight:400;font-style:italic}
    .sub{color:#8a7e6a;margin-bottom:24px;font-size:14px}
    .row{display:grid;grid-template-columns:120px repeat(30,1fr);gap:2px;margin-bottom:4px;align-items:center}
    .lbl{font-size:13px;text-align:right;padding-right:10px;color:#5a4f42}
    .cell{aspect-ratio:1;background:#e5dfd2;border-radius:2px;cursor:pointer;transition:transform .12s,box-shadow .12s}
    .cell:hover{transform:scale(1.18);box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:1;position:relative}
    .cell.done{background:#7a8b3d}.cell.partial{background:#c9b85d}
    .head{font-size:10px;color:#999;text-align:center;font-family:monospace}
    .footer{margin-top:24px;padding-top:18px;border-top:1px dotted #c8bca5;font-size:12px;color:#8a7e6a;font-style:italic;text-align:center;line-height:1.6}
    .legend{display:inline-flex;gap:18px;margin-top:6px}
    .legend span{display:inline-flex;align-items:center;gap:6px;font-style:normal;font-family:monospace}
    .legend i{display:inline-block;width:10px;height:10px;border-radius:2px}
  </style></head><body>
  <h1>30 days, faithfully kept.</h1>
  <div class="sub">a quiet record of small commitments · click any cell to mark</div>
  <div id="grid">
  <div class="row"><div></div><div class="head">1</div><div class="head">2</div><div class="head">3</div><div class="head">4</div><div class="head">5</div><div class="head">6</div><div class="head">7</div><div class="head">8</div><div class="head">9</div><div class="head">10</div><div class="head">11</div><div class="head">12</div><div class="head">13</div><div class="head">14</div><div class="head">15</div><div class="head">16</div><div class="head">17</div><div class="head">18</div><div class="head">19</div><div class="head">20</div><div class="head">21</div><div class="head">22</div><div class="head">23</div><div class="head">24</div><div class="head">25</div><div class="head">26</div><div class="head">27</div><div class="head">28</div><div class="head">29</div><div class="head">30</div></div>
  <div class="row"><div class="lbl">Read 30 min</div><div class="cell partial"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div></div>
  <div class="row"><div class="lbl">No phone AM</div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell "></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell "></div><div class="cell "></div><div class="cell done"></div><div class="cell partial"></div><div class="cell "></div></div>
  <div class="row"><div class="lbl">Walk 5k</div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell partial"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div></div>
  <div class="row"><div class="lbl">Stretch</div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div></div>
  <div class="row"><div class="lbl">Journal</div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell partial"></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div><div class="cell done"></div><div class="cell "></div><div class="cell done"></div><div class="cell "></div><div class="cell "></div><div class="cell done"></div><div class="cell done"></div></div>
  </div>
  <div class="footer">
    Each click cycles the day: empty → partial → done → empty.
    <div class="legend">
      <span><i style="background:#e5dfd2"></i>none</span>
      <span><i style="background:#c9b85d"></i>partial</span>
      <span><i style="background:#7a8b3d"></i>done</span>
    </div>
  </div>
  <script>
  var habits=['Read 30 min','No phone AM','Walk 5k','Stretch','Journal'];
  var thresholds=[[0.30,0.15],[0.40,0.20],[0.35,0.18],[0.45,0.25],[0.50,0.30]];
  var data={};
  for(var h=0;h<habits.length;h++){data[h]=[];for(var d=0;d<30;d++){var r=Math.random();var th=thresholds[h];data[h].push(r>th[0]?2:r>th[1]?1:0);}}
  function render(){
    var html='<div class="row"><div></div>';
    for(var i=1;i<=30;i++)html+='<div class="head">'+i+'</div>';
    html+='</div>';
    for(var h=0;h<habits.length;h++){
      html+='<div class="row"><div class="lbl">'+habits[h]+'</div>';
      for(var d=0;d<30;d++){
        var s=data[h][d],cls=s===2?'done':s===1?'partial':'';
        html+='<div class="cell '+cls+'" data-h="'+h+'" data-d="'+d+'" title="'+habits[h]+' · day '+(d+1)+'"></div>';
      }
      html+='</div>';
    }
    document.getElementById('grid').innerHTML=html;
    document.querySelectorAll('.cell').forEach(function(c){
      c.addEventListener('click',function(){
        var h=+c.dataset.h,d=+c.dataset.d;
        data[h][d]=(data[h][d]+1)%3;
        render();
      });
    });
  }
  render();
  </script>
  </body></html>
