<title>東京 今昔マップ ２ — Tokyo Through Time</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1d24;
    --ink-soft: #232730;
    --ink-deep: #0f1116;
    --cream: #e8e3d6;
    --cream-dim: #a8a397;
    --vermillion: #c54f3e;
    --vermillion-glow: rgba(197, 79, 62, 0.25);
    --gold: #c8a96a;
    --silver: #b8b8b8;
    --moss: #7a9a4f;
    --line: #3a3d44;
    /* v2: A/B 選択中のネオンピンク強調 */
    --neon-pink: #ff2e9a;
    --neon-pink-soft: rgba(255, 46, 154, 0.55);
    --neon-pink-glow: rgba(255, 46, 154, 0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: "Noto Sans JP", sans-serif;
    background: var(--ink); color: var(--cream);
    -webkit-tap-highlight-color: transparent;
  }

  #map { position: absolute; inset: 0; background: #efeae0; z-index: 1; }

  /* 古地図オーバーレイのフェード */
  .era-overlay { transition: opacity 0.3s ease; }

  /* === Brand === */
  .brand {
    position: absolute; top: 16px; left: 16px; z-index: 1000;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding: 13px 20px 11px;
    border-left: 3px solid var(--vermillion);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  .brand h1 {
    font-family: "Shippori Mincho B1", serif;
    font-size: 19px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--cream); line-height: 1;
  }
  .brand .en {
    font-size: 9px; color: var(--cream-dim); letter-spacing: 0.22em;
    margin-top: 7px; text-transform: uppercase; font-weight: 300;
  }

  /* === Search + Locate (top-right) === */
  .search-bar {
    position: absolute; top: 16px; right: 16px; z-index: 1000;
    display: flex; gap: 8px; align-items: stretch;
  }
  .search-input-wrap {
    position: relative;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border-right: 3px solid var(--gold);
    display: flex; align-items: stretch;
  }
  .search-input {
    background: transparent; border: none; outline: none;
    color: var(--cream);
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px; letter-spacing: 0.02em;
    padding: 11px 12px 11px 38px;
    width: 240px;
  }
  .search-input::placeholder { color: var(--cream-dim); }
  .search-input-wrap::before {
    content: '🔍';
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px; opacity: 0.7;
  }
  .icon-btn {
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border: none; border-right: 3px solid var(--vermillion);
    color: var(--cream); cursor: pointer;
    padding: 0 14px;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    min-width: 44px;
  }
  .icon-btn:hover { color: var(--vermillion); }
  .icon-btn:disabled { opacity: 0.55; cursor: wait; }
  .search-submit { border-right-color: var(--gold); }
  .search-submit:hover { color: var(--gold); }
  .icon-btn.locating { color: var(--vermillion); animation: pulse 1s infinite; }
  .icon-btn.shared { color: var(--neon-pink); animation: pulse 0.4s ease; }

  /* v2.1: 共有完了トースト */
  .toast {
    position: fixed;
    bottom: 50%; left: 50%;
    transform: translate(-50%, 50%) translateY(20px);
    background: rgba(15, 17, 22, 0.95);
    backdrop-filter: blur(14px);
    color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 12px 22px;
    border-left: 3px solid var(--neon-pink);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 24px var(--neon-pink-glow);
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    max-width: 90vw;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, 50%) translateY(0);
  }
  @keyframes pulse { 50% { opacity: 0.4; } }

  .search-results {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(14px);
    min-width: 320px; max-width: 420px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border-right: 3px solid var(--gold);
    max-height: 60vh; overflow-y: auto;
    display: none;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 10px 14px; cursor: pointer;
    font-size: 12px; color: var(--cream);
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: rgba(197, 79, 62, 0.18); }
  .search-item .title { font-weight: 500; }
  .search-item .sub { font-size: 10px; color: var(--cream-dim); margin-top: 2px; }
  .search-item.empty { color: var(--cream-dim); cursor: default; }
  .search-item.empty:hover { background: transparent; }
  .search-attribution {
    padding: 7px 14px 8px;
    border-top: 1px solid var(--line);
    color: var(--cream-dim);
    font-size: 9px;
    letter-spacing: 0.02em;
  }

  /* === Bottom panel === */
  .panel {
    position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 1000;
    background: rgba(15, 17, 22, 0.94);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 14px 24px 16px;
    border-top: 2px solid var(--vermillion);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    max-width: 1100px; margin: 0 auto;
    transition: padding 0.3s ease;
  }

  /* === パネル開閉 トグル === */
  .panel-toggle {
    position: absolute;
    top: -26px; left: 50%; transform: translateX(-50%);
    width: 64px; height: 26px;
    background: rgba(15, 17, 22, 0.94);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: none;
    border-top: 2px solid var(--vermillion);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    color: var(--cream);
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.1em;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 -6px 18px rgba(0,0,0,0.3);
    transition: color 0.2s, background 0.2s;
  }
  .panel-toggle:hover { color: var(--vermillion); }
  .panel-toggle .chev {
    display: inline-block;
    transition: transform 0.3s ease;
    font-size: 13px;
    line-height: 1;
  }
  .panel.collapsed .panel-toggle .chev { transform: rotate(180deg); }

  /* v2.1: 全画面化 (パネル全体を隠す) ボタン */
  .panel-minimize {
    position: absolute;
    top: -26px; left: calc(50% + 38px);
    width: 32px; height: 26px;
    background: rgba(15, 17, 22, 0.94);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: none;
    border-top: 2px solid var(--gold);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    color: var(--cream);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 -6px 18px rgba(0,0,0,0.3);
    transition: color 0.2s;
    line-height: 1;
  }
  .panel-minimize:hover { color: var(--gold); }

  /* v2.1: 全画面 (パネル非表示) モード: body にクラスを付与 */
  body.panel-minimized .panel { display: none !important; }
  body.panel-minimized .mini-pill { display: inline-flex; }

  .mini-pill {
    display: none;
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: none;
    border-left: 3px solid var(--vermillion);
    color: var(--cream);
    cursor: pointer;
    padding: 9px 14px;
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    align-items: center; gap: 10px;
    max-width: calc(100vw - 32px);
    transition: background 0.15s;
  }
  .mini-pill:hover { background: rgba(15, 17, 22, 0.98); }
  .mini-pill .mp-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 60vw;
  }
  .mini-pill .mp-restore {
    color: var(--cream-dim); font-size: 14px;
    flex-shrink: 0;
  }

  /* v3.1: テーマ / レイヤー ポップオーバー (下 pane の上に展開) */
  .popover {
    position: absolute;
    bottom: calc(100% + 8px);  /* JS で controls-row のボタンに合わせて anchor */
    right: 16px;
    z-index: 1500;
    width: 280px;
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-left: 3px solid var(--gold);
    box-shadow: 0 -10px 36px rgba(0,0,0,0.5);
    padding: 14px 16px;
    display: none;
  }
  .popover.show { display: block; animation: pop-in 0.18s ease-out; }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* 下から上に展開するので arrow は下向き */
  .popover-arrow {
    position: absolute;
    bottom: -6px; right: 24px;
    width: 12px; height: 12px;
    background: rgba(15, 17, 22, 0.96);
    transform: rotate(45deg);
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    border-top: none;
  }
  .popover-layers .popover-arrow { right: 64px; }
  .popover-help {
    font-size: 10px;
    color: var(--cream-dim);
    line-height: 1.55;
    padding: 8px 4px 0;
    border-top: 1px dashed var(--line);
    margin-top: 4px;
  }
  .popover-help b { color: var(--gold); font-weight: 500; }
  .popover-title {
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .theme-option {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px;
    cursor: pointer;
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px;
    color: var(--cream);
    transition: background 0.12s;
  }
  .theme-option:hover { background: rgba(197, 79, 62, 0.14); }
  .theme-option.active { background: rgba(200, 169, 106, 0.18); }
  .theme-swatch {
    width: 22px; height: 22px;
    border: 1px solid var(--line);
    flex-shrink: 0;
    background-size: cover;
  }
  .theme-swatch.pale  { background: linear-gradient(135deg, #f5f1e8, #e0d7c0); }
  .theme-swatch.std   { background: linear-gradient(135deg, #cce6ff, #a8d5a8); }
  .theme-swatch.photo { background: linear-gradient(135deg, #4a6a4a, #2d4a2d); }

  .layer-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px;
    cursor: pointer;
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px;
    color: var(--cream);
    user-select: none;
  }
  .layer-toggle input { cursor: pointer; }
  .layer-toggle:hover { color: var(--gold); }
  .popover-divider { height: 1px; background: var(--line); margin: 10px 0; }
  .tour-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 9px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tour-btn:hover { border-color: var(--vermillion); color: var(--vermillion); }

  @media (max-width: 720px) {
    .popover { width: calc(100vw - 16px); right: 8px; top: calc(8px + 44px + 8px); }
    .popover-arrow { right: 16px; }
    .popover-layers .popover-arrow { right: 56px; }
  }

  /* v3: 浮世絵ピン (ティアドロップ風) */
  .ukiyoe-marker { background: transparent; border: none; }
  .um-inner {
    width: 34px; height: 34px;
    background: var(--cream);
    border: 2px solid var(--vermillion);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4), 0 0 0 3px rgba(255, 46, 154, 0.18);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .ukiyoe-marker:hover .um-inner {
    transform: scale(1.15);
    box-shadow: 0 5px 14px rgba(0,0,0,0.5), 0 0 0 6px rgba(255, 46, 154, 0.3);
  }

  /* オーバーレイ tooltip 共通 */
  .leaflet-tooltip.overlay-tooltip {
    background: rgba(15, 17, 22, 0.95) !important;
    color: var(--cream) !important;
    border: none !important;
    border-left: 2px solid var(--gold) !important;
    font-family: "Shippori Mincho B1", serif !important;
    font-size: 11px !important;
    padding: 4px 10px !important;
    border-radius: 0 !important;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4) !important;
  }
  .leaflet-tooltip.overlay-tooltip::before { display: none !important; }

  /* v3: POI モーダル (古/今写真 縦割りスライダー) */
  .poi-modal {
    display: none;
    position: fixed; inset: 0;
    z-index: 2700;
  }
  .poi-modal.show { display: block; }
  .pm-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    animation: mes-fade-in 0.18s ease-out;
  }
  .pm-panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(640px, calc(100vw - 24px));
    background: rgba(15, 17, 22, 0.98);
    backdrop-filter: blur(20px);
    border-left: 3px solid var(--neon-pink);
    box-shadow: 0 18px 60px rgba(0,0,0,0.6), 0 0 30px var(--neon-pink-glow);
    animation: so-pop 0.22s cubic-bezier(0.2, 0.8, 0.3, 1.1);
    max-height: calc(100vh - 32px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .pm-header {
    padding: 12px 16px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .pm-title {
    flex: 1;
    font-family: "Shippori Mincho B1", serif;
    font-size: 16px;
    color: var(--cream);
    letter-spacing: 0.1em;
  }
  .pm-close {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream-dim);
    font-size: 13px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .pm-close:hover { color: var(--vermillion); border-color: var(--vermillion); }

  .pm-images {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #000;
    overflow: hidden;
    user-select: none;
    cursor: ew-resize;
  }
  .pm-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  /* clip-path で旧画像を可変表示 (JS が更新) */
  .pm-old-clip { display: contents; }
  .pm-img-old {
    clip-path: inset(0 50% 0 0);
    transition: none;
  }
  .pm-divider {
    position: absolute; top: 0; bottom: 0;
    left: 50%;
    width: 3px;
    background: var(--neon-pink);
    box-shadow: 0 0 16px var(--neon-pink-glow);
    transform: translateX(-50%);
    cursor: ew-resize;
    z-index: 2;
  }
  .pm-divider-handle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 38px; height: 38px;
    background: var(--neon-pink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    cursor: ew-resize;
  }
  .pm-label {
    position: absolute;
    bottom: 10px;
    padding: 4px 10px;
    background: rgba(15, 17, 22, 0.85);
    color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    z-index: 1;
    pointer-events: none;
  }
  .pm-old-label { left: 10px; border-left: 2px solid var(--gold); }
  .pm-new-label { right: 10px; border-right: 2px solid var(--cream); }
  .pm-desc {
    padding: 12px 16px;
    font-size: 12px;
    color: var(--cream);
    line-height: 1.55;
    border-top: 1px solid var(--line);
    background: rgba(0,0,0,0.3);
  }
  @media (max-width: 720px) {
    .pm-panel { width: calc(100vw - 16px); }
    .pm-images { aspect-ratio: 1 / 1; }
  }

  /* v3: ガイドツアー オーバーレイ (画面上部にステップカード) */
  .tour-overlay {
    display: none;
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    z-index: 1600;
    width: min(420px, calc(100vw - 24px));
    pointer-events: none;
  }
  .tour-overlay.show { display: block; }
  .to-panel {
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(16px);
    border-left: 3px solid var(--vermillion);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    pointer-events: auto;
    animation: pop-in 0.2s ease-out;
  }
  .to-header {
    padding: 10px 14px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .to-title {
    flex: 1;
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px;
    color: var(--cream);
    letter-spacing: 0.08em;
  }
  .to-close {
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim); font-size: 12px; padding: 3px 8px;
    cursor: pointer;
  }
  .to-step {
    padding: 12px 14px;
    color: var(--cream);
    font-size: 12px;
    line-height: 1.6;
    min-height: 60px;
  }
  .to-step h4 {
    font-family: "Shippori Mincho B1", serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .to-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-top: 1px solid var(--line);
  }
  .to-controls button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .to-controls button:hover:not(:disabled) { border-color: var(--vermillion); color: var(--vermillion); }
  .to-controls button:disabled { opacity: 0.35; cursor: not-allowed; }
  .to-progress {
    flex: 1; text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--cream-dim);
  }

  /* ツアー選択モーダル */
  .tour-picker { display: none; position: fixed; inset: 0; z-index: 2600; }
  .tour-picker.show { display: block; }
  .tp-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.55); animation: mes-fade-in 0.18s; }
  .tp-panel {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(420px, calc(100vw - 24px));
    background: rgba(15, 17, 22, 0.97);
    border-left: 3px solid var(--gold);
    box-shadow: 0 16px 60px rgba(0,0,0,0.6);
    animation: so-pop 0.2s;
  }
  .tp-header { padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid var(--line); }
  .tp-title { flex: 1; font-family: "Shippori Mincho B1", serif; font-size: 14px; color: var(--cream); letter-spacing: 0.1em; }
  .tp-close { background: transparent; border: 1px solid var(--line); color: var(--cream-dim); padding: 4px 10px; cursor: pointer; }
  .tp-body { padding: 8px 0 12px; }
  .tp-tour {
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(58, 61, 68, 0.4);
    transition: background 0.15s;
  }
  .tp-tour:hover { background: rgba(197, 79, 62, 0.14); }
  .tp-tour-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .tp-icon { font-size: 22px; flex-shrink: 0; }
  .tp-tour-titles { flex: 1; min-width: 0; }
  .tp-tour h4 { font-family: "Shippori Mincho B1", serif; font-size: 14px; color: var(--cream); font-weight: 500; line-height: 1.2; }
  .tp-tour-theme {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; color: var(--gold);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }
  .tp-tour-count {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; color: var(--cream-dim);
    padding: 3px 8px;
    border: 1px solid var(--line);
    flex-shrink: 0;
  }
  .tp-tour p  { font-size: 11px; color: var(--cream-dim); line-height: 1.55; }

  /* v2.1: キーボードショートカット一覧モーダル */
  .shortcuts-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 2500;
  }
  .shortcuts-overlay.show { display: block; }
  .so-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    animation: mes-fade-in 0.18s ease-out;
  }
  .so-panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(420px, calc(100vw - 32px));
    background: rgba(15, 17, 22, 0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-left: 3px solid var(--gold);
    box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 40px rgba(200, 169, 106, 0.15);
    animation: so-pop 0.22s cubic-bezier(0.2, 0.8, 0.3, 1.1);
  }
  @keyframes so-pop {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .so-header {
    padding: 14px 18px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .so-title {
    flex: 1;
    font-family: "Shippori Mincho B1", serif;
    font-size: 15px;
    color: var(--cream);
    letter-spacing: 0.1em;
  }
  .so-close {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream-dim);
    font-size: 13px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .so-close:hover { color: var(--vermillion); border-color: var(--vermillion); }
  .so-body { padding: 14px 18px 16px; }
  .so-row {
    display: flex; align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
    color: var(--cream);
  }
  .so-row kbd {
    display: inline-block;
    min-width: 28px;
    padding: 3px 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--cream);
    background: rgba(58, 61, 68, 0.6);
    border: 1px solid var(--line);
    border-radius: 3px;
    text-align: center;
    line-height: 1.2;
  }
  .so-desc {
    flex: 1;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 12px;
    color: var(--cream);
  }
  .so-divider {
    height: 1px; background: var(--line); margin: 8px 0;
  }
  /* モバイル時はショートカットは ESC のみ意味があるので "?" の説明文を少し変える */
  @media (max-width: 720px) {
    .so-panel { width: calc(100vw - 24px); }
  }

  /* 折り畳み時: era-info だけ残し、tracks と controls を隠す */
  .panel.collapsed { padding: 10px 24px 10px; }
  .panel.collapsed .tracks-wrap,
  .panel.collapsed .controls-row,
  .panel.collapsed .compare-bar { display: none !important; }
  .panel.collapsed .era-info {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .panel.collapsed .era-info.hide { display: flex !important; }
  /* 折り畳み比較中: era-info の代わりに簡易表示 */
  .panel.collapsed.compare-mode .compact-compare { display: flex; }
  .compact-compare {
    display: none;
    align-items: center; gap: 10px;
    font-size: 12px; color: var(--cream);
    flex-wrap: wrap;
  }
  .compact-compare .pill {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; letter-spacing: 0.04em;
  }
  .compact-compare .pill.a { background: var(--cream); color: var(--ink); }
  .compact-compare .pill.b { background: var(--gold); color: var(--ink); }
  /* v2: 埋まっている側のピルをネオンピンクで強調 */
  .compact-compare .pill.filled {
    box-shadow: 0 0 0 1px var(--neon-pink), 0 0 12px var(--neon-pink-glow);
  }
  .compact-compare .lbl {
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; color: var(--cream);
  }
  .compact-compare .sep { color: var(--cream-dim); }
  /* 比較中は折り畳み時に通常の era-info を隠す */
  .panel.collapsed.compare-mode .era-info { display: none !important; }

  /* === Era info (above timeline) === */
  .era-info {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .era-year {
    font-family: "JetBrains Mono", monospace;
    font-size: 22px; color: var(--vermillion);
    letter-spacing: 0.04em; font-weight: 500;
    min-width: 70px;
  }
  .era-label {
    font-family: "Shippori Mincho B1", serif;
    font-size: 16px; color: var(--cream);
    letter-spacing: 0.06em;
  }
  .era-sub {
    font-size: 11px; color: var(--cream-dim);
    letter-spacing: 0.05em;
  }
  /* era-info はラベルとアトリビュートを縦積み (右側にはみ出す事故を防止) */
  .era-info { flex-wrap: wrap; row-gap: 4px; }
  .era-info > .era-meta { flex: 1 1 auto; min-width: 0; }
  .era-attr {
    flex: 1 1 100%;
    font-size: 10px; color: var(--cream-dim);
    letter-spacing: 0.04em;
    text-align: left;
    margin-top: 4px;
    line-height: 1.4;
    opacity: 0.7;
    word-break: break-word;
  }
  .era-attr a { color: var(--gold); text-decoration: none; }
  .era-attr a:hover { text-decoration: underline; }
  .era-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .era-badge {
    border: 1px solid var(--line); color: var(--cream-dim);
    font-size: 9px; line-height: 1; padding: 3px 5px;
    letter-spacing: 0.03em;
  }
  .era-badge.warning { border-color: rgba(200,169,106,0.7); color: var(--gold); }

  /* === 比較バー (比較モード時のみ表示) === */
  .compare-bar {
    display: none;
    align-items: stretch; gap: 8px;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .compare-bar.show { display: flex; }
  .era-info.hide { display: none; }
  .slot {
    flex: 1; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    background: rgba(15, 17, 22, 0.4);
    transition: all 0.2s;
    position: relative;
    min-width: 0;
  }
  .slot:hover { border-color: var(--cream-dim); background: rgba(15, 17, 22, 0.6); }
  .slot.active-slot {
    outline: 2px solid var(--vermillion);
    outline-offset: 2px;
  }
  .slot.active-slot::after {
    content: '選択中';
    margin-left: auto;
    font-size: 9px;
    color: var(--vermillion);
    white-space: nowrap;
  }
  .slot.slot-a { border-left: 3px solid var(--cream); }
  .slot.slot-b { border-left: 3px solid var(--gold); }
  /* v2: A/B が埋まっているスロットをネオンピンクで強調 */
  .slot:not(.empty) {
    border-color: var(--neon-pink);
    box-shadow: 0 0 0 1px var(--neon-pink-soft), 0 0 18px var(--neon-pink-glow);
    background: rgba(255, 46, 154, 0.06);
    animation: neon-pulse 2.2s ease-in-out infinite;
  }
  @keyframes neon-pulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--neon-pink-soft), 0 0 18px var(--neon-pink-glow); }
    50%      { box-shadow: 0 0 0 1px var(--neon-pink), 0 0 28px var(--neon-pink-soft); }
  }
  .slot-pill {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px;
    flex-shrink: 0; letter-spacing: 0.04em;
  }
  .slot-a .slot-pill { background: var(--cream); color: var(--ink); }
  .slot-b .slot-pill { background: var(--gold); color: var(--ink); }
  .slot-name {
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px; color: var(--cream);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .slot.empty .slot-name { color: var(--cream-dim); font-style: italic; }
  .slot .active-tag {
    margin-left: auto;
    font-size: 9px; color: var(--vermillion);
    letter-spacing: 0.1em;
    border: 1px solid var(--vermillion);
    padding: 3px 7px;
    flex-shrink: 0;
    animation: pulse-soft 1.6s ease-in-out infinite;
  }
  @keyframes pulse-soft { 50% { opacity: 0.5; } }
  .swap-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim); cursor: pointer;
    padding: 0 12px; font-size: 16px;
    transition: all 0.3s;
    flex-shrink: 0; min-width: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .swap-btn:hover {
    border-color: var(--gold); color: var(--gold);
    transform: rotate(180deg);
  }

  /* === Tracks (aerial top + paper bottom) === */
  .tracks-wrap {
    position: relative;
    margin-bottom: 12px;
    user-select: none; -webkit-user-select: none;
  }
  .track {
    position: relative;
    height: 36px;
  }
  .track-label {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    font-family: "Shippori Mincho B1", serif;
    font-size: 10px; letter-spacing: 0.12em;
    color: var(--cream-dim);
    pointer-events: none;
    background: rgba(15, 17, 22, 0.7);
    padding: 2px 8px;
    z-index: 3;
  }
  .track-ticks {
    position: relative;
    margin-left: 64px; /* room for label */
    height: 100%;
  }
  /* 紙地図だけは時期数が多いため、独立した横スクロール領域にする */
  .paper-scroll {
    position: relative;
    height: 100%;
    margin-left: 64px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
    scroll-behavior: smooth;
  }
  .paper-scroll::-webkit-scrollbar { height: 3px; }
  .paper-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .paper-scroll .track-ticks {
    width: 1500px;
    min-width: 1500px;
    margin-left: 0;
  }
  .paper-track::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 28px;
    pointer-events: none;
    z-index: 4;
    background: linear-gradient(to right, transparent, var(--ink));
  }

  /* === Map selector rails ===
     Proportional tick placement cannot accommodate multiple overlapping map
     editions.  The selector therefore uses chronological, independently
     sized cards; the timeline's two source tracks remain visible. */
  .tracks-wrap {
    display: grid;
    gap: 7px;
    margin-bottom: 14px;
  }
  .track {
    height: auto;
    min-height: 46px;
    display: grid;
    grid-template-columns: 64px minmax(0, 1fr);
    align-items: center;
  }
  .track-label {
    position: static;
    transform: none;
    justify-self: start;
  }
  .track-ticks,
  .paper-scroll .track-ticks {
    width: auto;
    min-width: 0;
    height: auto;
    margin-left: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 7px 1px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .track-ticks::-webkit-scrollbar { height: 3px; }
  .track-ticks::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .paper-scroll {
    margin-left: 0;
    overflow: visible;
  }
  .paper-track::after { right: 0; height: 46px; top: 0; bottom: auto; }
  .track-divider { height: 1px; margin: 0 0 0 64px; }
  .tick,
  .aerial-track .tick,
  .paper-track .tick {
    position: relative;
    left: auto !important;
    transform: none;
    flex: 0 0 auto;
    height: 30px;
    padding: 0 9px;
    display: inline-flex;
    flex-direction: row;
    justify-content: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: rgba(255,255,255,0.025);
  }
  .aerial-track .tick .dot,
  .paper-track .tick .dot,
  .aerial-track .tick .year,
  .paper-track .tick .year { order: initial; }
  .tick .year { font-size: 10px; }
  .tick:hover { transform: none; }
  .tick.active, .tick.select-a, .tick.select-b { border-color: var(--vermillion); }
  .tick.select-a { border-color: var(--cream); }
  .tick.select-b { border-color: var(--gold); }
  .tick.select-a::after,
  .tick.select-b::after,
  .paper-track .tick.select-a::after,
  .paper-track .tick.select-b::after {
    top: -7px;
    bottom: auto;
    right: 3px;
    left: auto;
    transform: none;
  }
  .aerial-track .tick .tooltip,
  .paper-track .tick .tooltip { top: calc(100% + 5px); bottom: auto; margin: 0; }
  /* 真ん中の太い線 */
  .track-divider {
    position: relative;
    height: 3px;
    margin: 2px 0;
    background: var(--vermillion);
    box-shadow: 0 0 12px rgba(197, 79, 62, 0.5);
  }
  .track-divider::before {
    content: ''; position: absolute; inset: -4px 0;
    background: linear-gradient(to bottom, transparent, rgba(197, 79, 62, 0.18), transparent);
  }
  .tick {
    position: absolute; top: 0; height: 100%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: transform 0.15s;
    z-index: 2;
  }
  /* 航空写真トラック: 年が上、ドットが下 (中央線寄り) */
  .aerial-track .tick { justify-content: flex-end; padding-bottom: 0; }
  .aerial-track .tick .year { order: 1; }
  .aerial-track .tick .dot  { order: 2; }
  /* 紙地図トラック: ドットが上 (中央線寄り)、年が下 */
  .paper-track .tick  { justify-content: flex-start; padding-top: 0; }
  .paper-track .tick .dot  { order: 1; }
  .paper-track .tick .year { order: 2; }
  .tick .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--ink-soft);
    border: 1.5px solid var(--cream-dim);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tick.cat-old .dot      { border-color: var(--gold);   background: rgba(200, 169, 106, 0.3); }
  .tick.cat-aerial .dot   { border-color: var(--silver); background: rgba(184, 184, 184, 0.3); }
  .tick.cat-topo .dot     { border-color: var(--gold);   background: rgba(200, 169, 106, 0.3); }
  .tick .year {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--cream-dim);
    letter-spacing: 0.02em;
    line-height: 1;
    white-space: nowrap;
  }
  .tick:hover { transform: none; }
  .tick:hover .dot { transform: none; }
  /* 単一モード = アクティブ (朱) */
  .tick.active .dot {
    width: 15px; height: 15px;
    background: var(--vermillion); border-color: var(--vermillion);
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  .tick.active .year { color: var(--vermillion); font-weight: 500; }
  /* 比較モード = A (cream) / B (gold) */
  .tick.select-a .dot {
    width: 15px; height: 15px;
    background: var(--cream); border-color: var(--cream);
    box-shadow: 0 0 0 4px rgba(232, 227, 214, 0.25);
  }
  .tick.select-a .year { color: var(--cream); font-weight: 500; }
  .tick.select-a::after {
    content: 'A'; position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%) translateY(-100%);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--cream); letter-spacing: 0.04em;
  }
  .tick.select-b .dot {
    width: 15px; height: 15px;
    background: var(--gold); border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(200, 169, 106, 0.3);
  }
  .tick.select-b .year { color: var(--gold); font-weight: 500; }
  .tick.select-b::after {
    content: 'B'; position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%) translateY(-100%);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--gold); letter-spacing: 0.04em;
  }
  /* paper-track の A/B ラベルは下に出す */
  .paper-track .tick.select-a::after,
  .paper-track .tick.select-b::after {
    top: auto; bottom: -2px; transform: translateX(-50%) translateY(100%);
  }
  /* 比較モード時、未選択ティックがやや浮き上がる */
  .tracks-wrap.compare .tick:not(.select-a):not(.select-b) .dot {
    box-shadow: 0 0 0 3px rgba(197, 79, 62, 0.12);
  }
  .tick .tooltip {
    position: absolute; left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(8px);
    padding: 5px 10px;
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px; letter-spacing: 0.05em;
    color: var(--cream); white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
    border-left: 2px solid var(--gold);
    z-index: 10;
  }
  .aerial-track .tick .tooltip { bottom: 100%; margin-bottom: 4px; }
  .paper-track .tick .tooltip  { top: 100%; margin-top: 4px; }
  .tick:hover .tooltip { opacity: 0; }

  /* === Bottom controls row === */
  .controls-row {
    display: flex; gap: 16px; align-items: center;
  }
  .slider-wrap { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 2px; background: var(--line); outline: none;
    cursor: pointer; min-width: 80px;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--vermillion); cursor: pointer;
    box-shadow: 0 0 0 4px var(--vermillion-glow);
    transition: transform 0.15s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--vermillion); cursor: pointer; border: none;
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  .slider-val {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; color: var(--cream); min-width: 42px;
    text-align: right;
  }
  .ctrl-label {
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; letter-spacing: 0.12em; color: var(--cream-dim);
    flex-shrink: 0; min-width: 32px;
  }
  .compare-btn {
    padding: 8px 16px;
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim);
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s;
    flex-shrink: 0;
  }
  .compare-btn:hover { border-color: var(--vermillion); color: var(--vermillion); }
  .compare-btn.active {
    background: var(--vermillion); border-color: var(--vermillion);
    color: var(--cream);
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  /* v3.1: 下paneのアイコンボタン (テーマ/レイヤー) */
  .panel-icon-btn {
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    min-width: 40px;
    line-height: 1;
  }
  .panel-icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .panel-icon-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200, 169, 106, 0.12); }

  /* v3: タイムラプス再生ボタン */
  .play-btn {
    padding: 8px 14px;
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    flex-shrink: 0;
    min-width: 42px;
  }
  .play-btn:hover { border-color: var(--gold); color: var(--gold); }
  .play-btn.playing {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    animation: play-pulse 1.5s ease-in-out infinite;
  }
  @keyframes play-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200, 169, 106, 0.4); }
    50%      { box-shadow: 0 0 0 8px rgba(200, 169, 106, 0); }
  }
  /* A/B のスライダー両端ラベルは v2 で削除 (slot bar と tick 色で既に識別可) */
  .slider-end { display: none !important; }

  /* === Locate marker === */
  .locate-marker {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--vermillion);
    border: 2px solid var(--cream);
    box-shadow: 0 0 0 6px var(--vermillion-glow), 0 4px 12px rgba(0,0,0,0.4);
  }
  /* === Search-result marker === */
  .search-marker {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold);
    border: 3px solid var(--cream);
    box-shadow: 0 0 0 4px rgba(200, 169, 106, 0.45), 0 4px 12px rgba(0,0,0,0.5);
    animation: pulse-ring 1.6s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0   rgba(200, 169, 106, 0.7), 0 4px 12px rgba(0,0,0,0.5); }
    70%  { box-shadow: 0 0 0 14px rgba(200, 169, 106, 0),   0 4px 12px rgba(0,0,0,0.5); }
    100% { box-shadow: 0 0 0 0   rgba(200, 169, 106, 0),   0 4px 12px rgba(0,0,0,0.5); }
  }
  .leaflet-tooltip.search-tooltip {
    background: rgba(15, 17, 22, 0.95) !important;
    color: var(--cream) !important;
    border: none !important;
    border-left: 2px solid var(--gold) !important;
    font-family: "Shippori Mincho B1", serif !important;
    font-size: 12px !important;
    padding: 5px 10px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    border-radius: 0 !important;
  }
  .leaflet-tooltip.search-tooltip::before { display: none !important; }

  /* === Leaflet overrides === */
  .leaflet-control-attribution {
    background: rgba(15, 17, 22, 0.88) !important;
    color: var(--cream-dim) !important;
    font-size: 10px !important; padding: 4px 10px !important;
    border: none !important;
    max-width: 60vw;
  }
  .leaflet-control-attribution a { color: var(--gold) !important; }
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
    margin-top: 100px !important;
  }
  .leaflet-control-zoom a {
    background: rgba(15, 17, 22, 0.92) !important;
    color: var(--cream) !important;
    border-color: var(--line) !important;
    backdrop-filter: blur(8px);
  }
  .leaflet-control-zoom a:hover {
    background: var(--vermillion) !important;
    color: var(--cream) !important;
  }

  /* === Hint === */
  .hint {
    position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
    z-index: 1001; color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px; letter-spacing: 0.08em;
    background: rgba(15, 17, 22, 0.92);
    padding: 10px 20px; backdrop-filter: blur(8px);
    pointer-events: none; opacity: 0;
    transition: opacity 0.4s;
    border-left: 2px solid var(--gold);
    text-align: center; max-width: 480px;
  }
  .hint.show { opacity: 1; }

  /* === Out-of-bounds hint (when current view has no data on active era) ===
     v2: search-bar (top:16px + ~44px = 60px) と brand (top:16px + ~60px = 76px) の
     両方を確実に避けるため top:96px に降ろす。左右マージンも明示。 */
  .bounds-hint {
    position: absolute;
    top: 96px;
    left: 50%; transform: translateX(-50%);
    z-index: 999;  /* search-results (1000) より下に置き、検索中は隠れる */
    background: rgba(197, 79, 62, 0.95);
    color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; letter-spacing: 0.06em;
    padding: 9px 16px;
    border-left: 3px solid var(--gold);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
    max-width: calc(100vw - 32px);
    text-align: center;
    line-height: 1.4;
  }
  .bounds-hint.show { display: block; }
  .bounds-hint .center-btn {
    display: inline-block; margin-left: 8px;
    padding: 2px 9px;
    background: var(--cream); color: var(--ink);
    border: none; cursor: pointer;
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px; font-weight: 500;
    transition: opacity 0.2s;
  }
  .bounds-hint .center-btn:hover { opacity: 0.85; }

  /* === v2 Mobile era picker (trigger button + bottom sheet) ===
     デフォルトは非表示。モバイル時のみ表示してタイムラインを置き換える */
  .mobile-era-trigger { display: none; }

  .mobile-era-sheet {
    display: none;
    position: fixed; inset: 0;
    z-index: 2000;
  }
  .mobile-era-sheet.show { display: block; }
  .mes-backdrop {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    animation: mes-fade-in 0.2s ease-out;
  }
  .mes-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    max-height: 78vh;
    background: rgba(15, 17, 22, 0.98);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 2px solid var(--vermillion);
    box-shadow: 0 -16px 50px rgba(0, 0, 0, 0.6);
    display: flex; flex-direction: column;
    animation: mes-slide-up 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes mes-slide-up { from { transform: translateY(100%);} to { transform: translateY(0);} }
  @keyframes mes-fade-in  { from { opacity: 0;} to { opacity: 1;} }
  .mes-handle {
    width: 40px; height: 4px;
    background: var(--cream-dim);
    border-radius: 2px;
    margin: 10px auto 6px;
    opacity: 0.4;
  }
  .mes-header {
    padding: 4px 18px 12px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .mes-title {
    flex: 1;
    font-family: "Shippori Mincho B1", serif;
    font-size: 16px;
    color: var(--cream);
    letter-spacing: 0.08em;
  }
  .mes-close {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream-dim);
    font-size: 14px;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mes-close:hover, .mes-close:active {
    color: var(--vermillion); border-color: var(--vermillion);
  }
  /* v2.1: カテゴリフィルターチップ */
  .mes-filters {
    display: flex; gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mes-filters::-webkit-scrollbar { display: none; }
  .mes-chip {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream-dim);
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .mes-chip:hover, .mes-chip:active { color: var(--cream); border-color: var(--cream-dim); }
  .mes-chip.is-active {
    background: var(--vermillion);
    border-color: var(--vermillion);
    color: var(--cream);
    box-shadow: 0 0 12px var(--vermillion-glow);
  }

  .mes-body {
    flex: 1; min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px 0 calc(env(safe-area-inset-bottom, 8px) + 14px);
  }
  .mes-section { padding: 10px 0 4px; }
  .mes-section-title {
    font-family: "Shippori Mincho B1", serif;
    font-size: 10px;
    color: var(--cream-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 18px;
  }
  .mes-row {
    display: flex; align-items: center;
    padding: 11px 18px;
    cursor: pointer;
    gap: 14px;
    border-bottom: 1px solid rgba(58, 61, 68, 0.4);
    transition: background 0.12s;
  }
  .mes-row:active { background: rgba(197, 79, 62, 0.18); }
  .mes-row.is-active { background: rgba(197, 79, 62, 0.18); border-left: 3px solid var(--vermillion); padding-left: 15px; }
  /* v2: A/B 選択中の行はネオンピンクで強調 (左枠は A=cream / B=gold で識別) */
  .mes-row.is-a {
    background: rgba(255, 46, 154, 0.10);
    border-left: 3px solid var(--cream);
    padding-left: 15px;
    box-shadow: inset 0 0 0 1px var(--neon-pink-soft), 0 0 16px var(--neon-pink-glow);
  }
  .mes-row.is-b {
    background: rgba(255, 46, 154, 0.10);
    border-left: 3px solid var(--gold);
    padding-left: 15px;
    box-shadow: inset 0 0 0 1px var(--neon-pink-soft), 0 0 16px var(--neon-pink-glow);
  }
  .mes-row .dot {
    width: 13px; height: 13px; border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid var(--cream-dim);
    background: var(--ink-soft);
  }
  .mes-row.cat-old    .dot { border-color: var(--gold);   background: rgba(200, 169, 106, 0.3); }
  .mes-row.cat-aerial .dot { border-color: var(--silver); background: rgba(184, 184, 184, 0.3); }
  .mes-row.cat-topo   .dot { border-color: var(--gold);   background: rgba(200, 169, 106, 0.3); }
  .mes-row .year {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--cream);
    min-width: 48px;
    font-weight: 500;
  }
  .mes-row .label-wrap { flex: 1; min-width: 0; }
  .mes-row .label {
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px;
    color: var(--cream);
    line-height: 1.2;
  }
  .mes-row .sub {
    font-size: 10px;
    color: var(--cream-dim);
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mes-row .tag {
    font-size: 10px;
    font-family: "JetBrains Mono", monospace;
    padding: 3px 8px;
    letter-spacing: 0.06em;
    font-weight: 700;
    flex-shrink: 0;
  }
  .mes-row .tag.active-tag { background: var(--vermillion); color: var(--cream); }
  .mes-row .tag.a-tag      { background: var(--cream); color: var(--ink); }
  .mes-row .tag.b-tag      { background: var(--gold); color: var(--ink); }

  /* === Mobile === */
  @media (max-width: 720px) {
    .panel {
      padding: 10px 12px 12px;
      bottom: 8px; left: 8px; right: 8px;
      /* v2: max-height + overflow-y を撤去。これが panel-toggle (top:-26px) を
         切り取って「トグルが出ない」原因だった。代わりに collapse 機能で縦圧縮する */
      overflow: visible;
    }
    .panel-toggle { width: 72px; height: 30px; font-size: 14px; }

    /* === Brand + Search === */
    .brand { padding: 8px 12px 6px; top: 8px; left: 8px; border-left-width: 2px; }
    .brand h1 { font-size: 14px; letter-spacing: 0.05em; }
    .brand .en { font-size: 8px; margin-top: 4px; }
    .search-bar { top: 8px; right: 8px; left: auto; gap: 6px; }
    .search-input { width: 140px; padding: 10px 10px 10px 30px; font-size: 12px; }
    .search-input-wrap::before { left: 8px; font-size: 13px; }
    .icon-btn { min-width: 40px; padding: 0 10px; font-size: 14px; }
    .search-results { min-width: 0; width: calc(100vw - 16px); right: 0; max-width: none; }
    .leaflet-control-zoom { margin-top: 68px !important; }
    /* Leaflet 帰属表示は panel と被るのでモバイルでは隠す。
       代わりに era-attr (panel 内) で出典を見せる */
    .leaflet-control-attribution { display: none !important; }
    .era-attr {
      display: block !important;
      max-width: 100%;
      font-size: 9px;
      margin-top: 4px;
      text-align: left;
      opacity: 0.6;
      line-height: 1.3;
    }
    .bounds-hint { top: 64px; font-size: 11px; padding: 7px 12px; }

    /* === Era info === */
    .era-info { gap: 8px; flex-wrap: wrap; margin-bottom: 8px; padding-bottom: 8px; }
    .era-year { font-size: 18px; min-width: 50px; }
    .era-label { font-size: 14px; }
    .era-sub { font-size: 10px; }
    .era-attr { display: none; }

    /* === Compare bar: stack vertically + ultra-compact on mobile === */
    .compare-bar.show { flex-direction: column; gap: 4px; }
    .slot { padding: 6px 10px; gap: 8px; }
    .slot-pill { font-size: 9px; padding: 2px 7px; }
    .slot-name { font-size: 11px; }
    .swap-btn {
      align-self: stretch; padding: 2px 8px;
      transform: none; /* モバイルは横方向のままで縦並びの間に挟む */
      height: 22px; min-width: 0;
      border-color: var(--line);
    }
    .swap-btn:hover { transform: none; }

    /* v2: モバイルでは横タイムラインを完全に非表示にし、
       ボトムシート式の縦リストで年代選択を行う (密集衝突を根本回避) */
    .tracks-wrap { display: none !important; }

    .mobile-era-trigger {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: rgba(15, 17, 22, 0.5);
      border: 1px solid var(--line);
      border-left: 3px solid var(--vermillion);
      color: var(--cream);
      font-family: "Shippori Mincho B1", serif;
      font-size: 13px;
      padding: 11px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    .mobile-era-trigger:active { background: rgba(197, 79, 62, 0.18); }
    .mobile-era-trigger .met-icon { font-size: 16px; flex-shrink: 0; }
    .mobile-era-trigger .met-text {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mobile-era-trigger .met-arrow {
      color: var(--cream-dim);
      font-size: 14px;
      flex-shrink: 0;
    }
    /* 折り畳み中は trigger ボタンも隠す */
    .panel.collapsed .mobile-era-trigger { display: none !important; }

    /* === 旧: 横スクロール (非モバイルでは生かす) === */
    .tracks-wrap-legacy-ignore {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
      padding-bottom: 4px;
    }
    .tracks-wrap::-webkit-scrollbar { height: 3px; }
    .tracks-wrap::-webkit-scrollbar-thumb { background: var(--line); }
    .tracks-wrap > .track,
    .tracks-wrap > .track-divider {
      min-width: 1200px; /* v2: 760→1200px に拡大、ティック間隔を広げて密集回避 */
    }
    .track { height: 38px; padding: 0; }
    /* モバイルでは label を隠してスペースを稼ぐ。ティックの色 (silver/gold/moss)
       で航空写真/絵図/地形図 を識別できる */
    .track-label { display: none; }
    .track-ticks { margin-left: 0; min-width: 1140px; }
    .paper-scroll { margin-left: 0; }
    /* divider をモバイルで細く */
    .track-divider { height: 2px; box-shadow: 0 0 6px rgba(197, 79, 62, 0.4); }
    .tick .dot { width: 14px; height: 14px; }
    .tick.active .dot,
    .tick.select-a .dot,
    .tick.select-b .dot { width: 18px; height: 18px; }
    /* v2: モバイルは年ラベルを通常時は隠し、ドット色のみで識別。
       選択中 (active / select-a / select-b) のティックだけ年を表示する。
       これで topo_X や aerial_19XX の密集帯でも文字衝突しない */
    .tick .year {
      font-size: 10px;
      display: none;
    }
    .tick.active .year,
    .tick.select-a .year,
    .tick.select-b .year {
      display: block;
      position: absolute;
      left: 50%; transform: translateX(-50%);
      padding: 1px 5px;
      background: rgba(15, 17, 22, 0.9);
      border-radius: 2px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
    }
    /* 航空写真トラック: バッジは下側 (中央線寄りの反対) */
    .aerial-track .tick.active .year,
    .aerial-track .tick.select-a .year,
    .aerial-track .tick.select-b .year { top: -2px; transform: translateX(-50%) translateY(-100%); }
    /* 紙地図トラック: バッジは下側 */
    .paper-track .tick.active .year,
    .paper-track .tick.select-a .year,
    .paper-track .tick.select-b .year { bottom: -2px; transform: translateX(-50%) translateY(100%); }
    .tick:hover { transform: translateX(-50%); /* disable hover-lift on mobile */ }
    .tick:hover .dot { transform: scale(1); }
    /* モバイルではタップで一時的に era 情報をフラッシュ表示 (JS が tap-flash クラスを付与) */
    .tick .tooltip {
      display: block;
      position: absolute;
      left: 50%; transform: translateX(-50%);
      padding: 2px 7px;
      background: rgba(15, 17, 22, 0.94);
      color: var(--cream);
      font-family: "Shippori Mincho B1", serif;
      font-size: 10px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      border-left: 2px solid var(--gold);
      border-radius: 0;
      z-index: 5;
    }
    .tick.tap-flash .tooltip { opacity: 1; }
    .aerial-track .tick .tooltip { bottom: 100%; margin-bottom: 2px; top: auto; }
    .paper-track .tick .tooltip  { top: 100%; margin-top: 2px; bottom: auto; }

    /* === Controls === */
    .controls-row { gap: 8px; flex-wrap: wrap; }
    .slider-wrap { flex: 1 1 100%; }
    .ctrl-label { min-width: 28px; font-size: 11px; }
    .compare-btn { padding: 10px 14px; }
    .slider-end { display: none !important; } /* compare 中も A/B はバーで分かる */
  }
  @media (max-width: 380px) {
    .search-input { width: 110px; }
    .icon-btn { min-width: 36px; padding: 0 8px; }
    .brand h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="brand">
  <h1>東京 今昔マップ</h1>
  <div class="en">Tokyo · Through Time</div>
</div>

<div class="search-bar">
  <div class="search-input-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="住所・駅・地名を検索" />
  </div>
  <button class="icon-btn search-submit" id="searchBtn" type="button" title="検索" aria-label="検索">⌕</button>
  <button class="icon-btn" id="locateBtn" title="現在地を表示">📍</button>
  <div class="search-results" id="searchResults">
    <div id="searchResultsContent" role="status" aria-live="polite"></div>
    <div class="search-attribution">検索データ © OpenStreetMap contributors</div>
  </div>
</div>


<!-- v2.1: 共有/コピー完了トースト -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- v2.1: 全画面地図モード時の小さなフローティングピル -->

// 軸 (年→%, ピースワイズ)
// 1600-1860: 0-30% (260年で30%)
// 1860-1950: 30-55% (90年で25%)
// 1950-2030: 55-100% (80年で45%)

function yearToX(year) {
  if (year < 1860) return ((year - 1600) / 260) * 30;
  if (year < 1950) return 30 + ((year - 1860) / 90) * 25;
  return 55 + ((year - 1950) / 80) * 45;
}

// 3元連立一次方程式を解き、画像座標→画面座標のアフィン変換を求める。
function solve3(matrix, values) {
  const rows = matrix.map((row, i) => [...row, values[i]]);
  for (let col = 0; col < 3; col += 1) {
    let pivot = col;
    for (let row = col + 1; row < 3; row += 1) {
      if (Math.abs(rows[row][col]) > Math.abs(rows[pivot][col])) pivot = row;
    }
    [rows[col], rows[pivot]] = [rows[pivot], rows[col]];
    const divisor = rows[col][col];
    if (Math.abs(divisor) < 1e-12) return null;
    for (let j = col; j < 4; j += 1) rows[col][j] /= divisor;
    for (let row = 0; row < 3; row += 1) {
      if (row === col) continue;
      const factor = rows[row][col];
      for (let j = col; j < 4; j += 1) rows[row][j] -= factor * rows[col][j];
    }
  }
  return rows.map(row => row[3]);
}

function fitAffine(gcps, targets, component) {
  const normal = [[0, 0, 0], [0, 0, 0], [0, 0, 0]];
  const rhs = [0, 0, 0];
  gcps.forEach((gcp, index) => {
    const row = [gcp[0], gcp[1], 1];
    const value = targets[index][component];
    for (let i = 0; i < 3; i += 1) {
      rhs[i] += row[i] * value;
      for (let j = 0; j < 3; j += 1) normal[i][j] += row[i] * row[j];
    }
  });
  return solve3(normal, rhs);
}

const AffineImageLayer = L.Layer.extend({
  options: { opacity: 1, pane: 'overlayPane' },
  initialize(url, gcps, resourceSize, options) {
    this._url = url;
    this._gcps = gcps;
    this._resourceSize = resourceSize;
    L.setOptions(this, options);
  },
  onAdd(map) {
    this._map = map;
    this._canvas = L.DomUtil.create('canvas', 'leaflet-affine-image-layer');
    this._canvas.style.pointerEvents = 'none';
    this._canvas.style.opacity = this.options.opacity;
    this._canvas.style.zIndex = this.options.zIndex || 1;
    this.getPane().appendChild(this._canvas);
    this._image = new Image();
    this._image.onload = () => this._update();
    this._image.src = this._url;
    this._update();
  },
  onRemove() {
    if (this._canvas) this._canvas.remove();
    this._canvas = null;
    this._map = null;
  },
  getEvents() {
    return { move: this._update, zoom: this._update, viewreset: this._update, resize: this._update };
  },
  getAttribution() { return this.options.attribution; },
  setOpacity(opacity) {
    this.options.opacity = opacity;
    if (this._canvas) this._canvas.style.opacity = opacity;
    return this;
  },
  setZIndex(zIndex) {
    this.options.zIndex = zIndex;
    if (this._canvas) this._canvas.style.zIndex = zIndex;
    return this;
  },
  _update() {
    if (!this._map || !this._canvas || !this._image || !this._image.complete || !this._image.naturalWidth) return;
    const size = this._map.getSize();
    const origin = this._map.containerPointToLayerPoint([0, 0]);
    const ratio = window.devicePixelRatio || 1;
    L.DomUtil.setPosition(this._canvas, origin);
    this._canvas.style.width = `${size.x}px`;
    this._canvas.style.height = `${size.y}px`;
    this._canvas.width = Math.round(size.x * ratio);
    this._canvas.height = Math.round(size.y * ratio);
    const targets = this._gcps.map(gcp => {
      const point = this._map.latLngToContainerPoint([gcp[2], gcp[3]]);
      return [point.x, point.y];
    });
    const horizontal = fitAffine(this._gcps, targets, 0);
    const vertical = fitAffine(this._gcps, targets, 1);
    if (!horizontal || !vertical) return;
    const context = this._canvas.getContext('2d');
    context.setTransform(
      horizontal[0] * ratio, vertical[0] * ratio,
      horizontal[1] * ratio, vertical[1] * ratio,
      horizontal[2] * ratio, vertical[2] * ratio
    );
    context.imageSmoothingEnabled = true;
    context.drawImage(this._image, 0, 0, this._resourceSize[0], this._resourceSize[1]);
  }
});

// era が表示可能か (通常タイル or ローカル補正画像)
function eraHasLayer(era) {
  return !!(era && (era.url || era.affineImage));
}

function makeLayer(era) {
  let layer;
  if (era.affineImage) {
    layer = new AffineImageLayer(era.affineImage, era.gcps, era.resourceSize, {
      attribution: eraAttribution(era), opacity: 0,
    });
  } else {
    layer = L.tileLayer(era.url, {
      minZoom: era.min, maxZoom: 19, maxNativeZoom: era.max,
      tms: !!era.tms,
      bounds: era.bounds ? L.latLngBounds(era.bounds) : null,
      attribution: eraAttribution(era),
      opacity: 0,
      className: 'era-overlay',
    });
    if (era.cat === 'topo') {
      let loadedTiles = 0;
      let failedTiles = 0;
      let noDataTimer = null;
      layer.on('loading', () => {
        loadedTiles = 0;
        failedTiles = 0;
        clearTimeout(noDataTimer);
      });
      layer.on('tileload', () => { loadedTiles += 1; });
      layer.on('tileerror', () => {
        failedTiles += 1;
        clearTimeout(noDataTimer);
        noDataTimer = setTimeout(() => {
          if (map.hasLayer(layer) && failedTiles > 0) {
            const message = loadedTiles === 0
              ? `この場所には「${eraDisplayDate(era)} 東京都1:3,000地形図」の図郭がありません`
              : `「${eraDisplayDate(era)} 東京都1:3,000地形図」の白地部分は、この期間の図郭がありません`;
            showHint(message, 4800);
          }
        }, 500);
      });
    }
  }
  // 比較モードの「同一レイヤーか」判定用キー (tileLayer の _url と揃える)
  if (!layer._eraKey) layer._eraKey = era.url || era.affineImage;
  return layer;
}

function removeOverlay(slot) {
  if (slot === 'a' && layerA) {
    const old = layerA, oldAttr = attrA;
    old.setOpacity(0);
    setTimeout(() => {
      map.removeLayer(old);
      if (oldAttr) map.attributionControl.removeAttribution(oldAttr);
    }, 320);
    layerA = null; attrA = null;
  } else if (slot === 'b' && layerB) {
    const old = layerB, oldAttr = attrB;
    old.setOpacity(0);
    setTimeout(() => {
      map.removeLayer(old);
      if (oldAttr) map.attributionControl.removeAttribution(oldAttr);
    }, 320);
    layerB = null; attrB = null;
  }
}

// v2.1: A の bounds 外を半透明マスクで覆う (比較モード時のみ)
// → A のカバー範囲が一目で分かる。bounds 未定義 era (空中写真など) はマスクなし
let boundsMaskLayer = null;
function updateBoundsMask() {
  if (boundsMaskLayer) {
    map.removeLayer(boundsMaskLayer);
    boundsMaskLayer = null;
  }
  if (mode !== 'compare') return;
  if (!eraA || !eraA.bounds) return;
  // 外側リング (ほぼ全球)
  const outer = [
    [-85, -180], [85, -180], [85, 180], [-85, 180]
  ];
  // 内側リング (era の bounds、ホール扱い)
  const b = eraA.bounds;
  const inner = [
    [b[0][0], b[0][1]],
    [b[0][0], b[1][1]],
    [b[1][0], b[1][1]],
    [b[1][0], b[0][1]],
  ];
  boundsMaskLayer = L.polygon([outer, inner], {
    color: '#ff2e9a',
    weight: 1.5,
    dashArray: '6 4',
    fillColor: '#0f1116',
    fillOpacity: 0.4,
    interactive: false,
  }).addTo(map);
}

function applyState() {
  updateHash();
  setTimeout(() => checkBoundsHint && checkBoundsHint(), 0);
  // 単一モード
  if (mode === 'single') {
    if (layerB) removeOverlay('b');
    if (eraHasLayer(eraA)) {
      if (layerA) removeOverlay('a');
      layerA = makeLayer(eraA);
      attrA = eraAttribution(eraA);
      layerA.addTo(map);
      requestAnimationFrame(() => requestAnimationFrame(() => layerA && layerA.setOpacity(opacity)));
    } else if (layerA) {
      removeOverlay('a');
    }
  } else {
    // 比較モード — v2: A は常時 100% (土台)、B をスライダーで重ね合わせる方式に変更。
    // (旧クロスフェードは両方とも半透明で、下の淡色地図が透けてしまい「選択していない地図が出る」と
    //  指摘された)
    if (eraHasLayer(eraA)) {
      if (!layerA || layerA._eraKey !== (eraA.url || eraA.affineImage)) {
        if (layerA) removeOverlay('a');
        layerA = makeLayer(eraA);
        attrA = eraAttribution(eraA);
        layerA.addTo(map);
      }
      requestAnimationFrame(() => layerA && layerA.setOpacity(1));
    } else if (layerA) {
      removeOverlay('a');
    }
    if (eraHasLayer(eraB)) {
      if (!layerB || layerB._eraKey !== (eraB.url || eraB.affineImage)) {
        if (layerB) removeOverlay('b');
        layerB = makeLayer(eraB);
        attrB = eraAttribution(eraB);
        layerB.addTo(map);
      }
      requestAnimationFrame(() => layerB && layerB.setOpacity(blendAB));
    } else if (layerB) {
      removeOverlay('b');
    }
  }
  updateBoundsMask();
  updateEraSensitiveOverlays();
  renderUI();
}

// ============================================================
// ティック選択
// ============================================================
function tickClicked(eraId) {
  const era = findEra(eraId);
  if (!era || !eraHasLayer(era)) return;
  if (mode === 'single') {
    eraA = era; eraB = null; activeSlot = 'a';
  } else {
    // 上部で選んだ A/B を、次のカード選択の反映先として必ず優先する。
    if (activeSlot === 'a') {
      if (eraA && eraA.id === era.id) {
        eraA = null;
      } else {
        if (eraB && eraB.id === era.id) eraB = null;
        eraA = era;
      }
    } else {
      if (eraB && eraB.id === era.id) {
        eraB = null;
      } else {
        if (eraA && eraA.id === era.id) eraA = null;
        eraB = era;
      }
    }
  }
  applyState();
}

function swapAB() {
  if (mode !== 'compare') return;
  const tmp = eraA; eraA = eraB; eraB = tmp;
  activeSlot = activeSlot === 'a' ? 'b' : 'a';
  // blendAB も反転 (見た目の比率を維持しつつ A/B を入れ替え)
  blendAB = 1 - blendAB;
  applyState();
}

function setActiveSlot(slot) {
  if (mode !== 'compare') return;
  activeSlot = slot;
  renderUI();
}

// ============================================================
// UI 更新
// ============================================================
function renderEraInfo() {
  const eraInfo = document.getElementById('eraInfo');
  const compareBar = document.getElementById('compareBar');
  const compactCompare = document.getElementById('compactCompare');
  const panelEl = document.getElementById('panel');
  panelEl.classList.toggle('compare-mode', mode === 'compare');

  // 折り畳み時の比較サマリー
  if (mode === 'compare') {
    const a = eraA
      ? `<span class="pill a filled">A</span><span class="lbl">${escapeHtml(eraDisplayDate(eraA))} ${escapeHtml(eraA.label)}</span>`
      : `<span class="pill a">A</span><span class="lbl" style="opacity:0.5">未選択</span>`;
    const b = eraB
      ? `<span class="pill b filled">B</span><span class="lbl">${escapeHtml(eraDisplayDate(eraB))} ${escapeHtml(eraB.label)}</span>`
      : `<span class="pill b">B</span><span class="lbl" style="opacity:0.5">未選択</span>`;
    compactCompare.innerHTML = a + '<span class="sep">⇄</span>' + b;
  } else {
    compactCompare.innerHTML = '';
  }

  if (mode === 'compare') {
    eraInfo.classList.add('hide');
    compareBar.classList.add('show');
    // A/B のうち、次のカード選択を反映する側を明示する。
    const slotHtml = (slot, era) => {
      const isEmpty = !era;
      const isTarget = activeSlot === slot;
      const name = era ? `${eraDisplayDate(era)} ${era.label}${era.sub ? ' — ' + era.sub : ''}` : 'タイムラインから選択';
      return `
        <div class="slot slot-${slot} ${isEmpty ? 'empty' : ''} ${isTarget ? 'active-slot' : ''}" data-slot="${slot}" role="button" tabindex="0" aria-label="${slot.toUpperCase()} を次の選択先にする">
          <span class="slot-pill">${slot.toUpperCase()}</span>
          <span class="slot-name">${escapeHtml(name)}</span>
        </div>`;
    };
    compareBar.innerHTML = slotHtml('a', eraA) +
      '<button class="swap-btn" id="swapBtn" title="A と B を入れ替え">⇄</button>' +
      slotHtml('b', eraB);
    document.getElementById('swapBtn').addEventListener('click', swapAB);
    compareBar.querySelectorAll('.slot').forEach(slotEl => {
      const activate = () => setActiveSlot(slotEl.dataset.slot);
      slotEl.addEventListener('click', activate);
      slotEl.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          activate();
        }
      });
    });
  } else {
    compareBar.classList.remove('show');
    eraInfo.classList.remove('hide');
    if (eraA) {
      document.getElementById('eraYear').textContent = eraDisplayDate(eraA);
      document.getElementById('eraLabel').textContent = eraA.label;
      document.getElementById('eraSub').textContent = eraA.sub || '';
      document.getElementById('eraBadges').innerHTML = eraBadges(eraA);
      document.getElementById('eraAttr').innerHTML = `${eraAttribution(eraA)}${eraA.note ? ' — ' + escapeHtml(eraA.note) : ''}`;
    }
  }
}

function renderTicks() {
  const aerialDiv = document.getElementById('aerialTicks');
  const paperDiv = document.getElementById('paperTicks');
  aerialDiv.innerHTML = '';
  paperDiv.innerHTML = '';
  ERAS.slice().sort((a, b) => a.year - b.year || a.id.localeCompare(b.id)).forEach(era => {
    if (era.cat === 'modern') return;
    if (!eraHasLayer(era)) return; // qchizu 検出前の topo はスキップ
    const tick = document.createElement('div');
    tick.className = `tick cat-${era.cat}`;
    tick.dataset.id = era.id;
    tick.setAttribute('aria-label', `${eraDisplayDate(era)} ${era.label}`);
    tick.style.left = yearToX(era.year) + '%';
    tick.innerHTML = `
      <div class="dot"></div>
      <div class="year">${escapeHtml(eraTickDate(era))}</div>
      <div class="tooltip">${escapeHtml(eraDisplayDate(era))} ${escapeHtml(era.label)}${era.sub ? ' — ' + escapeHtml(era.sub) : ''}</div>
    `;
    tick.addEventListener('click', () => tickClicked(era.id));
    // v2.1: ホバーで era の bounds をマップ上にハイライト (デスクトップのみ意味あり)
    if (era.cat === 'aerial') aerialDiv.appendChild(tick);
    else paperDiv.appendChild(tick); // 'old' or 'topo'
  });
}

function renderTickHighlights() {
  document.querySelectorAll('.tick').forEach(t => {
    t.classList.remove('active', 'select-a', 'select-b');
    if (mode === 'single' && eraA && t.dataset.id === eraA.id) {
      t.classList.add('active');
    } else if (mode === 'compare') {
      if (eraA && t.dataset.id === eraA.id) t.classList.add('select-a');
      if (eraB && t.dataset.id === eraB.id) t.classList.add('select-b');
    }
  });
  document.getElementById('tracksWrap').classList.toggle('compare', mode === 'compare');

  // モバイル時、アクティブティックを横スクロール領域内に表示
  scrollActiveTickIntoView();
}

function scrollActiveTickIntoView() {
  const focus = document.querySelector('.paper-track .tick.select-b, .paper-track .tick.active, .paper-track .tick.select-a');
  const scroller = document.getElementById('paperScroll');
  if (!scroller || !focus) return;
  // offsetLeft を使うことで、URL 復元直後でも紙地図トラック内の位置を確実に求める。
  requestAnimationFrame(() => {
    const target = focus.offsetLeft - (scroller.clientWidth - focus.offsetWidth) / 2;
    scroller.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
  });
}

function renderControls() {
  const slider = document.getElementById('opacitySlider');
  const label = document.getElementById('opacityLabel');
  const val = document.getElementById('opacityVal');
  const row = document.getElementById('controlsRow');
  row.classList.toggle('compare', mode === 'compare');
  if (mode === 'compare') {
    // v2: A は土台で100%固定、スライダーは B の重ね合わせ強度
    label.textContent = 'B重ね';
    slider.value = Math.round(blendAB * 100);
    val.textContent = `A:100% / B:${slider.value}%`;
  } else {
    label.textContent = '透過';
    slider.value = Math.round(opacity * 100);
    val.textContent = slider.value + '%';
  }
  // 比較モード時はボタンに「解除」ラベル
  const btn = document.getElementById('compareBtn');
  btn.classList.toggle('active', mode === 'compare');
  btn.textContent = mode === 'compare' ? '✕ 比較を解除' : '⇆ 比較';
}

function renderUI() {
  renderEraInfo();
  renderTickHighlights();
  renderControls();
  updateMobileEraTriggerText();
  if (typeof updateMiniPillText === 'function') updateMiniPillText();
  // ボトムシートが開いていれば中身も再生成 (選択状態の即時反映)
  if (mobileEraSheet && mobileEraSheet.classList.contains('show')) {
    renderMobileSheet();
  }
}

const slider = document.getElementById('opacitySlider');
const sliderVal = document.getElementById('opacityVal');
slider.addEventListener('input', () => {
  const v = slider.value / 100;
  if (mode === 'compare') {
    blendAB = v;
    // v2: 表示は「A:100% / B:NN%」両方明示
    sliderVal.textContent = `A:100% / B:${slider.value}%`;
    if (layerA) layerA.setOpacity(1);          // A は常時不透明
    if (layerB) layerB.setOpacity(blendAB);    // B のみスライダー連動
  } else {
    opacity = v;
    sliderVal.textContent = slider.value + '%';
    if (layerA) layerA.setOpacity(opacity);
  }
});

// 比較モード切替
// ============================================================
document.getElementById('compareBtn').addEventListener('click', () => {
  if (mode === 'single') {
    mode = 'compare';
    // 現在の A を anchor として残し、B は空 → 次のクリックで B が埋まる
    eraB = null;
    blendAB = 0.5;
    activeSlot = 'b'; // 「次に B を選んでください」
    applyState();
    showHint('比較モード: A は土台に固定、もう一つの時代を選ぶと B として上に重なります。スライダーで B の濃さを調整。', 5000);
  } else {
    mode = 'single';
    eraB = null;
    activeSlot = 'a';
    if (layerB) removeOverlay('b');
    applyState();
  }
});

function renderUkiyoeOverlay() {
  overlayLayers.ukiyoe.clearLayers();
  OVERLAY_DATA.pois.forEach(p => {
    const m = L.marker([p.lat, p.lng], {
      icon: L.divIcon({
        className: 'ukiyoe-marker',

function setOverlay(key, on) {
  overlayState[key] = on;
  if (on) {
    if (key === 'ukiyoe') renderUkiyoeOverlay();
    overlayLayers[key].addTo(map);
  } else {
    map.removeLayer(overlayLayers[key]);
  }
  try { localStorage.setItem(OVERLAY_KEY + key, on ? '1' : '0'); } catch (_) {}
}
function updateEraSensitiveOverlays() { /* v3.1: 偽オーバーレイ撤去後は不要 */ }

const overlayCheckboxes = {
  ukiyoe: document.getElementById('layerUkiyoe'),
};
Object.entries(overlayCheckboxes).forEach(([key, cb]) => {
  try {
    if (localStorage.getItem(OVERLAY_KEY + key) === '1') { cb.checked = true; setOverlay(key, true); }

let activeTour = null;
let tourStepIdx = 0;
const tourOverlayEl = document.getElementById('tourOverlay');
const tourPickerEl  = document.getElementById('tourPicker');

function openTourPicker() {
  layersPopover.classList.remove('show');
  const body = document.getElementById('tourPickerBody');
  body.innerHTML = TOURS.map(t => `
    <div class="tp-tour" data-tour="${t.id}">
      <div class="tp-tour-head">
        <span class="tp-icon">${t.icon || '🧭'}</span>
        <div class="tp-tour-titles">
          <h4>${escapeHtml(t.title)}</h4>
          <div class="tp-tour-theme">${escapeHtml(t.theme || '')}</div>
        </div>
        <span class="tp-tour-count">${t.steps.length}地点</span>
      </div>
      <p>${escapeHtml(t.desc)}</p>
    </div>
  `).join('');
  body.querySelectorAll('.tp-tour').forEach(el => {
    el.addEventListener('click', () => {
      const t = TOURS.find(x => x.id === el.dataset.tour);
      tourPickerEl.classList.remove('show');
      startTour(t);
    });
  });
  tourPickerEl.classList.add('show');
}
function closeTourPicker() { tourPickerEl.classList.remove('show'); }
document.getElementById('tourBtn').addEventListener('click', openTourPicker);
document.getElementById('tourPickerClose').addEventListener('click', closeTourPicker);
document.getElementById('tourPickerBackdrop').addEventListener('click', closeTourPicker);

function startTour(t) {
  activeTour = t;
  tourStepIdx = 0;
  // 必要な overlay を自動で ON (現在は 'ukiyoe' のみ)
  if (t.requireOverlay && overlayCheckboxes[t.requireOverlay]) {
    overlayCheckboxes[t.requireOverlay].checked = true;
    setOverlay(t.requireOverlay, true);
  }
  // パネルを折り畳んでツアーカードに集中
  if (!panelEl.classList.contains('collapsed')) setPanelCollapsed(true);
  tourOverlayEl.classList.add('show');
  document.getElementById('tourTitle').textContent = t.title;
  renderTourStep();
}
function exitTour() {
  activeTour = null;
  tourStepIdx = 0;
  tourOverlayEl.classList.remove('show');
}
function renderTourStep() {
  if (!activeTour) return;
  const s = activeTour.steps[tourStepIdx];
  document.getElementById('tourStep').innerHTML = s.text;
  document.getElementById('tourProgress').textContent = `${tourStepIdx + 1} / ${activeTour.steps.length}`;
  document.getElementById('tourPrev').disabled = tourStepIdx === 0;
  document.getElementById('tourNext').textContent = tourStepIdx === activeTour.steps.length - 1 ? '🏁 終了' : '次 ▶';
  // 地図を動かす + era 切替
  map.flyTo([s.lat, s.lng], s.zoom, { duration: 1.0 });
  if (s.era && (!eraA || eraA.id !== s.era)) {
    const era = findEra(s.era);
    if (era && era.url) {
      if (mode === 'compare') { mode = 'single'; eraB = null; if (layerB) removeOverlay('b'); }
      eraA = era;
      applyState();
    }
  }
}
document.getElementById('tourNext').addEventListener('click', () => {
  if (!activeTour) return;
  if (tourStepIdx >= activeTour.steps.length - 1) { exitTour(); return; }
  tourStepIdx++;
  renderTourStep();
});
document.getElementById('tourPrev').addEventListener('click', () => {
  if (!activeTour || tourStepIdx === 0) return;
  tourStepIdx--;
  renderTourStep();
});
document.getElementById('tourClose').addEventListener('click', exitTour);

// v3: POI モーダル — 古/今写真スライダー (縦割り divider をドラッグ)
// ============================================================
function openPoiModal(poi) {
  document.getElementById('poiTitle').textContent = poi.title;
  document.getElementById('poiOldImg').src    = poi.old.url;
  document.getElementById('poiModernImg').src = poi.modern.url;
  document.getElementById('poiOldLabel').textContent = poi.old.label;
  document.getElementById('poiNewLabel').textContent = poi.modern.label;
  document.getElementById('poiDesc').textContent = poi.desc || '';
  document.getElementById('poiModal').classList.add('show');
  setPoiDivider(50);
}
function closePoiModal() {
  document.getElementById('poiModal').classList.remove('show');
}
function setPoiDivider(pct) {
  pct = Math.max(0, Math.min(100, pct));
  // 旧画像は clip-path で右側を切る (左 pct% だけ表示)
  document.getElementById('poiOldImg').style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
  document.getElementById('poiDivider').style.left = pct + '%';
  // ラベルの可視性
  document.getElementById('poiOldLabel').style.opacity = pct > 8 ? '1' : '0';
  document.getElementById('poiNewLabel').style.opacity = pct < 92 ? '1' : '0';
}
function attachPoiDividerDrag() {
  const wrap    = document.getElementById('poiImages');
  const divider = document.getElementById('poiDivider');
  let dragging = false;
  const onMove = (clientX) => {
    const r = wrap.getBoundingClientRect();
    const pct = ((clientX - r.left) / r.width) * 100;
    setPoiDivider(pct);
  };
  divider.addEventListener('mousedown', () => { dragging = true; });
  divider.addEventListener('touchstart', () => { dragging = true; });
  document.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
  document.addEventListener('touchmove', e => { if (dragging && e.touches[0]) onMove(e.touches[0].clientX); });
  document.addEventListener('mouseup',  () => dragging = false);
  document.addEventListener('touchend', () => dragging = false);
  // クリックでも divider 移動
  wrap.addEventListener('click', e => {
    if (e.target.closest('.pm-divider')) return;
    onMove(e.clientX);
  });
}

// v3: タイムラプス再生 — 江戸 → 現代を自動でスクラブ
// ============================================================
const playBtn = document.getElementById('playBtn');
const TIMELAPSE_INTERVAL = 2200;  // ms per era
let timeLapseTimer = null;
let timeLapsePlaying = false;

function startTimeLapse() {
  if (mode === 'compare') {
    // 比較モードでは挙動が混乱するので一旦 single へ
    mode = 'single'; eraB = null; if (layerB) removeOverlay('b');
    applyState();
  }
  const list = getAvailableEras().slice().sort((a, b) => a.year - b.year);
  if (!list.length) return;
  // 現在地から開始 (一番古いところが既に表示中ならその次から)
  let idx = eraA ? list.findIndex(e => e.id === eraA.id) : -1;
  if (idx < 0 || idx >= list.length - 1) {
    idx = -1; // 最初から
  }
  timeLapsePlaying = true;
  playBtn.classList.add('playing');
  playBtn.textContent = '■';
  playBtn.title = 'タイムラプス停止';
  showToast('▶ タイムラプス開始 ' + list[Math.max(0, idx + 1)].year + ' から');
  const step = () => {
    if (!timeLapsePlaying) return;
    idx++;
    if (idx >= list.length) {
      stopTimeLapse();
      showToast('🏁 タイムラプス終了');
      return;
    }
    tickClicked(list[idx].id);
    timeLapseTimer = setTimeout(step, TIMELAPSE_INTERVAL);
  };
  // 最初のステップは少し遅延
  timeLapseTimer = setTimeout(step, 400);
}
function stopTimeLapse() {
  timeLapsePlaying = false;
  if (timeLapseTimer) { clearTimeout(timeLapseTimer); timeLapseTimer = null; }
  playBtn.classList.remove('playing');
  playBtn.textContent = '▶';
  playBtn.title = 'タイムラプス再生 (江戸→現代)';
}
function toggleTimeLapse() {
  if (timeLapsePlaying) stopTimeLapse(); else startTimeLapse();
}
playBtn.addEventListener('click', toggleTimeLapse);
