<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>東京 今昔マップ — Tokyo Through Time</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1d24;
    --ink-soft: #232730;
    --ink-deep: #0f1116;
    --cream: #e8e3d6;
    --cream-dim: #a8a397;
    --vermillion: #c54f3e;
    --vermillion-glow: rgba(197, 79, 62, 0.25);
    --gold: #c8a96a;
    --silver: #b8b8b8;
    --moss: #7a9a4f;
    --line: #3a3d44;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: "Noto Sans JP", sans-serif;
    background: var(--ink); color: var(--cream);
    -webkit-tap-highlight-color: transparent;
  }

  #map { position: absolute; inset: 0; background: #efeae0; z-index: 1; }

  /* 古地図オーバーレイのフェード */
  .era-overlay { transition: opacity 0.3s ease; }

  /* === Brand === */
  .brand {
    position: absolute; top: 16px; left: 16px; z-index: 1000;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding: 13px 20px 11px;
    border-left: 3px solid var(--vermillion);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  .brand h1 {
    font-family: "Shippori Mincho B1", serif;
    font-size: 19px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--cream); line-height: 1;
  }
  .brand .en {
    font-size: 9px; color: var(--cream-dim); letter-spacing: 0.22em;
    margin-top: 7px; text-transform: uppercase; font-weight: 300;
  }

  /* === Search + Locate (top-right) === */
  .search-bar {
    position: absolute; top: 16px; right: 16px; z-index: 1000;
    display: flex; gap: 8px; align-items: stretch;
  }
  .search-input-wrap {
    position: relative;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border-right: 3px solid var(--gold);
    display: flex; align-items: stretch;
  }
  .search-input {
    background: transparent; border: none; outline: none;
    color: var(--cream);
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px; letter-spacing: 0.02em;
    padding: 11px 12px 11px 38px;
    width: 240px;
  }
  .search-input::placeholder { color: var(--cream-dim); }
  .search-input-wrap::before {
    content: '🔍';
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px; opacity: 0.7;
  }
  .icon-btn {
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border: none; border-right: 3px solid var(--vermillion);
    color: var(--cream); cursor: pointer;
    padding: 0 14px;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    min-width: 44px;
  }
  .icon-btn:hover { color: var(--vermillion); }
  .icon-btn.locating { color: var(--vermillion); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  .search-results {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(14px);
    min-width: 320px; max-width: 420px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border-right: 3px solid var(--gold);
    max-height: 60vh; overflow-y: auto;
    display: none;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 10px 14px; cursor: pointer;
    font-size: 12px; color: var(--cream);
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: rgba(197, 79, 62, 0.18); }
  .search-item .title { font-weight: 500; }
  .search-item .sub { font-size: 10px; color: var(--cream-dim); margin-top: 2px; }
  .search-item.empty { color: var(--cream-dim); cursor: default; }
  .search-item.empty:hover { background: transparent; }

  /* === Bottom panel === */
  .panel {
    position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 1000;
    background: rgba(15, 17, 22, 0.94);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 14px 24px 16px;
    border-top: 2px solid var(--vermillion);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    max-width: 1100px; margin: 0 auto;
  }

  /* === Era info (above timeline) === */
  .era-info {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .era-year {
    font-family: "JetBrains Mono", monospace;
    font-size: 22px; color: var(--vermillion);
    letter-spacing: 0.04em; font-weight: 500;
    min-width: 70px;
  }
  .era-label {
    font-family: "Shippori Mincho B1", serif;
    font-size: 16px; color: var(--cream);
    letter-spacing: 0.06em;
  }
  .era-sub {
    font-size: 11px; color: var(--cream-dim);
    letter-spacing: 0.05em;
  }
  .era-attr {
    margin-left: auto;
    font-size: 10px; color: var(--cream-dim);
    letter-spacing: 0.04em;
    max-width: 45%; text-align: right;
  }

  /* === 比較バー (比較モード時のみ表示) === */
  .compare-bar {
    display: none;
    align-items: stretch; gap: 8px;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .compare-bar.show { display: flex; }
  .era-info.hide { display: none; }
  .slot {
    flex: 1; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    background: rgba(15, 17, 22, 0.4);
    transition: all 0.2s;
    position: relative;
    min-width: 0;
  }
  .slot:hover { border-color: var(--cream-dim); background: rgba(15, 17, 22, 0.6); }
  .slot.active-slot {
    border-color: var(--vermillion);
    box-shadow: inset 0 0 0 1px var(--vermillion), 0 0 0 2px var(--vermillion-glow);
    background: rgba(197, 79, 62, 0.08);
  }
  .slot-pill {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px;
    flex-shrink: 0; letter-spacing: 0.04em;
  }
  .slot-a .slot-pill { background: var(--cream); color: var(--ink); }
  .slot-b .slot-pill { background: var(--gold); color: var(--ink); }
  .slot-name {
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px; color: var(--cream);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .slot.empty .slot-name { color: var(--cream-dim); font-style: italic; }
  .slot .active-tag {
    margin-left: auto;
    font-size: 9px; color: var(--vermillion);
    letter-spacing: 0.1em;
    border: 1px solid var(--vermillion);
    padding: 3px 7px;
    flex-shrink: 0;
    animation: pulse-soft 1.6s ease-in-out infinite;
  }
  @keyframes pulse-soft { 50% { opacity: 0.5; } }
  .swap-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim); cursor: pointer;
    padding: 0 12px; font-size: 16px;
    transition: all 0.3s;
    flex-shrink: 0; min-width: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .swap-btn:hover {
    border-color: var(--gold); color: var(--gold);
    transform: rotate(180deg);
  }

  /* === Tracks (aerial top + paper bottom) === */
  .tracks-wrap {
    position: relative;
    margin-bottom: 12px;
    user-select: none; -webkit-user-select: none;
  }
  .track {
    position: relative;
    height: 36px;
  }
  .track-label {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    font-family: "Shippori Mincho B1", serif;
    font-size: 10px; letter-spacing: 0.12em;
    color: var(--cream-dim);
    pointer-events: none;
    background: rgba(15, 17, 22, 0.7);
    padding: 2px 8px;
    z-index: 3;
  }
  .track-ticks {
    position: relative;
    margin-left: 64px; /* room for label */
    height: 100%;
  }
  /* 真ん中の太い線 */
  .track-divider {
    position: relative;
    height: 3px;
    margin: 2px 0;
    background: var(--vermillion);
    box-shadow: 0 0 12px rgba(197, 79, 62, 0.5);
  }
  .track-divider::before {
    content: ''; position: absolute; inset: -4px 0;
    background: linear-gradient(to bottom, transparent, rgba(197, 79, 62, 0.18), transparent);
  }
  .tick {
    position: absolute; top: 0; height: 100%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: transform 0.15s;
    z-index: 2;
  }
  /* 航空写真トラック: 年が上、ドットが下 (中央線寄り) */
  .aerial-track .tick { justify-content: flex-end; padding-bottom: 0; }
  .aerial-track .tick .year { order: 1; }
  .aerial-track .tick .dot  { order: 2; }
  /* 紙地図トラック: ドットが上 (中央線寄り)、年が下 */
  .paper-track .tick  { justify-content: flex-start; padding-top: 0; }
  .paper-track .tick .dot  { order: 1; }
  .paper-track .tick .year { order: 2; }
  .tick .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--ink-soft);
    border: 1.5px solid var(--cream-dim);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tick.cat-old .dot      { border-color: var(--gold);   background: rgba(200, 169, 106, 0.3); }
  .tick.cat-aerial .dot   { border-color: var(--silver); background: rgba(184, 184, 184, 0.3); }
  .tick.cat-topo .dot     { border-color: var(--moss);   background: rgba(122, 154, 79, 0.3); }
  .tick .year {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--cream-dim);
    letter-spacing: 0.02em;
    line-height: 1;
    white-space: nowrap;
  }
  .tick:hover { transform: translateX(-50%) translateY(-1px); }
  .tick:hover .dot { transform: scale(1.3); }
  .tick:hover .year { color: var(--cream); }
  /* 単一モード = アクティブ (朱) */
  .tick.active .dot {
    width: 15px; height: 15px;
    background: var(--vermillion); border-color: var(--vermillion);
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  .tick.active .year { color: var(--vermillion); font-weight: 500; }
  /* 比較モード = A (cream) / B (gold) */
  .tick.select-a .dot {
    width: 15px; height: 15px;
    background: var(--cream); border-color: var(--cream);
    box-shadow: 0 0 0 4px rgba(232, 227, 214, 0.25);
  }
  .tick.select-a .year { color: var(--cream); font-weight: 500; }
  .tick.select-a::after {
    content: 'A'; position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%) translateY(-100%);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--cream); letter-spacing: 0.04em;
  }
  .tick.select-b .dot {
    width: 15px; height: 15px;
    background: var(--gold); border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(200, 169, 106, 0.3);
  }
  .tick.select-b .year { color: var(--gold); font-weight: 500; }
  .tick.select-b::after {
    content: 'B'; position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%) translateY(-100%);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: var(--gold); letter-spacing: 0.04em;
  }
  /* paper-track の A/B ラベルは下に出す */
  .paper-track .tick.select-a::after,
  .paper-track .tick.select-b::after {
    top: auto; bottom: -2px; transform: translateX(-50%) translateY(100%);
  }
  /* 比較モード時、未選択ティックがやや浮き上がる */
  .tracks-wrap.compare .tick:not(.select-a):not(.select-b) .dot {
    box-shadow: 0 0 0 3px rgba(197, 79, 62, 0.12);
  }
  .tick .tooltip {
    position: absolute; left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 17, 22, 0.96);
    backdrop-filter: blur(8px);
    padding: 5px 10px;
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px; letter-spacing: 0.05em;
    color: var(--cream); white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
    border-left: 2px solid var(--gold);
    z-index: 10;
  }
  .aerial-track .tick .tooltip { bottom: 100%; margin-bottom: 4px; }
  .paper-track .tick .tooltip  { top: 100%; margin-top: 4px; }
  .tick:hover .tooltip { opacity: 1; }

  /* === Bottom controls row === */
  .controls-row {
    display: flex; gap: 16px; align-items: center;
  }
  .slider-wrap { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 2px; background: var(--line); outline: none;
    cursor: pointer; min-width: 80px;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--vermillion); cursor: pointer;
    box-shadow: 0 0 0 4px var(--vermillion-glow);
    transition: transform 0.15s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--vermillion); cursor: pointer; border: none;
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  .slider-val {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; color: var(--cream); min-width: 42px;
    text-align: right;
  }
  .ctrl-label {
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; letter-spacing: 0.12em; color: var(--cream-dim);
    flex-shrink: 0; min-width: 32px;
  }
  .compare-btn {
    padding: 8px 16px;
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-dim);
    font-family: "Shippori Mincho B1", serif;
    font-size: 12px; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s;
    flex-shrink: 0;
  }
  .compare-btn:hover { border-color: var(--vermillion); color: var(--vermillion); }
  .compare-btn.active {
    background: var(--vermillion); border-color: var(--vermillion);
    color: var(--cream);
    box-shadow: 0 0 0 4px var(--vermillion-glow);
  }
  /* スライダー両端の A/B ラベル (比較モード) */
  .slider-end {
    font-family: "Shippori Mincho B1", serif;
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--cream-dim); flex-shrink: 0;
    min-width: 18px; text-align: center;
    display: none;
  }
  .controls-row.compare .slider-end { display: inline-block; }
  .controls-row.compare .slider-end.a { color: var(--cream); }
  .controls-row.compare .slider-end.b { color: var(--gold); }

  /* === Locate marker === */
  .locate-marker {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--vermillion);
    border: 2px solid var(--cream);
    box-shadow: 0 0 0 6px var(--vermillion-glow), 0 4px 12px rgba(0,0,0,0.4);
  }
  /* === Search-result marker === */
  .search-marker {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold);
    border: 3px solid var(--cream);
    box-shadow: 0 0 0 4px rgba(200, 169, 106, 0.45), 0 4px 12px rgba(0,0,0,0.5);
    animation: pulse-ring 1.6s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0   rgba(200, 169, 106, 0.7), 0 4px 12px rgba(0,0,0,0.5); }
    70%  { box-shadow: 0 0 0 14px rgba(200, 169, 106, 0),   0 4px 12px rgba(0,0,0,0.5); }
    100% { box-shadow: 0 0 0 0   rgba(200, 169, 106, 0),   0 4px 12px rgba(0,0,0,0.5); }
  }
  .leaflet-tooltip.search-tooltip {
    background: rgba(15, 17, 22, 0.95) !important;
    color: var(--cream) !important;
    border: none !important;
    border-left: 2px solid var(--gold) !important;
    font-family: "Shippori Mincho B1", serif !important;
    font-size: 12px !important;
    padding: 5px 10px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    border-radius: 0 !important;
  }
  .leaflet-tooltip.search-tooltip::before { display: none !important; }

  /* === Leaflet overrides === */
  .leaflet-control-attribution {
    background: rgba(15, 17, 22, 0.88) !important;
    color: var(--cream-dim) !important;
    font-size: 10px !important; padding: 4px 10px !important;
    border: none !important;
    max-width: 60vw;
  }
  .leaflet-control-attribution a { color: var(--gold) !important; }
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
    margin-top: 80px !important;
  }
  .leaflet-control-zoom a {
    background: rgba(15, 17, 22, 0.92) !important;
    color: var(--cream) !important;
    border-color: var(--line) !important;
    backdrop-filter: blur(8px);
  }
  .leaflet-control-zoom a:hover {
    background: var(--vermillion) !important;
    color: var(--cream) !important;
  }

  /* === Hint === */
  .hint {
    position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
    z-index: 1001; color: var(--cream);
    font-family: "Shippori Mincho B1", serif;
    font-size: 13px; letter-spacing: 0.08em;
    background: rgba(15, 17, 22, 0.92);
    padding: 10px 20px; backdrop-filter: blur(8px);
    pointer-events: none; opacity: 0;
    transition: opacity 0.4s;
    border-left: 2px solid var(--gold);
    text-align: center; max-width: 480px;
  }
  .hint.show { opacity: 1; }

  /* === Mobile === */
  @media (max-width: 720px) {
    .panel {
      padding: 10px 12px 12px;
      bottom: 8px; left: 8px; right: 8px;
      max-height: 62vh; overflow-y: auto;
    }

    /* === Brand + Search === */
    .brand { padding: 8px 12px 6px; top: 8px; left: 8px; border-left-width: 2px; }
    .brand h1 { font-size: 14px; letter-spacing: 0.05em; }
    .brand .en { font-size: 8px; margin-top: 4px; }
    .search-bar { top: 8px; right: 8px; left: auto; gap: 6px; }
    .search-input { width: 140px; padding: 10px 10px 10px 30px; font-size: 12px; }
    .search-input-wrap::before { left: 8px; font-size: 13px; }
    .icon-btn { min-width: 40px; padding: 0 10px; font-size: 14px; }
    .search-results { min-width: 0; width: calc(100vw - 16px); right: 0; max-width: none; }
    .leaflet-control-zoom { margin-top: 56px !important; }

    /* === Era info === */
    .era-info { gap: 8px; flex-wrap: wrap; margin-bottom: 8px; padding-bottom: 8px; }
    .era-year { font-size: 18px; min-width: 50px; }
    .era-label { font-size: 14px; }
    .era-sub { font-size: 10px; }
    .era-attr { display: none; }

    /* === Compare bar: stack vertically on mobile === */
    .compare-bar.show { flex-direction: column; gap: 6px; }
    .slot { padding: 9px 10px; gap: 8px; }
    .slot-pill { font-size: 10px; padding: 3px 8px; }
    .slot-name { font-size: 12px; }
    .swap-btn {
      align-self: center; padding: 4px 22px;
      transform: rotate(90deg);
    }
    .swap-btn:hover { transform: rotate(270deg); }
    .slot .active-tag { font-size: 8px; padding: 2px 6px; letter-spacing: 0.06em; }

    /* === Tracks: horizontal scroll on mobile === */
    .tracks-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
      padding-bottom: 4px;
    }
    .tracks-wrap::-webkit-scrollbar { height: 3px; }
    .tracks-wrap::-webkit-scrollbar-thumb { background: var(--line); }
    .tracks-wrap > .track,
    .tracks-wrap > .track-divider {
      min-width: 760px;
    }
    .track { height: 44px; }
    .track-label {
      position: sticky; left: 0;
      background: rgba(15, 17, 22, 0.92);
      padding: 3px 8px; font-size: 9px;
    }
    .track-ticks { margin-left: 56px; min-width: 700px; }
    .tick .dot { width: 13px; height: 13px; }
    .tick.active .dot,
    .tick.select-a .dot,
    .tick.select-b .dot { width: 17px; height: 17px; }
    .tick .year { font-size: 10px; }
    .tick:hover { transform: translateX(-50%); /* disable hover-lift on mobile */ }
    .tick:hover .dot { transform: scale(1); }
    /* Tooltip 不要 (タップで切替するため) */
    .tick .tooltip { display: none; }

    /* === Controls === */
    .controls-row { gap: 8px; flex-wrap: wrap; }
    .slider-wrap { flex: 1 1 100%; }
    .ctrl-label { min-width: 28px; font-size: 11px; }
    .compare-btn { padding: 10px 14px; }
    .slider-end { display: none !important; } /* compare 中も A/B はバーで分かる */
  }
  @media (max-width: 380px) {
    .search-input { width: 110px; }
    .icon-btn { min-width: 36px; padding: 0 8px; }
    .brand h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="brand">
  <h1>東京 今昔マップ</h1>
  <div class="en">Tokyo · Through Time</div>
</div>

<div class="search-bar">
  <div class="search-input-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="住所・駅・地名を検索" />
  </div>
  <button class="icon-btn" id="locateBtn" title="現在地を表示">📍</button>
  <div class="search-results" id="searchResults"></div>
</div>

<div class="panel">
  <div class="era-info" id="eraInfo">
    <div class="era-year" id="eraYear">—</div>
    <div>
      <div class="era-label" id="eraLabel">読み込み中…</div>
      <div class="era-sub" id="eraSub"></div>
    </div>
    <div class="era-attr" id="eraAttr"></div>
  </div>
  <div class="compare-bar" id="compareBar"></div>
  <div class="tracks-wrap" id="tracksWrap">
    <div class="track aerial-track">
      <div class="track-label">航空写真</div>
      <div class="track-ticks" id="aerialTicks"></div>
    </div>
    <div class="track-divider"></div>
    <div class="track paper-track">
      <div class="track-label">紙地図</div>
      <div class="track-ticks" id="paperTicks"></div>
    </div>
  </div>
  <div class="controls-row" id="controlsRow">
    <span class="ctrl-label" id="opacityLabel">透過</span>
    <div class="slider-wrap">
      <span class="slider-end a">A</span>
      <input type="range" min="0" max="100" value="85" class="slider" id="opacitySlider" />
      <span class="slider-end b">B</span>
      <div class="slider-val" id="opacityVal">85%</div>
    </div>
    <button class="compare-btn" id="compareBtn" title="2つの時代を選んで重ねる">⇆ 比較</button>
  </div>
</div>

<div class="hint" id="hint"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";

// ============================================================
// 時代カタログ — 年代昇順に並べる
// cat: 'old' (絵図・旧版地図) | 'aerial' (空中写真) | 'topo' (地形図) | 'modern' (現代地図)
// bounds: [[南緯, 西経], [北緯, 東経]] (該当エリアのみタイル取得 → エリア外は淡色が透ける)
// ============================================================
const GSI = '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">地理院タイル</a>';
const TSUNAGARU_ATTR = '<a href="https://www.tsunagaru-map.com/pf-tokyo/map.html" target="_blank">ツナガルマップ (東京古地図展)</a>';

const ERAS = [
  // 古地図 (ツナガルマップ経由)
  { id: 'edo_pre',   year: 1600, label: '江戸以前', sub: '想像図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/map1/{z}/{x}/{y}.png',
    bounds: [[35.556, 139.656], [35.794, 139.885]], min: 11, max: 17,
    attr: 'ユニバーサルデザイン総合研究所 / ' + TSUNAGARU_ATTR },
  { id: 'edo_early', year: 1644, label: '江戸初期', sub: '正保年中江戸絵図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/tokyo-edo1644/{z}/{x}/{y}.png',
    bounds: [[35.634, 139.677], [35.750, 139.804]], min: 11, max: 17,
    attr: '国立公文書館デジタルアーカイブ / ' + TSUNAGARU_ATTR },
  { id: 'edo_late',  year: 1860, label: '江戸末期', sub: '江戸図 萬延', cat: 'old',
    url: 'https://www.web-museum.jp/maps/tokyo-edo1860/{z}/{x}/{y}.png',
    bounds: [[35.608, 139.681], [35.753, 139.845]], min: 11, max: 17,
    attr: '国際日本文化研究センター / ' + TSUNAGARU_ATTR },
  { id: 'meiji',     year: 1880, label: '明治初期', sub: '旧版地形図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/map4/{z}/{x}/{y}.png',
    bounds: [[35.570, 139.616], [35.769, 139.816]], min: 11, max: 17,
    attr: '国土地理院 旧版地図 / ' + TSUNAGARU_ATTR },
  { id: 'taisho',    year: 1920, label: '大正後期', sub: '旧版地形図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/map5/{z}/{x}/{y}.png',
    bounds: [[35.603, 139.700], [35.770, 139.799]], min: 11, max: 17,
    attr: '国土地理院 旧版地図 / ' + TSUNAGARU_ATTR },
  { id: 'showa_pre', year: 1930, label: '昭和初期', sub: '旧版地形図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/map6/{z}/{x}/{y}.png',
    bounds: [[35.604, 139.700], [35.770, 139.799]], min: 11, max: 17,
    attr: '国土地理院 旧版地図 / ' + TSUNAGARU_ATTR },

  // 戦前・戦後 空中写真 (GSI)
  { id: 'aerial_1936', year: 1936, label: '戦前', sub: '空中写真 (1936-42, 東京23区+大阪)', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/ort_riku10/{z}/{x}/{y}.png',
    bounds: [[35.48, 139.52], [35.85, 139.95]], min: 10, max: 18, attr: GSI },
  { id: 'aerial_1945', year: 1945, label: '戦後直後', sub: '米軍撮影 空中写真 (1945-50)', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png',
    min: 8, max: 17, attr: GSI },

  // 昭和中期 旧版地図 (ツナガルマップ)
  { id: 'showa_mid', year: 1955, label: '昭和中期', sub: '旧版地形図', cat: 'old',
    url: 'https://www.web-museum.jp/maps/map7/{z}/{x}/{y}.png',
    bounds: [[35.603, 139.699], [35.770, 139.800]], min: 11, max: 17,
    attr: '国土地理院 旧版地図 / ' + TSUNAGARU_ATTR },

  // 地形図 (qchizu 東京1:3,000) — 検出後に追加されるダミーをここに並べる
  // 実 URL は detectTopoPattern 完了時に差し替え
  { id: 'topo_1', year: 1955, label: '1952-58', sub: '1:3,000地形図', cat: 'topo', topoNN: '01',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },
  { id: 'topo_2', year: 1960, label: '1959-62', sub: '1:3,000地形図', cat: 'topo', topoNN: '02',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },

  // 1961-69 空中写真
  { id: 'aerial_1961', year: 1965, label: '1961-69', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png',
    min: 8, max: 17, attr: GSI },

  // qchizu 地形図 (続き)
  { id: 'topo_3', year: 1964, label: '1963-66', sub: '1:3,000地形図', cat: 'topo', topoNN: '03',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },
  { id: 'topo_4', year: 1968, label: '1967-70', sub: '1:3,000地形図', cat: 'topo', topoNN: '04',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },
  { id: 'topo_5', year: 1973, label: '1971-75', sub: '1:3,000地形図', cat: 'topo', topoNN: '05',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },

  // 1974-90 空中写真
  { id: 'aerial_1974', year: 1976, label: '1974-78', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg', min: 10, max: 17, attr: GSI },

  { id: 'topo_6', year: 1978, label: '1976-80', sub: '1:3,000地形図', cat: 'topo', topoNN: '06',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },

  { id: 'aerial_1979', year: 1981, label: '1979-83', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/gazo2/{z}/{x}/{y}.jpg', min: 10, max: 17, attr: GSI },

  { id: 'topo_7', year: 1984, label: '1981-88', sub: '1:3,000地形図', cat: 'topo', topoNN: '07',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },

  { id: 'aerial_1984', year: 1985, label: '1984-86', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/gazo3/{z}/{x}/{y}.jpg', min: 10, max: 17, attr: GSI },
  { id: 'aerial_1987', year: 1988, label: '1987-90', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/gazo4/{z}/{x}/{y}.jpg', min: 10, max: 17, attr: GSI },

  { id: 'topo_8', year: 1991, label: '1989-94', sub: '1:3,000地形図', cat: 'topo', topoNN: '08',
    url: null, bounds: [[35.45, 138.85], [35.92, 139.95]], min: 13, max: 19, attr: '全国Q地図（東京都1:3,000地形図）' },

  // 現代 (2007以降)
  { id: 'aerial_2010', year: 2010, label: '2010年度', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/nendophoto2010/{z}/{x}/{y}.png', min: 14, max: 18, attr: GSI },
  { id: 'aerial_2015', year: 2015, label: '2015年度', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/nendophoto2015/{z}/{x}/{y}.png', min: 14, max: 18, attr: GSI },
  { id: 'aerial_2020', year: 2020, label: '2020年度', sub: '空中写真', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/nendophoto2020/{z}/{x}/{y}.png', min: 14, max: 18, attr: GSI },
  { id: 'aerial_2023', year: 2023, label: '2023年度', sub: '空中写真 (最新)', cat: 'aerial',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/nendophoto2023/{z}/{x}/{y}.png', min: 14, max: 18, attr: GSI },

  // 現代地図 (淡色) — 重ね合わせ非表示モード
  { id: 'modern', year: 2026, label: '現代', sub: '淡色地図 (オーバーレイなし)', cat: 'modern',
    url: null, attr: GSI },
];

function findEra(id) { return ERAS.find(e => e.id === id); }

// ============================================================
// qchizu 地形図 URL 検出
// ============================================================
const TEST_Z = 16, TEST_X = 58222, TEST_Y = 25813;
const URL_CANDIDATES = [
  'https://mapdata.qchizu2.xyz/13p/tokyo_{NN}/{z}/{x}/{y}.png',
  'https://mapdata.qchizu.xyz/13p/tokyo_{NN}/{z}/{x}/{y}.png',
  'https://mapdata.qchizu.jp/13p/tokyo_{NN}/{z}/{x}/{y}.png',
  'https://mapdata.qchizu2.xyz/13p/tokyo_{NN}/{z}/{x}/{y}.webp',
  'https://mapdata.qchizu.xyz/13p/tokyo_{NN}/{z}/{x}/{y}.webp',
  'https://mapdata.qchizu2.xyz/01_topo/13p/tokyo_{NN}/{z}/{x}/{y}.png',
  'https://mapdata.qchizu.xyz/01_topo/13p/tokyo_{NN}/{z}/{x}/{y}.png',
];

function testTile(url) {
  return new Promise((resolve) => {
    const img = new Image();
    const t = setTimeout(() => { img.src = ''; resolve(false); }, 6000);
    img.onload = () => { clearTimeout(t); resolve(img.naturalWidth > 0); };
    img.onerror = () => { clearTimeout(t); resolve(false); };
    img.crossOrigin = 'anonymous';
    img.src = url;
  });
}

async function detectTopoPattern() {
  for (const pattern of URL_CANDIDATES) {
    const url = pattern.replace('{NN}', '03').replace('{z}', TEST_Z).replace('{x}', TEST_X).replace('{y}', TEST_Y);
    if (await testTile(url)) {
      console.log('[検出] ✅ topo:', pattern);
      return pattern;
    }
  }
  return null;
}

// ============================================================
// マップ初期化
// ============================================================
const KANTO_BOUNDS = L.latLngBounds([34.5, 138.0], [37.0, 141.5]);

const map = L.map('map', {
  center: [35.6814, 139.7660], // 東京駅
  zoom: 15, minZoom: 8, maxZoom: 19,
  maxBounds: KANTO_BOUNDS,
  maxBoundsViscosity: 0.4,
  zoomAnimation: true,
  fadeAnimation: true,
  wheelPxPerZoomLevel: 120,
  wheelDebounceTime: 40,
});

// 常時下に敷く現代の淡色地図 (オーバーレイのコンテキスト)
const baseLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: GSI,
  maxZoom: 19,
}).addTo(map);

// ============================================================
// 状態
// ============================================================
let mode = 'single';        // 'single' | 'compare'
let eraA = null, eraB = null;
let layerA = null, layerB = null;
let attrA = null, attrB = null;
let opacity = 0.85;         // 単一モード: オーバーレイの透過
let blendAB = 0.5;          // 比較モード: 0=A only, 1=B only
let activeSlot = 'a';       // 比較モード: 次のティック選択がどちらのスロットに入るか

// ============================================================
// 軸 (年→%, ピースワイズ)
// 1600-1860: 0-30% (260年で30%)
// 1860-1950: 30-55% (90年で25%)
// 1950-2030: 55-100% (80年で45%)
// ============================================================
function yearToX(year) {
  if (year < 1860) return ((year - 1600) / 260) * 30;
  if (year < 1950) return 30 + ((year - 1860) / 90) * 25;
  return 55 + ((year - 1950) / 80) * 45;
}

// ============================================================
// レイヤー生成
// ============================================================
function makeLayer(era) {
  return L.tileLayer(era.url, {
    minZoom: era.min, maxZoom: 19, maxNativeZoom: era.max,
    bounds: era.bounds ? L.latLngBounds(era.bounds) : null,
    attribution: era.attr,
    opacity: 0,
    className: 'era-overlay',
  });
}

function removeOverlay(slot) {
  if (slot === 'a' && layerA) {
    const old = layerA, oldAttr = attrA;
    old.setOpacity(0);
    setTimeout(() => {
      map.removeLayer(old);
      if (oldAttr) map.attributionControl.removeAttribution(oldAttr);
    }, 320);
    layerA = null; attrA = null;
  } else if (slot === 'b' && layerB) {
    const old = layerB, oldAttr = attrB;
    old.setOpacity(0);
    setTimeout(() => {
      map.removeLayer(old);
      if (oldAttr) map.attributionControl.removeAttribution(oldAttr);
    }, 320);
    layerB = null; attrB = null;
  }
}

function applyState() {
  // 単一モード
  if (mode === 'single') {
    if (layerB) removeOverlay('b');
    if (eraA && eraA.url) {
      if (layerA) removeOverlay('a');
      layerA = makeLayer(eraA);
      attrA = eraA.attr;
      layerA.addTo(map);
      requestAnimationFrame(() => requestAnimationFrame(() => layerA && layerA.setOpacity(opacity)));
    } else if (layerA) {
      removeOverlay('a');
    }
  } else {
    // 比較モード
    if (eraA && eraA.url) {
      if (!layerA || (layerA.options && layerA._url !== eraA.url)) {
        if (layerA) removeOverlay('a');
        layerA = makeLayer(eraA);
        attrA = eraA.attr;
        layerA.addTo(map);
      }
      requestAnimationFrame(() => layerA && layerA.setOpacity(1 - blendAB));
    } else if (layerA) {
      removeOverlay('a');
    }
    if (eraB && eraB.url) {
      if (!layerB || (layerB.options && layerB._url !== eraB.url)) {
        if (layerB) removeOverlay('b');
        layerB = makeLayer(eraB);
        attrB = eraB.attr;
        layerB.addTo(map);
      }
      requestAnimationFrame(() => layerB && layerB.setOpacity(blendAB));
    } else if (layerB) {
      removeOverlay('b');
    }
  }
  renderUI();
}

// ============================================================
// ティック選択
// ============================================================
function tickClicked(eraId) {
  const era = findEra(eraId);
  if (!era || !era.url) return;
  if (mode === 'single') {
    eraA = era; eraB = null; activeSlot = 'a';
  } else {
    // 比較モード — activeSlot ("次に入れ替わるスロット") に新しい era を入れる
    // ただし既存の A/B と同じ era をクリックした場合は「そのスロットを解除」
    if (eraA && eraA.id === era.id) {
      eraA = null;
      activeSlot = 'a'; // 空いた A が次のターゲット
    } else if (eraB && eraB.id === era.id) {
      eraB = null;
      activeSlot = 'b';
    } else if (!eraA && !eraB) {
      // 両方空 → A に入れて、次は B が空いてるから B が active
      eraA = era; activeSlot = 'b';
    } else if (!eraA) {
      // A だけ空 → A を埋める、次は A が直近選択なので A を再変更可能 (= 続けて A をスクラブ)
      eraA = era; activeSlot = 'a';
    } else if (!eraB) {
      // B だけ空 → B を埋める、次は B を変更
      eraB = era; activeSlot = 'b';
    } else {
      // 両方埋まってる → activeSlot を上書き (activeSlot は変えない = "同じ側を flip し続ける")
      if (activeSlot === 'a') eraA = era;
      else eraB = era;
    }
  }
  applyState();
}

function swapAB() {
  if (mode !== 'compare') return;
  const tmp = eraA; eraA = eraB; eraB = tmp;
  activeSlot = activeSlot === 'a' ? 'b' : 'a';
  // blendAB も反転 (見た目の比率を維持しつつ A/B を入れ替え)
  blendAB = 1 - blendAB;
  applyState();
}

function setActiveSlot(slot) {
  if (mode !== 'compare') return;
  activeSlot = slot;
  renderUI();
}

// ============================================================
// UI 更新
// ============================================================
function renderEraInfo() {
  const eraInfo = document.getElementById('eraInfo');
  const compareBar = document.getElementById('compareBar');

  if (mode === 'compare') {
    eraInfo.classList.add('hide');
    compareBar.classList.add('show');
    const bothFilled = !!(eraA && eraB);
    const slotHtml = (slot, era) => {
      const isActive = activeSlot === slot;
      const isEmpty = !era;
      // 「次に変更」と active-slot 強調は **両方埋まってる時のみ** 表示
      // (片方が空ならその空スロットが次に埋まるのが自明)
      const showActive = isActive && bothFilled;
      const name = era ? `${era.year} ${era.label}${era.sub ? ' — ' + era.sub : ''}` : 'タイムラインから選択';
      return `
        <div class="slot slot-${slot} ${showActive ? 'active-slot' : ''} ${isEmpty ? 'empty' : ''}" data-slot="${slot}">
          <span class="slot-pill">${slot.toUpperCase()}</span>
          <span class="slot-name">${escapeHtml(name)}</span>
          ${showActive ? '<span class="active-tag">次に変更</span>' : ''}
        </div>`;
    };
    compareBar.innerHTML = slotHtml('a', eraA) +
      '<button class="swap-btn" id="swapBtn" title="A と B を入れ替え">⇄</button>' +
      slotHtml('b', eraB);
    compareBar.querySelectorAll('.slot').forEach(el => {
      el.addEventListener('click', () => setActiveSlot(el.dataset.slot));
    });
    document.getElementById('swapBtn').addEventListener('click', swapAB);
  } else {
    compareBar.classList.remove('show');
    eraInfo.classList.remove('hide');
    if (eraA) {
      document.getElementById('eraYear').textContent = eraA.year;
      document.getElementById('eraLabel').textContent = eraA.label;
      document.getElementById('eraSub').textContent = eraA.sub || '';
      document.getElementById('eraAttr').innerHTML = eraA.attr || '';
    }
  }
}

function renderTicks() {
  const aerialDiv = document.getElementById('aerialTicks');
  const paperDiv = document.getElementById('paperTicks');
  aerialDiv.innerHTML = '';
  paperDiv.innerHTML = '';
  ERAS.forEach(era => {
    if (era.cat === 'modern') return;
    if (!era.url) return; // qchizu 検出前の topo はスキップ
    const tick = document.createElement('div');
    tick.className = `tick cat-${era.cat}`;
    tick.dataset.id = era.id;
    tick.style.left = yearToX(era.year) + '%';
    tick.innerHTML = `
      <div class="dot"></div>
      <div class="year">${era.year}</div>
      <div class="tooltip">${era.year} ${era.label}${era.sub ? ' — ' + era.sub : ''}</div>
    `;
    tick.addEventListener('click', () => tickClicked(era.id));
    if (era.cat === 'aerial') aerialDiv.appendChild(tick);
    else paperDiv.appendChild(tick); // 'old' or 'topo'
  });
}

function renderTickHighlights() {
  document.querySelectorAll('.tick').forEach(t => {
    t.classList.remove('active', 'select-a', 'select-b');
    if (mode === 'single' && eraA && t.dataset.id === eraA.id) {
      t.classList.add('active');
    } else if (mode === 'compare') {
      if (eraA && t.dataset.id === eraA.id) t.classList.add('select-a');
      if (eraB && t.dataset.id === eraB.id) t.classList.add('select-b');
    }
  });
  document.getElementById('tracksWrap').classList.toggle('compare', mode === 'compare');

  // モバイル時、アクティブティックを横スクロール領域内に表示
  scrollActiveTickIntoView();
}

function scrollActiveTickIntoView() {
  if (window.innerWidth > 720) return;
  const wrap = document.querySelector('.tracks-wrap');
  const focus = document.querySelector('.tick.select-b, .tick.active, .tick.select-a');
  if (!wrap || !focus) return;
  // setTimeout で次のイベントループ → レイアウト確定後に実行
  setTimeout(() => {
    const wrapRect = wrap.getBoundingClientRect();
    const tickRect = focus.getBoundingClientRect();
    if (wrapRect.width === 0 || tickRect.width === 0) return;
    const tickCenter = tickRect.left + tickRect.width / 2;
    const wrapCenter = wrapRect.left + wrapRect.width / 2;
    wrap.scrollLeft = wrap.scrollLeft + (tickCenter - wrapCenter);
  }, 0);
}

function renderControls() {
  const slider = document.getElementById('opacitySlider');
  const label = document.getElementById('opacityLabel');
  const val = document.getElementById('opacityVal');
  const row = document.getElementById('controlsRow');
  row.classList.toggle('compare', mode === 'compare');
  if (mode === 'compare') {
    label.textContent = 'A⇄B';
    slider.value = Math.round(blendAB * 100);
    val.textContent = `B ${slider.value}%`;
  } else {
    label.textContent = '透過';
    slider.value = Math.round(opacity * 100);
    val.textContent = slider.value + '%';
  }
  document.getElementById('compareBtn').classList.toggle('active', mode === 'compare');
}

function renderUI() {
  renderEraInfo();
  renderTickHighlights();
  renderControls();
}

// ============================================================
// 透過 / A↔B スライダー
// ============================================================
const slider = document.getElementById('opacitySlider');
const sliderVal = document.getElementById('opacityVal');
slider.addEventListener('input', () => {
  const v = slider.value / 100;
  if (mode === 'compare') {
    blendAB = v;
    sliderVal.textContent = `B ${slider.value}%`;
    if (layerA) layerA.setOpacity(1 - blendAB);
    if (layerB) layerB.setOpacity(blendAB);
  } else {
    opacity = v;
    sliderVal.textContent = slider.value + '%';
    if (layerA) layerA.setOpacity(opacity);
  }
});

// ============================================================
// 比較モード切替
// ============================================================
document.getElementById('compareBtn').addEventListener('click', () => {
  if (mode === 'single') {
    mode = 'compare';
    // 現在の A を anchor として残し、B は空 → 次のクリックで B が埋まる
    eraB = null;
    blendAB = 0.5;
    activeSlot = 'b'; // 「次に B を選んでください」
    applyState();
    showHint('もう一つの時代を選択 → 両方埋まったら、クリックで「次に変更」スロット (朱色) を flip し続けます', 5000);
  } else {
    mode = 'single';
    eraB = null;
    activeSlot = 'a';
    if (layerB) removeOverlay('b');
    applyState();
  }
});

function getAvailableEras() {
  return ERAS.filter(e => e.url);
}

// ============================================================
// 現在地
// ============================================================
const locateBtn = document.getElementById('locateBtn');
let locateMarker = null;
locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) { showHint('お使いのブラウザは位置情報未対応'); return; }
  locateBtn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos => {
      locateBtn.classList.remove('locating');
      const ll = [pos.coords.latitude, pos.coords.longitude];
      if (locateMarker) map.removeLayer(locateMarker);
      locateMarker = L.marker(ll, {
        icon: L.divIcon({ className: '', html: '<div class="locate-marker"></div>', iconSize: [18, 18] })
      }).addTo(map);
      // 関東外なら maxBounds に制限される
      if (KANTO_BOUNDS.contains(ll)) {
        map.setView(ll, 17);
      } else {
        showHint('現在地は関東圏外のため、表示範囲を制限しています', 3000);
        map.setView([35.6814, 139.7660], 14);
      }
    },
    err => {
      locateBtn.classList.remove('locating');
      const msg = err.code === 1 ? '位置情報の使用が拒否されました' :
                  err.code === 2 ? '位置を取得できません' :
                  err.code === 3 ? 'タイムアウトしました' : err.message;
      showHint(msg, 3000);
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
});

// ============================================================
// 住所・地名検索 (Nominatim)
// ============================================================
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchAbort = null;
let searchDebounce = null;

async function doSearch(q) {
  if (searchAbort) searchAbort.abort();
  searchAbort = new AbortController();
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=jp&limit=8&format=json&addressdetails=1&accept-language=ja`;
    const res = await fetch(url, { signal: searchAbort.signal, headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    if (e.name === 'AbortError') return null;
    console.error(e);
    return [];
  }
}

let searchMarker = null;
function gotoSearchResult(ll, label) {
  if (searchMarker) map.removeLayer(searchMarker);
  if (!KANTO_BOUNDS.contains(ll)) {
    showHint('検索結果が関東圏外のため移動できません', 3000);
    return;
  }
  searchMarker = L.marker(ll, {
    icon: L.divIcon({ className: '', html: '<div class="search-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
    zIndexOffset: 1000,
  }).addTo(map);
  searchMarker.bindTooltip(label, {
    permanent: true, direction: 'top', offset: [0, -10], className: 'search-tooltip'
  }).openTooltip();
  map.setView(ll, 17);
  // 8 秒後にツールチップを閉じる (マーカー自体は残す)
  setTimeout(() => { if (searchMarker) searchMarker.closeTooltip(); }, 8000);
}

function showSearchResults(items) {
  searchResults.innerHTML = '';
  if (!items || !items.length) {
    searchResults.innerHTML = '<div class="search-item empty">該当する場所が見つかりませんでした</div>';
    searchResults.classList.add('show');
    return;
  }
  items.forEach(it => {
    const div = document.createElement('div');
    div.className = 'search-item';
    const title = it.namedetails && it.namedetails.name ? it.namedetails.name : (it.name || it.display_name.split(',')[0]);
    div.innerHTML = `<div class="title">${escapeHtml(title)}</div><div class="sub">${escapeHtml(it.display_name)}</div>`;
    div.addEventListener('click', () => {
      const ll = [parseFloat(it.lat), parseFloat(it.lon)];
      gotoSearchResult(ll, title);
      searchResults.classList.remove('show');
      searchInput.value = title;
    });
    searchResults.appendChild(div);
  });
  searchResults.classList.add('show');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (searchDebounce) clearTimeout(searchDebounce);
  if (!q) { searchResults.classList.remove('show'); return; }
  searchDebounce = setTimeout(async () => {
    const items = await doSearch(q);
    if (items !== null) showSearchResults(items);
  }, 350);
});
// Enter で一番上の結果に飛ぶ
searchInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const q = searchInput.value.trim();
  if (!q) return;
  if (searchDebounce) { clearTimeout(searchDebounce); searchDebounce = null; }
  const items = await doSearch(q);
  if (items && items.length) {
    const it = items[0];
    const title = it.namedetails && it.namedetails.name ? it.namedetails.name : (it.name || it.display_name.split(',')[0]);
    gotoSearchResult([parseFloat(it.lat), parseFloat(it.lon)], title);
    searchInput.value = title;
    searchResults.classList.remove('show');
  } else {
    showSearchResults(items);
  }
});
searchInput.addEventListener('focus', () => {
  if (searchResults.innerHTML.trim()) searchResults.classList.add('show');
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-bar')) searchResults.classList.remove('show');
});

// ============================================================
// ヒント
// ============================================================
const hint = document.getElementById('hint');
function showHint(msg, dur = 0) {
  hint.textContent = msg;
  hint.classList.add('show');
  if (dur) setTimeout(() => hint.classList.remove('show'), dur);
}

// ============================================================
// 起動
// ============================================================
renderTicks();
eraA = findEra('edo_late'); // 江戸末期 1860 でスタート
applyState();

// バックグラウンドで qchizu 地形図 URL 検出 → ERAS の topo_X.url を埋める → トラック再描画
showHint('地形図タイルを検出中…');
(async () => {
  const pattern = await detectTopoPattern();
  if (pattern) {
    ERAS.forEach(e => {
      if (e.cat === 'topo' && e.topoNN && !e.url) {
        e.url = pattern.replace('{NN}', e.topoNN);
      }
    });
    renderTicks();
    renderUI();
    showHint('✅ 1:3,000地形図 8世代を紙地図トラックに追加', 3200);
  } else {
    showHint('地形図タイル検出失敗 — 古地図と航空写真のみ利用可', 5000);
  }
})();
</script>
