const MES_CATS = [
  { id: 'old',    label: '古地図・絵図・旧版地形図' },
  { id: 'aerial', label: '航空写真' },
  { id: 'topo',   label: '東京都1:3,000地形図' },

// v2.1: 現在のフィルター ('all' | 'old' | 'aerial' | 'topo')
const MES_FILTER_KEY = 'edo-konjaku-v2-mes-filter';
let mesFilter = 'all';
try { mesFilter = localStorage.getItem(MES_FILTER_KEY) || 'all'; } catch (_) {}

function renderMobileSheet() {
  // フィルターチップの active 状態を更新
  document.querySelectorAll('#mobileEraSheetFilters .mes-chip').forEach(chip => {
    chip.classList.toggle('is-active', chip.dataset.filter === mesFilter);
  });
  const cats = mesFilter === 'all' ? MES_CATS : MES_CATS.filter(c => c.id === mesFilter);
  const html = cats.map(cat => {
    const list = ERAS.filter(e => e.cat === cat.id && eraHasLayer(e))
                     .sort((a, b) => a.year - b.year);
    if (!list.length) return '';
    const rows = list.map(era => {
      let cls = `mes-row cat-${era.cat}`;
      let tag = '';
      if (mode === 'single' && eraA && eraA.id === era.id) {
        cls += ' is-active';
        tag = '<span class="tag active-tag">表示中</span>';
      } else if (mode === 'compare') {
        if (eraA && eraA.id === era.id) { cls += ' is-a'; tag = '<span class="tag a-tag">A</span>'; }
        else if (eraB && eraB.id === era.id) { cls += ' is-b'; tag = '<span class="tag b-tag">B</span>'; }
      }
      return `
        <div class="${cls}" data-era="${era.id}">
          <div class="dot"></div>
          <div class="year">${escapeHtml(eraDisplayDate(era))}</div>
          <div class="label-wrap">
            <div class="label">${escapeHtml(era.label)}</div>
            ${era.sub ? `<div class="sub">${escapeHtml(era.sub)}</div>` : ''}
          </div>
          ${tag}
        </div>`;
    }).join('');
    return `<div class="mes-section"><div class="mes-section-title">${escapeHtml(cat.label)}</div>${rows}</div>`;
  }).join('');
  mobileEraSheetBody.innerHTML = html;
  mobileEraSheetBody.querySelectorAll('.mes-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.era;
      tickClicked(id);
      // 比較モードで両方未埋まり時はシートを開いたまま、それ以外は閉じる
      if (mode === 'compare' && (!eraA || !eraB)) {
        // 選択状態だけ更新して、続けて選びやすくする
        renderMobileSheet();
      } else {
        closeMobileSheet();
      }
    });
  });
}

function openMobileSheet() {
  renderMobileSheet();
  mobileEraSheet.classList.add('show');
  mobileEraSheet.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  // v2.1: 現在選択中の era 行へ自動スクロール (中央に表示)
  // slide-up アニメーション完了後にスクロール (instant) → 違和感なく中央に表示
  setTimeout(() => {
    const target = mobileEraSheetBody.querySelector('.mes-row.is-active, .mes-row.is-a, .mes-row.is-b');
    if (target) {
      // scrollIntoView with 'center' so the active row sits in the middle
      target.scrollIntoView({ block: 'center', behavior: 'instant' });
    }
  }, 280);
}
function closeMobileSheet() {
  mobileEraSheet.classList.remove('show');
  mobileEraSheet.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
mobileEraTrigger.addEventListener('click', openMobileSheet);
mobileEraSheetClose.addEventListener('click', closeMobileSheet);
mobileEraSheetBackdrop.addEventListener('click', closeMobileSheet);

  if (!chip) return;
  mesFilter = chip.dataset.filter || 'all';
  try { localStorage.setItem(MES_FILTER_KEY, mesFilter); } catch (_) {}
  renderMobileSheet();
});

function updateMobileEraTriggerText() {
  if (!mobileEraTriggerText) return;
  if (mode === 'compare') {
    const a = eraA ? `${eraDisplayDate(eraA)} ${eraA.label}` : 'A 未選択';
    const b = eraB ? `${eraDisplayDate(eraB)} ${eraB.label}` : 'B 未選択';
    mobileEraTriggerText.textContent = `${a} ⇄ ${b}`;
  } else if (eraA) {
    mobileEraTriggerText.textContent = `${eraDisplayDate(eraA)} ${eraA.label}${eraA.sub ? ' — ' + eraA.sub : ''}`;
  } else {
    mobileEraTriggerText.textContent = '時代を選択';
  }
}

// v2.1: ミニピル (全画面) モード

const miniPill = document.getElementById('miniPill');

const panelMinimize = document.getElementById('panelMinimize');

function setPanelMinimized(minimized) {

  try { localStorage.setItem(PANEL_MINIMIZED_KEY, minimized ? '1' : '0'); } catch (_) {}
  if (minimized) updateMiniPillText();

// ============================================================
// キーボード ← → で時代をスクラブ / H でパネル開閉
// ============================================================
document.addEventListener('keydown', (e) => {
  // 入力欄にフォーカスがある時は ESC のみ受け付け (検索結果クローズに使えるよう)
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  const isInput = tag === 'INPUT' || tag === 'TEXTAREA';

  // ESC キー: 開いているものを優先順位順に閉じる
  if (e.key === 'Escape') {
    if (document.getElementById('poiModal').classList.contains('show')) {
      e.preventDefault();
      closePoiModal();
      return;
    }
    if (tourPickerEl.classList.contains('show')) {
      e.preventDefault();
      closeTourPicker();
      return;
    }
    if (activeTour) {
      e.preventDefault();
      exitTour();
      return;
    }
    if (themePopover.classList.contains('show') || layersPopover.classList.contains('show')) {
      e.preventDefault();
      themePopover.classList.remove('show');
      layersPopover.classList.remove('show');
      return;
    }
    if (shortcutsOverlay.classList.contains('show')) {
      e.preventDefault();
      toggleShortcuts(false);
      return;
    }
    if (mobileEraSheet.classList.contains('show')) {
      e.preventDefault();
      closeMobileSheet();
      return;
    }
    if (searchResults.classList.contains('show')) {
      e.preventDefault();
      searchResults.classList.remove('show');
      searchInput.blur();
      return;
    }
    if (!panelEl.classList.contains('collapsed') && !document.body.classList.contains('panel-minimized')) {
      e.preventDefault();
      setPanelCollapsed(true);
      return;
    }
    return;
  }

  if (isInput) return;
  // ? キー (Shift+/): ショートカット一覧
  if (e.key === '?') {
    e.preventDefault();
    toggleShortcuts();
    return;
  }
  // H キー: パネル開閉
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    togglePanel();
    return;
  }
  // T キー: ベース地図（最新）を順送り
  if (e.key === 't' || e.key === 'T') {
    e.preventDefault();
    const ids = Object.keys(BASE_THEMES);
    const next = ids[(ids.indexOf(currentBaseTheme) + 1) % ids.length];
    applyBaseTheme(next);
    renderThemePopover();
    showToast('🗺️ ' + BASE_THEMES[next].label);
    return;
  }
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const dir = e.key === 'ArrowRight' ? 1 : -1;
  const list = getAvailableEras().slice().sort((a, b) => a.year - b.year);
  // 比較中は B (activeSlot) を動かす。単一なら A
  const curEra = mode === 'compare' ? (eraB || eraA) : eraA;
  const curId = curEra && curEra.id;
  let idx = list.findIndex(x => x.id === curId);
  if (idx === -1) idx = 0;
  const nextIdx = Math.max(0, Math.min(list.length - 1, idx + dir));
  if (nextIdx === idx) return;
  e.preventDefault();
  tickClicked(list[nextIdx].id);
});

// ============================================================
// URL ハッシュで状態を保存・復元 (共有可能リンク)
// 形式: #era=<id>&ll=<lat>,<lng>&z=<zoom>&op=<0-100>
//       (比較中) #a=<id>&b=<id>&blend=<0-100>&ll=...&z=...
// ============================================================
let suppressHash = false;
function updateHash() {
  if (suppressHash) return;
  const parts = [];
  if (mode === 'compare' && eraA) {
    parts.push('a=' + eraA.id);
    if (eraB) parts.push('b=' + eraB.id);
    parts.push('blend=' + Math.round(blendAB * 100));
  } else if (eraA) {
    parts.push('era=' + eraA.id);
    parts.push('op=' + Math.round(opacity * 100));
  }
  const c = map.getCenter();
  parts.push('ll=' + c.lat.toFixed(5) + ',' + c.lng.toFixed(5));
  parts.push('z=' + map.getZoom());
  try { history.replaceState(null, '', '#' + parts.join('&')); } catch (_) {}
}

function parseHash() {
  const hash = location.hash.replace(/^#/, '');
  if (!hash) return null;
  const params = {};
  hash.split('&').forEach(pair => {
    const eq = pair.indexOf('=');
    if (eq < 0) return;
    params[pair.slice(0, eq)] = decodeURIComponent(pair.slice(eq + 1));
  });
  return params;
}

function restoreFromHash() {
  const p = parseHash();
  if (!p) return false;
  suppressHash = true;
  try {
    if (p.a) {
      mode = 'compare';
      eraA = findEra(p.a) || null;
      eraB = p.b ? findEra(p.b) || null : null;
      if (p.blend != null) blendAB = (+p.blend) / 100;
      activeSlot = 'b';
    } else if (p.era) {
      mode = 'single';
      eraA = findEra(p.era) || null;
      eraB = null;
    }
    if (p.op != null) {
      opacity = (+p.op) / 100;
      const slider = document.getElementById('opacitySlider');
      if (slider) slider.value = +p.op;
    }
    if (p.ll) {
      const [lat, lng] = p.ll.split(',').map(parseFloat);
      const zoom = p.z ? parseInt(p.z, 10) : map.getZoom();
      if (!isNaN(lat) && !isNaN(lng) && KANTO_BOUNDS.contains([lat, lng])) {
        map.setView([lat, lng], zoom, { animate: false });
      }
    }
  } finally { suppressHash = false; }
  return true;
}

// マップ move/zoom 終了で URL 更新 (連続発火するので moveend のみ)
map.on('moveend zoomend', updateHash);

// ============================================================
// データ外ヒント: 現在のビューに、選択中の era のデータが無いとき表示
// (era に bounds が定義されていて、map center が bounds 外にいる場合)
// ============================================================
const boundsHintEl = document.getElementById('boundsHint');
function checkBoundsHint() {
  const checks = [];
  if (mode === 'compare') {
    if (eraA && eraA.bounds) checks.push({ era: eraA, slot: 'A' });
    if (eraB && eraB.bounds) checks.push({ era: eraB, slot: 'B' });
  } else if (eraA && eraA.bounds) {
    checks.push({ era: eraA, slot: null });
  }
  const c = map.getCenter();
  const z = map.getZoom();
  const outOfBounds = checks.filter(x => !L.latLngBounds(x.era.bounds).contains(c));

  // v3.1: 年度別空中写真 (z14以上) などの zoom 不足を検知
  const zoomTooLow = [];
  const currentEras = mode === 'compare' ? [eraA, eraB].filter(Boolean) : (eraA ? [eraA] : []);
  currentEras.forEach(e => {
    if (e && e.url && e.min && z < e.min) {
      zoomTooLow.push(e);
    }
  });

  if (zoomTooLow.length) {
    const e = zoomTooLow[0];
    const needZ = e.min;
    boundsHintEl.innerHTML =
      `「${escapeHtml(eraDisplayDate(e) + ' ' + e.label)}」はズーム ${needZ} 以上で表示されます` +
      ` <button class="center-btn" id="zoomInBtn">ズームインする</button>`;
    boundsHintEl.classList.add('show');
    const btn = document.getElementById('zoomInBtn');
    if (btn) btn.addEventListener('click', () => map.setZoom(needZ));
    return;
  }
  if (!outOfBounds.length) {
    boundsHintEl.classList.remove('show');
    return;
  }
  const list = outOfBounds.map(x => {
    const prefix = x.slot ? `${x.slot}: ` : '';
    return `${prefix}${eraDisplayDate(x.era)} ${x.era.label}`;
  }).join(' / ');
  const first = outOfBounds[0].era;
  const center = L.latLngBounds(first.bounds).getCenter();
  boundsHintEl.innerHTML =
    `この場所に「${escapeHtml(list)}」のデータがありません` +
    ` <button class="center-btn" id="centerBtn">データのある場所へ</button>`;
  boundsHintEl.classList.add('show');
  document.getElementById('centerBtn').addEventListener('click', () => {
    map.setView(center, map.getZoom(), { animate: true });
  });
}
map.on('moveend zoomend', checkBoundsHint);

// ============================================================
// トースト通知 (テーマ切替・タイムラプス開始時などに表示)
// ============================================================
const toastEl = document.getElementById('toast');

// v2.1: キーボードショートカット一覧
const shortcutsOverlay = document.getElementById('shortcutsOverlay');

  shortcutsOverlay.classList.toggle('show', willShow);

// ============================================================
// 現在地
// ============================================================
const locateBtn = document.getElementById('locateBtn');
let locateMarker = null;
locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) { showHint('お使いのブラウザは位置情報未対応'); return; }
  locateBtn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos => {
      locateBtn.classList.remove('locating');
      const ll = [pos.coords.latitude, pos.coords.longitude];
      if (locateMarker) map.removeLayer(locateMarker);
      locateMarker = L.marker(ll, {
        icon: L.divIcon({ className: '', html: '<div class="locate-marker"></div>', iconSize: [18, 18] })
      }).addTo(map);
      // 関東外なら maxBounds に制限される
      if (KANTO_BOUNDS.contains(ll)) {
        map.setView(ll, 17);
      } else {
        showHint('現在地は関東圏外のため、表示範囲を制限しています', 3000);
        map.setView([35.6814, 139.7660], 14);
      }
    },
    err => {
      locateBtn.classList.remove('locating');
      const msg = err.code === 1 ? '位置情報の使用が拒否されました' :
                  err.code === 2 ? '位置を取得できません' :
                  err.code === 3 ? 'タイムアウトしました' : err.message;
      showHint(msg, 3000);
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
});

// ============================================================
// 住所・地名検索 (Nominatim)
// ============================================================
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResults = document.getElementById('searchResults');
const searchResultsContent = document.getElementById('searchResultsContent');
const NOMINATIM_API_URL = 'https://nominatim.openstreetmap.org/search';
const TOKYO_SEARCH_VIEWBOX = '138.9,35.95,140.05,35.15';
const SEARCH_MIN_INTERVAL_MS = 1000;
const SEARCH_TIMEOUT_MS = 10000;
const SEARCH_CACHE_TTL_MS = 5 * 60 * 1000;
const searchCache = new Map();
let lastSearchStartedAt = 0;
let searchInProgress = false;

async function doSearch(q) {
  const cacheKey = q.replace(/\s+/g, ' ').trim().toLocaleLowerCase('ja-JP');
  const cached = searchCache.get(cacheKey);
  if (cached && Date.now() - cached.savedAt < SEARCH_CACHE_TTL_MS) {
    return { state: cached.items.length ? 'success' : 'empty', items: cached.items, cached: true };
  }
  if (cached) searchCache.delete(cacheKey);

  const controller = new AbortController();
  let didTimeout = false;
  const timeoutId = setTimeout(() => {
    didTimeout = true;
    controller.abort();
  }, SEARCH_TIMEOUT_MS);

  try {
    const params = new URLSearchParams({
      q,
      countrycodes: 'jp',
      viewbox: TOKYO_SEARCH_VIEWBOX,
      bounded: '0',
      limit: '8',
      format: 'json',
      addressdetails: '1',
      namedetails: '1',
      'accept-language': 'ja',
    });
    const res = await fetch(`${NOMINATIM_API_URL}?${params}`, {
      signal: controller.signal,
      headers: { 'Accept': 'application/json' },
    });
    if (res.status === 429) return { state: 'rate-limit', items: [] };
    if (!res.ok) return { state: 'network-error', items: [] };
    const items = await res.json();
    searchCache.set(cacheKey, { savedAt: Date.now(), items });
    return { state: items.length ? 'success' : 'empty', items };
  } catch (e) {
    if (didTimeout && e.name === 'AbortError') {
      return { state: 'timeout', items: [] };
    }
    console.error(e);
    return { state: 'network-error', items: [] };
  } finally {
    clearTimeout(timeoutId);
  }
}

let searchMarker = null;
function gotoSearchResult(ll, label) {
  if (searchMarker) map.removeLayer(searchMarker);
  if (!KANTO_BOUNDS.contains(ll)) {
    showHint('検索結果が関東圏外のため移動できません', 3000);
    return;
  }
  searchMarker = L.marker(ll, {
    icon: L.divIcon({ className: '', html: '<div class="search-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
    zIndexOffset: 1000,
  }).addTo(map);
  searchMarker.bindTooltip(label, {
    permanent: true, direction: 'top', offset: [0, -10], className: 'search-tooltip'
  }).openTooltip();
  map.setView(ll, 17);
  // 8 秒後にツールチップを閉じる (マーカー自体は残す)
  setTimeout(() => { if (searchMarker) searchMarker.closeTooltip(); }, 8000);
}

function showSearchResults(items) {
  searchResultsContent.innerHTML = '';
  if (!items || !items.length) {
    searchResultsContent.innerHTML = '<div class="search-item empty">該当する場所が見つかりませんでした</div>';
    searchResults.classList.add('show');
    return;
  }
  items.forEach(it => {
    const div = document.createElement('div');
    div.className = 'search-item';
    const title = it.namedetails && it.namedetails.name ? it.namedetails.name : (it.name || it.display_name.split(',')[0]);
    div.innerHTML = `<div class="title">${escapeHtml(title)}</div><div class="sub">${escapeHtml(it.display_name)}</div>`;
    div.addEventListener('click', () => {
      const ll = [parseFloat(it.lat), parseFloat(it.lon)];
      gotoSearchResult(ll, title);
      searchResults.classList.remove('show');
      searchInput.value = title;
    });
    searchResultsContent.appendChild(div);
  });
  searchResults.classList.add('show');
}

function showSearchStatus(message) {
  searchResultsContent.innerHTML = `<div class="search-item empty">${escapeHtml(message)}</div>`;
  searchResults.classList.add('show');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

async function executeSearch() {
  const q = searchInput.value.trim();
  if (!q) return;

  const now = Date.now();
  if (searchInProgress || now - lastSearchStartedAt < SEARCH_MIN_INTERVAL_MS) {
    showSearchStatus('連続検索は1秒以上あけてください');
    return;
  }

  lastSearchStartedAt = now;
  searchInProgress = true;
  searchBtn.disabled = true;
  showSearchStatus('検索中…');
  const result = await doSearch(q);
  searchInProgress = false;
  searchBtn.disabled = false;

  if (result.state === 'rate-limit') {
    showSearchStatus('検索回数の上限に達しました。しばらく待ってからお試しください');
    return;
  }
  if (result.state === 'network-error') {
    showSearchStatus('通信に失敗しました。接続を確認してもう一度お試しください');
    return;
  }
  if (result.state === 'timeout') {
    showSearchStatus('検索がタイムアウトしました。再度お試しください。');
    return;
  }
  if (result.state === 'empty') {
    showSearchResults([]);
    return;
  }

  showSearchResults(result.items);
  if (result.items.length) {
    const it = result.items[0];
    const title = it.namedetails && it.namedetails.name ? it.namedetails.name : (it.name || it.display_name.split(',')[0]);
    gotoSearchResult([parseFloat(it.lat), parseFloat(it.lon)], title);
    searchInput.value = title;
  }
}

// 入力中は通信せず、Enter または検索ボタンでのみ検索する
searchInput.addEventListener('input', () => searchResults.classList.remove('show'));
searchInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  executeSearch();
});
searchBtn.addEventListener('click', executeSearch);
searchInput.addEventListener('focus', () => {
  if (searchResultsContent.innerHTML.trim()) searchResults.classList.add('show');
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-bar')) searchResults.classList.remove('show');
});

// ============================================================
// ヒント
// ============================================================
const hint = document.getElementById('hint');
function showHint(msg, dur = 0) {
  hint.textContent = msg;
  hint.classList.add('show');
  if (dur) setTimeout(() => hint.classList.remove('show'), dur);
}

// ============================================================
// 起動
// ============================================================
renderTicks();
// URL ハッシュに状態があればそこから復元、なければ江戸末期スタート
const restored = restoreFromHash();
if (!restored || !eraA) {
  eraA = findEra('edo_late'); // 江戸末期 1860 でスタート
}
applyState();
</script>
