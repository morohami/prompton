name: Thumbnails

on:
  push:
    branches: [main]
    paths:
      - 'htmls/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.49.0
          npx playwright install --with-deps chromium

      - name: Generate thumbnails
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node .github/scripts/generate-thumbs.mjs

      - name: Commit + push
        run: |
          git config user.name 'prompton-thumbnails[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add thumbs/ manifest.json
          if git diff --cached --quiet; then
            echo "No thumbnail changes to commit."
            exit 0
          fi
          git commit -m "Prompton: regenerate thumbnails [skip ci]"
          # Owner uploads can land on main while we're generating — rebase on
          # top of whatever's there now so the push fast-forwards.
          git pull --rebase origin main
          git push
